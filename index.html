<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Team Manager Sim — Head Coach Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0E1420; --panel:#161E2D; --panel2:#1C2536; --line:#2A3548;
  --modalbg:#080B11;
  --chalk:#F2EFE7; --muted:#8B97A8; --gold:#FFD447; --red:#E25555;
  --green:#4CAF6E; --turf:#2E7D46; --turf2:#2A7340; --team:#3E6DB5;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--night);color:var(--chalk);font-family:'Inter',system-ui,sans-serif;min-height:100%}
button{font-family:inherit;cursor:pointer}
.disp{font-family:'Oswald','Arial Narrow',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:'Courier New',monospace;font-weight:700}

#app{max-width:1080px;margin:0 auto;padding:14px 14px 60px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
header.top .brand{font-size:20px;font-weight:700;color:var(--gold)}
header.top .brand small{color:var(--muted);font-size:11px;display:block;letter-spacing:.18em;font-weight:600}
header.top .meta{text-align:right;font-size:12px;color:var(--muted);line-height:1.5}
header.top .meta b{color:var(--chalk)}

/* league calendar strip — progress bar */
.timeline{margin-bottom:16px}
.tl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;gap:8px}
.tl-now{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase}
.tl-date{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.tl-track{position:relative;height:6px;background:var(--line);border-radius:3px;margin:0 2px}
.tl-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#B98F1F,var(--gold));border-radius:3px;transition:width .35s ease}
.tl-dot{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--panel);border:2px solid var(--line);transform:translate(-50%,-50%)}
.tl-dot.done{background:var(--gold);border-color:var(--gold)}
.tl-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(255,212,71,.25)}
.tl-labels{position:relative;height:15px;margin-top:6px}
.tl-lbl{position:absolute;top:0;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.tl-lbl.done{color:var(--green)}
.tl-lbl.on{color:var(--gold)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
.hd{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:.08em}
.sub{color:var(--muted);font-size:12px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grow{flex:1 1 300px}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--chalk);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;letter-spacing:.05em;transition:.15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--gold);color:#14100A;border-color:var(--gold)}
.btn.primary:hover{filter:brightness(1.08);color:#14100A}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.tiny{padding:4px 9px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.btn:focus-visible,.play:focus-visible,.teamcard:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* title */
.title-hero{text-align:center;padding:38px 10px 26px}
.title-hero h1{font-size:clamp(38px,7vw,64px);color:var(--chalk);line-height:.95}
.title-hero h1 span{color:var(--gold)}
.title-hero p{color:var(--muted);margin-top:10px;font-size:14px}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:14px}
.teamcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:left;color:var(--chalk);transition:.15s;position:relative;overflow:hidden}
.teamcard:hover{transform:translateY(-2px);border-color:var(--gold)}
.teamcard .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
.teamcard .city{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.teamcard .nm{font-size:19px;font-weight:700}
.teamcard .units{display:flex;gap:8px;margin-top:8px;font-size:10px;color:var(--muted)}
.teamcard .units b{color:var(--chalk);display:block;font-size:13px}

/* hub */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;letter-spacing:.06em}
.tab.on{background:var(--gold);color:#14100A;border-color:var(--gold)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line)}
table.tbl td{padding:6px 8px;border-bottom:1px solid #202A3C}
table.tbl tr.me td{background:rgba(255,212,71,.07)}
table.tbl tr.dim td{opacity:.45}
table.tbl tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.08em}
.tag.w{background:rgba(76,175,110,.18);color:var(--green)}
.tag.l{background:rgba(226,85,85,.15);color:var(--red)}
.tag.inj{background:rgba(226,85,85,.15);color:var(--red)}
.tag.up{background:rgba(255,212,71,.15);color:var(--gold)}
.tag.fa{background:rgba(76,141,255,.18);color:#8FB6FF}
.conf-meter,.capbar{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.conf-meter i,.capbar i{display:block;height:100%;border-radius:6px;transition:.4s}
.nextgame{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.nextgame .vs{font-size:22px;font-weight:700}
.nextgame .vs small{display:block;font-size:11px;color:var(--muted);letter-spacing:.14em;font-weight:600}
.posgroup{background:var(--panel2);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.16em;padding:5px 8px}
.filterbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.fselect{background:var(--panel2);border:1px solid var(--line);color:var(--chalk);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit}
.fbtn.on{background:var(--gold);color:#14100A;border-color:var(--gold)}
.countpill{font-size:13px;font-weight:700;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 14px}
.countpill b{color:var(--gold)}
.countpill.over b{color:var(--red)}
.pname{cursor:pointer;text-decoration:underline dotted rgba(242,239,231,.4);text-underline-offset:3px}
.pname:hover{color:var(--gold)}
.pf-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.pf-ovr{font-size:34px;font-weight:700;color:var(--gold);line-height:1}
.spark{width:100%;max-width:420px;height:64px;display:block;margin:8px 0}
th.sorth{cursor:pointer;user-select:none;white-space:nowrap}
th.sorth:hover{color:var(--chalk)}
th.sorth.on{color:var(--gold)}
.dchart{width:100%;height:auto;display:block;border-radius:10px;border:1px solid var(--line);background:#0A0F18;margin:10px 0}
.minsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;margin-top:8px}
.minbox{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 6px;text-align:center;cursor:pointer;transition:border-color .12s,transform .12s}
.minbox:hover{border-color:var(--gold);transform:translateY(-1px)}
.minbox .mb-pos{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted)}
.minbox .mb-n{font-size:16px;font-weight:700;color:var(--chalk)}
.minbox.short{border-color:var(--red)}
.minbox.short .mb-n{color:var(--red)}
.depthrow td{font-size:12px}
.oop{color:var(--red);font-weight:700}

/* game day */
.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:#0A0F18;border:1px solid var(--line);border-radius:10px;padding:10px 16px;margin-bottom:10px}
.scorebar .tm{display:flex;align-items:center;gap:10px;min-width:0}
.scorebar .tm.right{justify-content:flex-end;text-align:right}
.scorebar .dotc{width:14px;height:14px;border-radius:50%;flex:0 0 auto}
.scorebar .nm2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scorebar .sc{font-size:30px;color:var(--gold)}
.scorebar .mid{text-align:center;line-height:1.2}
.scorebar .clock{font-size:20px;color:var(--chalk)}
.scorebar .qtr{font-size:11px;color:var(--muted);letter-spacing:.2em}
.situation{display:flex;justify-content:center;gap:18px;font-size:13px;color:var(--muted);margin:8px 0;flex-wrap:wrap}
.situation b{color:var(--gold)}
.possdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:5px;vertical-align:1px}
#fieldwrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;position:relative}
#field{width:100%;height:auto;display:block;border-radius:6px}
#playbanner{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(10,15,24,.92);border:1px solid var(--gold);color:var(--chalk);padding:8px 18px;border-radius:8px;font-size:14px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;max-width:92%;text-align:center}
#playbanner.show{opacity:1}
.callsheet{margin-top:10px;background:linear-gradient(160deg,#F6F3E8,#E9E4D2);border-radius:10px;padding:12px;color:#1A1A14;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15), inset 0 14px 30px rgba(255,255,255,.5)}
.callsheet:before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;border-radius:10px;background:linear-gradient(115deg,rgba(255,255,255,.35) 0%,rgba(255,255,255,0) 30%);pointer-events:none}
.callsheet .cs-hd{display:flex;justify-content:space-between;align-items:center;font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:.16em;color:#4A4636;margin-bottom:8px}
.playgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}
.play{border:none;border-radius:6px;padding:10px 8px 8px;font-weight:700;font-size:13px;color:#17150E;text-align:left;position:relative;border-left:6px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.12s}
.play small{display:block;font-weight:600;font-size:10px;opacity:.65;margin-top:2px;letter-spacing:.03em}
.play:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.3)}
.play.run{background:#CDE8C8;border-left-color:#2F7D3B}
.play.quick{background:#F7E9A8;border-left-color:#C9A227}
.play.shot{background:#F3C6BC;border-left-color:#C0392B}
.play.st{background:#D8DEE9;border-left-color:#41506B}
.play.def{background:#C9D8EE;border-left-color:#2C4E86}
.play:disabled{opacity:.35;transform:none;box-shadow:none;cursor:default}
#gamelog{margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;max-height:170px;overflow-y:auto;font-size:12.5px;line-height:1.75}
#gamelog .q{color:var(--gold);font-weight:700;letter-spacing:.1em}
#gamelog .big{color:var(--gold);font-weight:700}
#gamelog .bad{color:var(--red);font-weight:700}
#gamelog div{border-bottom:1px dashed #232D3F;padding:2px 0}
.gamectl{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:rgba(6,9,15,.88);display:flex;align-items:center;justify-content:center;z-index:9998;padding:16px}
.overlay .card{background:var(--panel);border:1px solid var(--gold);border-radius:14px;padding:28px;max-width:520px;width:100%;text-align:center}
.overlay .card h2{font-size:30px;margin-bottom:6px}
.overlay .card p{color:var(--muted);font-size:14px;margin-bottom:16px;line-height:1.6}
.modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:rgba(6,9,15,.88);display:flex;align-items:flex-start;justify-content:center;z-index:9999;padding:16px;overflow-y:auto}
.modal-panel{background:var(--modalbg);border:1px solid var(--gold);border-radius:14px;max-width:900px;width:100%;margin:24px auto;padding:0 0 18px}
.modal-hd{position:sticky;top:0;background:var(--modalbg);border-bottom:1px solid var(--line);border-radius:14px 14px 0 0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.modal-hd .disp{font-size:19px}
.modal-body{padding:14px 18px 0}
.popup-wrap{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:rgba(6,9,15,.72);display:flex;align-items:center;justify-content:center;z-index:10500;padding:16px}
.popup-panel{background:var(--modalbg);border:1px solid var(--gold);border-radius:14px;max-width:420px;width:100%;max-height:80vh;display:flex;flex-direction:column}
.popup-hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.popup-body{padding:8px 14px 14px;overflow-y:auto}
.popup-body table.tbl{min-width:0;font-size:12.5px}
.popup-body table.tbl th, .popup-body table.tbl td{padding:4px 6px}
.popup-body table.tbl th:first-child, .popup-body table.tbl td:first-child{padding-left:2px}
.popup-body table.tbl th:last-child, .popup-body table.tbl td:last-child{padding-right:2px;text-align:right}
.navbar{display:flex;gap:0;flex-wrap:nowrap;margin:0 0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;background:var(--panel2);border:1px solid var(--line);border-radius:10px}
.navbar::-webkit-scrollbar{display:none}
.navbtn{background:transparent;border:none;border-right:1px solid var(--line);color:var(--chalk);padding:9px 14px;font-size:13px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:6px;flex:0 0 auto;white-space:nowrap}
.navbtn:last-child{border-right:none}
.navbtn:hover{background:rgba(255,255,255,.05)}
.navbtn.on{background:var(--gold);color:#14100A}
.navbtn .k{opacity:.65;font-weight:600}
.finalscore{font-size:40px;color:var(--gold);font-weight:700;margin:10px 0}
.bracket{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.brk-col h3{font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;text-align:center}
.matchup{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:13px}
.matchup .t{display:flex;justify-content:space-between;padding:3px 0}
.matchup .t.winner{color:var(--gold);font-weight:700}
.matchup .t .seed{color:var(--muted);font-size:10px;margin-right:6px}
.prospects{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prospect{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
.prospect .r{font-size:30px;font-weight:700;color:var(--gold)}
.prospect .p{font-size:11px;color:var(--muted);letter-spacing:.14em}
@media(max-width:640px){
  .scorebar .sc{font-size:22px}
  .scorebar .nm2{font-size:12px}
  .bracket{grid-template-columns:1fr}
  .playgrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr))}
  table.tbl{font-size:11.5px; min-width:600px}
  table.tbl th, table.tbl td{padding:5px 6px}
  .panel, .modal-body{overflow-x:auto}
  .navbtn{padding:7px 11px;font-size:12px;gap:5px}
  header.top{flex-wrap:wrap}
  header.top .meta{text-align:left}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

'use strict';
/* =====================================================

/* ---------- utils ---------- */

const R  = (a,b) => a + Math.random()*(b-a);

const pick = arr => arr[RI(0, arr.length-1)];
function gauss(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
const fmtClock = s => { s=Math.max(0,Math.ceil(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
const esc = t => String(t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money = n => '$' + (Math.round(n*10)/10) + 'M';

/* ---------- league calendar ---------- */
function tagStart(y){ const d = new Date(y,1,1); d.setDate(1 + ((8-d.getDay())%7) + 7); return d; } // 2nd Monday of Feb
function leagueYearDate(y){ return new Date(y,2,1); } // Mar 1 — new league year
function faOpenDate(y){ return leagueYearDate(y); }
function draftDate(y){ const d = new Date(y,3,1); d.setDate(1 + ((11-d.getDay())%7) + 7); return d; } // 2nd Thursday of April
function otaDate(y,wk){ const d = new Date(y,4,1); d.setDate(1 + ((8-d.getDay())%7) + (wk-1)*7); return d; } // Mondays in May
function campDate(y){ const d = new Date(y,6,31); d.setDate(31 - ((d.getDay()+6)%7)); return d; } // last Monday of July
function nthSaturdayOfAugust(y,n){ const d = new Date(y,7,1); d.setDate(1 + ((6-d.getDay()+7)%7) + (n-1)*7); return d; }
function seasonStartDate(y){ const d = new Date(y,8,1); d.setDate(1 + ((7-d.getDay())%7)); return d; } // first Sunday of Sept
function cutdownDate(y){ const d = seasonStartDate(y); d.setDate(d.getDate()-1); return d; }
function weekDate(y,w){ const d = seasonStartDate(y); d.setDate(d.getDate() + (w-1)*7); return d; }
function tradeDeadline(y){ const d = weekDate(y,9); d.setDate(d.getDate()+2); return d; } // Tuesday after Week 9
function fmtDate(d){ return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric', year:'numeric'}); }
function currentDate(){
  const y = G.year;
  if(G.phase==='tag') return tagStart(y);
  if(G.phase==='fa') return faOpenDate(y);
  if(G.phase==='draft') return draftDate(y);
  if(G.phase==='ota') return otaDate(y, G.otaWeek || 1);
  if(G.phase==='camp') return campDate(y);
  if(G.phase==='preseason') return nthSaturdayOfAugust(y, G.preWeek);
  if(G.phase==='cutdown') return cutdownDate(y);
  if(G.phase==='playoffs') return weekDate(y, 15 + G.playoffs.round);
  if(G.phase==='offseason') return new Date(y+1, 1, tagStart(y+1).getDate());
  return weekDate(y, Math.min(G.week,15));
}

function salaryFor(rating, pos, age){
  let base = Math.pow(Math.max(0,(rating-66))/9, 2.4) * POS_MULT[pos];
  if(age >= 30) base *= .85;
  return Math.max(0.7, Math.round(base*10)/10);
}
/* ---------- coach generation & effects ---------- */
function coachSalaryFor(rating, role){
  const mult = (role === 'OC' || role === 'DC') ? 1.5 : (role === 'STC' ? 1.15 : 1.0);
  return Math.max(0.3, Math.round(Math.pow(Math.max(0,rating-58)/14, 2.3) * mult * 10) / 10);
}
function makeCoach(role, pos){
  const rating = clamp(Math.round(R(58, 92)), 50, 99);
  const c = {
    id: G ? G.nextId++ : 0,
    name: pick(FN)+' '+pick(LN),
    role, pos: pos || null,
    rating,
    years: RI(1,3)
  };
  c.salary = coachSalaryFor(rating, role);
  return c;
}
function makeCoachPool(){
  const pool = [];
  ['OC','DC','STC'].forEach(role => { for(let i=0;i<4;i++) pool.push(makeCoach(role)); });
  COACH_POS.forEach(pos => { for(let i=0;i<2;i++) pool.push(makeCoach('POS', pos)); });
  return pool.sort((a,b) => b.rating - a.rating);
}
function staffPayroll(){
  if(!G.staff) return 0;
  let sum = 0;
  ['OC','DC','STC'].forEach(r => { if(G.staff[r]) sum += G.staff[r].salary; });
  Object.values(G.staff.pos || {}).forEach(c => { if(c) sum += c.salary; });
  return sum;
}
function staffCapRoom(){ return STAFF_CAP - staffPayroll(); }
function currentCoach(role, pos){
  if(!G.staff) return null;
  return role === 'POS' ? (G.staff.pos[pos] || null) : (G.staff[role] || null);
}
function hireCoach(candidateId, role, pos){
  const i = G.coachPool.findIndex(c => c.id === candidateId);
  if(i < 0) return;
  const cand = G.coachPool[i];
  const existing = currentCoach(role, pos);
  const room = staffCapRoom() + (existing ? existing.salary : 0);
  if(cand.salary > room){ alert('Not enough staff budget. You have '+money(room)+' once the current hire (if any) is backed out.'); return; }
  if(role === 'POS') G.staff.pos[pos] = cand; else G.staff[role] = cand;
  G.coachPool.splice(i, 1);
  save(); openModal('staff');
}
function fireCoach(role, pos){
  if(role === 'POS') G.staff.pos[pos] = null; else G.staff[role] = null;
  save(); render();
}
function ocBoost(){ const c = G.staff && G.staff.OC; return c ? (c.rating - 70) / 9 : 0; }

const HOMETOWNS = null; // filled after TEAM_DEFS loads (see ensureBio)
const EXTRA_TOWNS = ['Tulsa','Fresno','Baton Rouge','Mobile','Toledo','Wichita','Boise','Spokane','Savannah','Akron','Lubbock','Chattanooga','Shreveport','Des Moines','Knoxville','Reno','Amarillo','Flint','Macon','Odessa','Youngstown','Gainesville','Waco','Erie'];
const HGT_RANGE = {QB:[72,78], RB:[68,73], WR:[68,77], TE:[75,80], OL:[75,80], DL:[74,80], LB:[72,77], CB:[68,74], S:[70,75], K:[68,75]};
function ensureBio(p){
  if(p.home == null){
    // ~30% chance of hailing from a league city (hometown-discount potential)
    p.home = Math.random() < .3 ? pick(TEAM_DEFS).city : pick(EXTRA_TOWNS);
  }
  if(p.hgt == null){ const r = HGT_RANGE[p.pos] || [70,76]; p.hgt = RI(r[0], r[1]); }
  if(!p.history) p.history = [];
  return p;
}
function hgtBonus(p){
  if(p.hgt == null) return 0;
  const h = p.hgt;
  switch(p.pos){
    case 'DL': case 'TE': case 'OL': return h >= 78 ? 1 : (h <= 74 ? -1 : 0);
    case 'WR': return (h >= 76 || h <= 69) ? 1 : 0;   // big target OR low-and-quick
    case 'RB': return h <= 69 ? 1 : (h >= 74 ? -1 : 0);
    case 'CB': return h >= 73 ? 1 : (h <= 68 ? -1 : 0);
    case 'QB': return h >= 76 ? 1 : (h <= 71 ? -1 : 0);
    default: return 0;
  }
}
function hgtNote(p){
  const b = hgtBonus(p), ft = Math.floor(p.hgt/12), inch = p.hgt%12;
  const label = ft+"'"+inch+'"';
  if(b > 0){
    const why = {DL:'long frame gets to the passer', TE:'big catch radius', OL:'length wins the edge', WR:(p.hgt>=76?'towering red-zone target':'low center of gravity, quick out of breaks'), RB:'compact and hard to square up', CB:'length to match big receivers', QB:'sees over the line'}[p.pos] || 'ideal build';
    return label+' — '+why+' <b style="color:var(--green)">(+1 on-field)</b>';
  }
  if(b < 0){
    const why = {DL:'shorter arms in the trenches', OL:'gives up leverage', TE:'undersized', RB:'tall frame takes big hits', CB:'gets boxed out by size', QB:'passes get batted down'}[p.pos] || 'tough build for the spot';
    return label+' — '+why+' <b style="color:var(--red)">(−1 on-field)</b>';
  }
  return label+' — average build for the position';
}
function hometownDisc(t, p){ return (p.home && t && p.home === t.city) ? .9 : 1; }
function logEv(p, kind, text, delta){
  if(!p.history) p.history = [];
  p.history.push({y: G ? G.year : 0, k: kind, t: text, d: delta || 0});
  if(p.history.length > 80) p.history.shift();
}
function findPlayer(pid){
  for(const t of G.teams){ const p = t.roster.find(x => x.id === pid); if(p) return {p, t}; }
  const fp = G.fa.find(x => x.id === pid); if(fp) return {p: fp, t: null};
  return null;
}
function pn(p){ return '<span class="pname" onclick="openModal(\'player\','+p.id+')">'+esc(p.name)+'</span>'; }
function makePlayer(pos, rating, age, years, spot){
  rating = clamp(Math.round(rating), 50, 98);
  age = age || RI(22,33);
  const p = {
    id: G ? G.nextId++ : 0,
    name: pick(FN)+' '+pick(LN), pos, rating, age,
    spot: spot || pick(SPOTS[pos]),
    scheme: (pos==='DL' || pos==='LB') ? pick(['43','43','34','34','any']) : 'any',
    years: years != null ? years : RI(1,3),
    salary: 0, injWeeks: 0, trained: 0, dressed: true
  };
  p.salary = salaryFor(rating, pos, age);
  ensureBio(p);
  p.history.push({y: G ? G.year : 0, k:'move', t:'Entered the league', d:0});
  return p;
}
function makeRoster75(tier){
  const roster = [];
  POS_ORDER.forEach(pos => {
    for(let d=0; d<PT75[pos]; d++){
      const r = tier + R(3,10) - d * R(4.5,6.5);
      const sp = SPOTS[pos][d % SPOTS[pos].length]; // cycle spots so every position is covered
      roster.push(makePlayer(pos, r, RI(22,33), RI(0,3), sp));
    }
  });
  // every club starts legal: scale salaries to leave 8–20% cap room
  const pr = roster.reduce((s,p) => s + p.salary, 0);
  const target = CAP * R(.80, .92);
  if(pr > target){
    const f = target / pr;
    roster.forEach(p => p.salary = Math.max(0.7, Math.round(p.salary*f*10)/10));
  }
  return roster;
}
function newCareer(teamIdx){
  G = {
    season: 1, year: 2026, week: 1, userTeam: teamIdx,
    nextId: 1,
    teams: null, schedule: null, results: [],
    fa: [], preWeek: 1, preOpps: [], preResults: [],
    trainPts: 4, confidence: 50,
    playoffs: null, prospects: null,
    phase: 'tag', tagUsed: false, otaWeek: 0, preReport: null,
    offForm: 'single', defForm: 'f43', lineupOverride: {},
    staff: { OC:null, DC:null, STC:null, pos:{} },
    coachPool: [],
    career: { seasons:0, w:0, l:0, titles:0, berths:0 },
    lastInjury: null
  };
  G.teams = TEAM_DEFS.map((d,i) => ({
    ...d, idx:i,
    tier: i === teamIdx ? RI(70,77) : RI(66,84),
    offForm: pick(['single','single','iform','spread']),
    defForm: pick(['f43','f43','f34','f34','nickel']),
    roster: [], w:0,l:0,pf:0,pa:0, preW:0, preL:0
  }));
  G.teams.forEach(t => t.roster = makeRoster75(t.tier));
  G.coachPool = makeCoachPool();
  // every club owns its own picks for this draft + the next 2 future draft classes
  G.draftPicks = [];
  for(let y = G.year; y <= G.year + 2; y++){
    G.teams.forEach(t => { for(let r=1; r<=DRAFT_ROUNDS; r++) G.draftPicks.push({ id: G.nextId++, year:y, round:r, team:t.idx }); });
  }
  // street free agents
  for(let i=0;i<40;i++) G.fa.push(makePlayer(pick(POS_ORDER), R(55,74), RI(23,32), 0));
  // career opens in the franchise-tag window: expiring deals are still on rosters
  hubTab = 'schedule'; faFilter = 'ALL';
  save(); render();
}
function save(){ if(G) store.set(G); }
function exportSave(){
  if(!G){ alert('No active career to export.'); return; }
  save();
  const me = meT();
  const label = (me.city+'-'+me.name).toLowerCase().replace(/[^a-z0-9]+/g,'-');
  const blob = new Blob([JSON.stringify(G, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'team-manager-sim-'+label+'-s'+G.season+'-'+G.year+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function triggerImport(){ const el = document.getElementById('importFile'); if(el) el.click(); }
function importSave(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ alert('Could not read that file — is it a Team Manager Sim save?'); input.value=''; return; }
    if(!data || !Array.isArray(data.teams) || typeof data.userTeam !== 'number'){
      alert('That doesn\'t look like a valid Team Manager Sim save file.'); input.value=''; return;
    }
    if(G && !confirm('Importing will replace your current career. Continue?')){ input.value=''; return; }
    G = data;
    store.set(G);
    render();
    alert('Save imported! Welcome back to Season '+G.season+', '+G.year+'.');
  };
  reader.readAsText(file);
  input.value = '';
}

/* contracts expire (last Sunday of March). AI clubs re-sign some of their own. */
function userPrice(p, ageBump){
  // hometown kids take a little less to play for the club they grew up with
  return Math.round(marketFor(p, ageBump) * hometownDisc(meT(), ensureBio(p)) * 10) / 10;
}
function tagSalaryFor(p, t){
  // top-tier guaranteed money: a healthy premium over market
  const disc = hometownDisc(t || meT(), ensureBio(p));
  return Math.round((marketFor(p, 1) * disc * 1.25 + 1) * 10) / 10;
}
function pendingUFAs(t){ return t.roster.filter(p => p.years <= 0 && !p.tagged); }
function tagPlayer(pid){
  const me = meT();
  if(G.tagUsed){ alert('You already used your franchise tag this year — one per club.'); return; }
  const p = me.roster.find(x => x.id === pid);
  if(!p || p.years > 0) return;
  const sal = tagSalaryFor(p);
  if(sal > capRoom(me) + p.salary){ alert('Not enough cap room for the tag ('+money(sal)+' guaranteed).'); return; }
  p.years = 1; p.salary = sal; p.tagged = true; p.resigned = true;
  G.tagUsed = true;
  logEv(p, 'ct', 'Franchise tagged by '+me.city+' — '+money(sal)+' gtd', 0);
  save(); render();
}
function openFreeAgency(){
  runExpiry();
  G.phase = 'fa'; faFilter = 'ALL';
  save(); render();
}
function runExpiry(){
  G.teams.forEach(t => {
    const isAI = t.idx !== G.userTeam;
    // AI franchise tags: one per club, best expiring star, sometimes
    if(isAI){
      const star = t.roster.filter(p => p.years <= 0 && p.rating >= 82).sort((a,b)=>b.rating-a.rating)[0];
      if(star && Math.random() < .4){
        const sal = tagSalaryFor(star, t);
        if(payroll(t) - star.salary + sal <= CAP){ star.years = 1; star.salary = sal; star.tagged = true; }
      }
    }
    const stay = [], go = [];
    t.roster.forEach(p => {
      if(p.years <= 0){
        const mkt = marketFor(p);
        if(isAI && p.rating >= 78 && Math.random() < .55 && payroll(t) - p.salary + mkt <= CAP){
          p.years = RI(2,3); p.salary = mkt; stay.push(p);
        } else go.push(p);
      } else stay.push(p);
    });
    t.roster = stay;
    go.forEach(p => { p.years = 0; G.fa.push(p); });
  });
  G.fa.sort((a,b) => b.rating - a.rating);
  if(G.fa.length > 150) G.fa.length = 150;
}
function payroll(t){ return t.roster.reduce((s,p) => s + p.salary, 0); }
function capRoom(t){ return CAP - payroll(t); }
function posCount(t, pos){ return t.roster.filter(p => p.pos === pos && !p.ir).length; }
function activeCount(t){ return t.roster.filter(p => !p.ir).length; }
function rosterLimit(){ return (G.phase==='hub' || G.phase==='game' || G.phase==='playoffs') ? LIMIT_REG : LIMIT_OFF; }
function rosterFrozen(){ return G.phase === 'playoffs'; }

/* user signs a free agent */
function signFA(pid){
  const i = G.fa.findIndex(p => p.id === pid);
  if(i < 0) return;
  const p = G.fa[i], me = meT();
  if(rosterFrozen()){ alert('Roster moves are frozen during the playoffs.'); return; }
  if(activeCount(me) >= rosterLimit()){ alert('Roster is full ('+rosterLimit()+' max right now).'); return; }
  p.salary = userPrice(p);
  if(p.salary > capRoom(me)){ alert('Not enough cap room. You have '+money(capRoom(me))+'.'); return; }
  p.years = p.askYears || RI(1,3);
  p.injWeeks = 0; p.dressed = true;
  logEv(p, 'ct', 'Signed with '+me.city+' — '+money(p.salary)+'/yr × '+p.years, 0);
  me.roster.push(p);
  G.fa.splice(i,1);
  if(G.phase === 'fa') aiFAWave(RI(2,4));  // the market moves while you shop
  save(); render();
}
/* user cuts a player (offseason/cutdown, or anytime to make room) */
function cutPlayer(pid){
  const me = meT();
  if(rosterFrozen()){ alert('Roster moves are frozen during the playoffs.'); return; }
  const i = me.roster.findIndex(p => p.id === pid);
  if(i < 0) return;
  const p = me.roster.splice(i,1)[0];
  p.years = 0;
  G.fa.push(p);
  G.fa.sort((a,b) => b.rating - a.rating);
  save(); render();
}
function toggleDress(pid){
  const p = meT().roster.find(x => x.id === pid);
  if(!p || p.injWeeks > 0) return;
  p.dressed = !p.dressed;
  save(); render();
}

/* AI free agency: fill thinnest positions, best player affordable */
function teamNeed(t){
  let worst = null, worstGap = 0;
  POS_ORDER.forEach(pos => {
    const gap = PT75[pos] - posCount(t, pos);
    if(gap > worstGap){ worstGap = gap; worst = pos; }
  });
  return worst;
}
function aiFAWave(n){
  const ais = G.teams.filter(t => t.idx !== G.userTeam);
  for(let k=0; k<n; k++){
    const t = pick(ais);
    if(t.roster.length >= LIMIT_OFF) continue;
    const need = teamNeed(t) || pick(POS_ORDER);
    const cand = G.fa.find(p => p.pos === need && salaryFor(p.rating,p.pos,p.age) <= capRoom(t));
    if(!cand) continue;
    cand.salary = salaryFor(cand.rating, cand.pos, cand.age);
    cand.years = RI(1,3); cand.injWeeks = 0; cand.dressed = true;
    t.roster.push(cand);
    G.fa.splice(G.fa.indexOf(cand), 1);
  }
}
function aiFillRosters(){
  G.teams.forEach(t => {
    if(t.idx === G.userTeam) return;
    let guard = 120;
    while(t.roster.length < LIMIT_OFF - 2 && guard-- > 0){
      const need = teamNeed(t) || pick(POS_ORDER);
      let cand = G.fa.find(p => p.pos === need && salaryFor(p.rating,p.pos,p.age) <= capRoom(t));
      if(!cand){ // camp body off the street
        cand = makePlayer(need, R(54,66), RI(22,27), 1);
      } else G.fa.splice(G.fa.indexOf(cand), 1);
      cand.salary = salaryFor(cand.rating, cand.pos, cand.age);
      cand.years = Math.max(1, cand.years || RI(1,2));
      cand.injWeeks = 0; cand.dressed = true;
      t.roster.push(cand);
    }
  });
  G.teams.forEach(t => { if(t.idx !== G.userTeam) fillMinimumsFor(t); });
}

/* ---------- depth chart & unit ratings ---------- */
function poolOf(t){
  let list = t.roster.filter(p => p.injWeeks === 0);
  if(LINEUP === 'dressed' && (t.idx === GM?.home || t.idx === GM?.away))
    list = list.filter(p => p.dressed !== false);
  return list;
}
function depthAt(t, pos){
  return poolOf(t).filter(p => p.pos === pos).sort((a,b) => b.rating - a.rating);
}
function st(t, pos, i){
  const d = depthAt(t, pos);
  return d[i] ? d[i].rating : 46;
}

/* ---------- fit-aware lineups ---------- */
function effRating(p, slotSpot, scheme){
  let r = p.rating;
  if(p.spot !== slotSpot){
    const fit = SPOT_FIT[p.spot];
    r -= (fit && fit[slotSpot] != null) ? fit[slotSpot] : 4;
  }
  if(scheme && p.scheme !== 'any' && (p.pos==='DL' || p.pos==='LB') && p.scheme !== scheme)
    r -= SCHEME_PENALTY;
  r += hgtBonus(p);
  return Math.max(45, r);
}
function offFormKeyOf(t){ return (t.idx === G.userTeam ? G.offForm : t.offForm) || 'single'; }
function defFormKeyOf(t){ return (t.idx === G.userTeam ? G.defForm : t.defForm) || 'f43'; }
function offFormOf(t){ return OFF_FORMS[offFormKeyOf(t)] || OFF_FORMS.single; }
function defFormOf(t){ return DEF_FORMS[defFormKeyOf(t)] || DEF_FORMS.f43; }
function lineupFor(t, form, formKey, skipIds){
  const pool = poolOf(t).filter(p => p.pos !== 'K' && !(skipIds && skipIds.has(p.id)));
  const used = new Set();
  const ov = (t.idx === G.userTeam && formKey && G.lineupOverride) ? G.lineupOverride[formKey] : null;
  return form.slots.map((spot, i) => {
    let chosen = null;
    if(ov && ov[i] != null){
      const cand = pool.find(p => p.id === ov[i] && SPOT_GROUP[spot] === p.pos && !used.has(p.id));
      if(cand) chosen = cand;
    }
    if(!chosen){
      let best = null, br = -1;
      pool.forEach(p => {
        if(used.has(p.id) || SPOT_GROUP[spot] !== p.pos) return;
        const e = effRating(p, spot, form.scheme);
        if(e > br){ br = e; best = p; }
      });
      chosen = best;
    }
    if(chosen) used.add(chosen.id);
    return { spot, p: chosen, eff: chosen ? effRating(chosen, spot, form.scheme) : 46, manual: !!(chosen && ov && ov[i] === chosen.id) };
  });
}
function unitFrom(lineup, W, mod){
  let sum = 0, wsum = 0;
  lineup.forEach(sl => { const w = W[sl.spot] || 0; sum += w * sl.eff; wsum += w; });
  return (wsum ? sum / wsum : 50) + mod;
}
function sideLineup(t, side, s){
  const form = side === 'o' ? offFormOf(t) : defFormOf(t);
  const formKey = side === 'o' ? offFormKeyOf(t) : defFormKeyOf(t);
  if(!s) return { form, lu: lineupFor(t, form, formKey) };
  const first = lineupFor(t, form, formKey);
  const skip = new Set(first.filter(x => x.p).map(x => x.p.id));
  return { form, lu: lineupFor(t, form, formKey, skip) };
}
function offPassS(t,s){ const {form,lu} = sideLineup(t,'o',s); return unitFrom(lu, W_OFF_PASS, form.passMod); }
function offRushS(t,s){ const {form,lu} = sideLineup(t,'o',s); return unitFrom(lu, W_OFF_RUSH, form.runMod); }
function defPassS(t,s){ const {form,lu} = sideLineup(t,'d',s); return unitFrom(lu, W_DEF_PASS, form.passMod); }
function defRushS(t,s){ const {form,lu} = sideLineup(t,'d',s); return unitFrom(lu, W_DEF_RUSH, form.runMod); }
function blend(f,t){ return LINEUP==='pre' ? (f(t,0)+f(t,1))/2 : f(t,0); }
function offPass(t){ return blend(offPassS,t) + (t.idx === G.userTeam ? ocBoost() : 0); }
function offRush(t){ return blend(offRushS,t) + (t.idx === G.userTeam ? ocBoost() : 0); }
function defPass(t){ return blend(defPassS,t) + (t.idx === G.userTeam ? dcBoost() : 0); }
function defRush(t){ return blend(defRushS,t) + (t.idx === G.userTeam ? dcBoost() : 0); }
function kRating(t){ return st(t,'K',0) + (t.idx === G.userTeam ? stcBoost() : 0); }
function ovr(t){ return Math.round((offPass(t)+offRush(t)+defPass(t)+defRush(t))/4); }

/* ---------- gameday actives (46 dress) ---------- */
function autoDress(t, respectScratches){
  const healthy = t.roster.filter(p => p.injWeeks === 0).sort((a,b) => b.rating - a.rating);
  t.roster.forEach(p => { if(p.injWeeks > 0) p.dressed = false; });
  const scratched = respectScratches ? healthy.filter(p => p.dressed === false) : [];
  healthy.forEach(p => p.dressed = false);
  const need = Object.assign({}, MIN53);
  let count = 0;
  const eligible = healthy.filter(p => !scratched.includes(p));
  eligible.forEach(p => { if(need[p.pos] > 0 && count < LIMIT_DRESS){ p.dressed = true; need[p.pos]--; count++; } });
  eligible.forEach(p => { if(!p.dressed && count < LIMIT_DRESS){ p.dressed = true; count++; } });
  // if scratches left us short, pull scratched guys back in
  scratched.forEach(p => { if(count < LIMIT_DRESS - 4){ p.dressed = true; count++; } });
  return count;
}
function dressedCount(t){ return t.roster.filter(p => p.injWeeks===0 && p.dressed !== false).length; }

/* ---------- cutdown to 53 ---------- */
function autoCutList(t){
  // returns the set of player ids to KEEP (best 53 satisfying minimums)
  const sorted = t.roster.slice().sort((a,b) => b.rating - a.rating);
  const keep = new Set(), need = Object.assign({}, MIN53);
  sorted.forEach(p => { if(need[p.pos] > 0){ keep.add(p.id); need[p.pos]--; } });
  sorted.forEach(p => { if(!keep.has(p.id) && keep.size < LIMIT_REG) keep.add(p.id); });
  return keep;
}
function aiCutdowns(){
  G.teams.forEach(t => {
    if(t.idx === G.userTeam) return;
    fillMinimumsFor(t); // patch any positional holes before final cuts
    const keep = autoCutList(t);
    const cuts = t.roster.filter(p => !keep.has(p.id));
    t.roster = t.roster.filter(p => keep.has(p.id));
    cuts.forEach(p => { p.years = 0; G.fa.push(p); });
  });
  G.fa.sort((a,b) => b.rating - a.rating);
  if(G.fa.length > 150) G.fa.length = 150;
}
function meetsMinimums(t){
  return POS_ORDER.every(pos => posCount(t,pos) >= MIN53[pos]);
}

/* =====================================================
   SEASON LOGIC (schedule, sim, playoffs, offseason)
   ===================================================== */
function makeSchedule(){
  const n = 16, rounds = [];
  const arr = []; for(let i=1;i<n;i++) arr.push(i);
  for(let r=0; r<n-1; r++){
    const games = [];
    const ring = [0].concat(arr);
    for(let i=0; i<n/2; i++){
      const a = ring[i], b = ring[n-1-i];
      games.push(Math.random() < .5 ? {a,b} : {a:b, b:a});
    }
    rounds.push(games);
    arr.unshift(arr.pop());
  }
  for(let i=rounds.length-1; i>0; i--){ const j=RI(0,i); [rounds[i],rounds[j]]=[rounds[j],rounds[i]]; }
  return rounds;
}
function quickSim(ai, bi){
  const A = G.teams[ai], B = G.teams[bi];
  function drives(off, def, home){
    let pts = 0;
    for(let d=0; d<11; d++){
      const edge = ( (offPass(off)+offRush(off))/2 - (defPass(def)+defRush(def))/2 )/100 + (home? .02 : 0);
      const roll = Math.random() + edge*0.9;
      if(roll > .74) pts += 7;
      else if(roll > .58) pts += 3;
      else if(roll > .555) pts += 7;
    }
    return pts;
  }
  let as = drives(A,B,true), bs = drives(B,A,false);
  if(as === bs){ if(Math.random()<.5) as += 3; else bs += 3; }
  return {a:ai, b:bi, as, bs};
}
function applyResult(res){
  const A = G.teams[res.a], B = G.teams[res.b];
  A.pf += res.as; A.pa += res.bs; B.pf += res.bs; B.pa += res.as;
  if(res.as > res.bs){ A.w++; B.l++; } else { B.w++; A.l++; }
}
function userGame(){
  const wk = G.schedule[G.week-1];
  return wk.find(g => g.a === G.userTeam || g.b === G.userTeam);
}
/* ---------- player stats, stat-driven development, market value ---------- */
function blankStats(){ return {gp:0,py:0,ptd:0,ry:0,rtd:0,cy:0,ctd:0,tk:0,sk:0,int:0,fgm:0}; }
function stOf(p){ if(!p.st) p.st = blankStats(); return p.st; }
function statScore(p){
  const s = p.st; if(!s) return 0;
  return s.py*.025 + s.ptd*4 + s.ry*.09 + s.rtd*5 + s.cy*.09 + s.ctd*5 + s.tk*.45 + s.sk*3.5 + s.int*5 + s.fgm*2;
}
const STAT_BENCH = {QB:115, RB:58, WR:50, TE:36, OL:0, DL:42, LB:52, CB:32, S:36, K:50}; // solid-starter season score
function statMult(p){
  const bench = STAT_BENCH[p.pos];
  if(!bench) return 1;
  const score = (p.lastScore || 0) + statScore(p);
  if(score <= 0) return 1;
  return clamp(.9 + .3 * (score/bench - 1), .85, 1.3);
}
function marketFor(p, ageBump){ return Math.round(salaryFor(p.rating, p.pos, p.age + (ageBump||0)) * statMult(p) * 10) / 10; }
function bumpDev(p, hot){
  if(!hot || Math.random() > .55) return false;
  p.devPts = (p.devPts||0) + 1;
  if(p.devPts >= 3 && (p.statDev||0) < 3 && p.rating < 99){
    p.devPts = 0; p.statDev = (p.statDev||0) + 1; p.rating++;
    logEv(p, 'dev', 'Hot streak — string of big games', 1);
    return true;
  }
  return false;
}
function shareOut(total, players, jitter){
  // split a total among players weighted by rating, with noise
  if(!players.length) return [];
  const w = players.map(p => Math.pow(p.rating, 2) * R(1-jitter, 1+jitter));
  const sum = w.reduce((a,b)=>a+b,0);
  return w.map(x => total * x / sum);
}
function recordGameStats(ai, bi, as, bs){
  const risers = [];
  [[ai,as,bi],[bi,bs,ai]].forEach(([ti,pts,oi]) => {
    const t = G.teams[ti], o = G.teams[oi];
    const olu = lineupFor(t, offFormOf(t), offFormKeyOf(t));
    const dlu = lineupFor(t, defFormOf(t), defFormKeyOf(t));
    const at = spot => olu.filter(x=>x.spot===spot && x.p).map(x=>x.p);
    const datPos = pos => dlu.filter(x=>x.p && x.p.pos===pos).map(x=>x.p);
    const pf = (pts+10)/34;
    const passYd = Math.max(60, Math.round((165 + R(0,110)) * pf * (1 + (offPass(t)-defPass(o))/70)));
    const rushYd = Math.max(30, Math.round((92 + R(0,75)) * pf * (1 + (offRush(t)-defRush(o))/70)));
    let tds = Math.floor(pts/7), fgs = clamp(Math.round((pts - tds*7)/3), 0, 6);
    let ptd = 0, rtd = 0;
    for(let i=0;i<tds;i++){ if(Math.random() < passYd/(passYd+rushYd*1.4)) ptd++; else rtd++; }
    const qb = at('QB')[0], rbs = at('RB'), recvs = at('WR').concat(at('TE'));
    if(qb){ const s=stOf(qb); s.gp++; s.py+=passYd; s.ptd+=ptd; if(bumpDev(qb, passYd>=290||ptd>=4)) risers.push(qb); }
    // rushing: RB1 heavy, sprinkle to RB2/QB
    const rushers = rbs.length ? rbs.slice(0,2) : (qb ? [qb] : []);
    if(rushers.length){
      const cuts = rushers.length===2 ? [.72,.28] : [1];
      rushers.forEach((p,i) => {
        const yd = Math.round(rushYd*cuts[i]); const s=stOf(p); if(p!==qb) s.gp++;
        s.ry+=yd; const myTd = (i===0)? rtd : 0; s.rtd+=myTd;
        if(bumpDev(p, yd>=115||myTd>=2)) risers.push(p);
      });
    }
    // receiving splits pass yards
    const recYds = shareOut(passYd, recvs, .5);
    const tdOwner = recvs.length ? pick(recvs) : null;
    recvs.forEach((p,i) => {
      const yd = Math.round(recYds[i]); const s=stOf(p); s.gp++;
      s.cy+=yd; const myTd = (p===tdOwner)? ptd : 0; s.ctd+=myTd;
      if(bumpDev(p, yd>=100||myTd>=2)) risers.push(p);
    });
    // defense
    const lbs = datPos('LB'), dls = datPos('DL'), cbs = datPos('CB'), ss = datPos('S');
    const tackles = RI(34,52);
    [[lbs,.42],[ss,.22],[cbs,.18],[dls,.18]].forEach(([grp,cut]) => {
      shareOut(tackles*cut, grp, .4).forEach((v,i) => {
        const p = grp[i], s = stOf(p); s.gp++;
        const tk = Math.round(v); s.tk += tk;
        if(bumpDev(p, tk>=11)) risers.push(p);
      });
    });
    const rushersD = dls.concat(lbs.filter(p=>p.spot==='OLB'));
    let sacks = clamp(Math.round(R(0,4.4) * (1 + (defPass(t)-offPass(o))/80)), 0, 7);
    while(sacks-- > 0 && rushersD.length){ const p = pick(rushersD), s = stOf(p); s.sk++; if(bumpDev(p, Math.random()<.35)) risers.push(p); }
    let ints = Math.random() < .38 ? RI(1, 2) : 0;
    const balls = cbs.concat(ss);
    while(ints-- > 0 && balls.length){ const p = pick(balls), s = stOf(p); s.int++; if(bumpDev(p, Math.random()<.6)) risers.push(p); }
    // kicker
    const k = depthAt(t,'K')[0];
    if(k){ const s = stOf(k); s.gp++; s.fgm += fgs; if(bumpDev(k, fgs>=4)) risers.push(k); }
  });
  return risers;
}
function finishWeek(userRes){
  const wk = G.schedule[G.week-1];
  const results = [];
  G.weekDevs = [];
  wk.forEach(g => {
    let r;
    if(g.a === G.userTeam || g.b === G.userTeam){ r = userRes; results.push(r); applyResult(r); }
    else { r = quickSim(g.a, g.b); results.push(r); applyResult(r); }
    const ris = recordGameStats(r.a, r.b, r.as, r.bs);
    ris.forEach(p => { if(meT().roster.includes(p)) G.weekDevs.push({name:p.name, pos:p.spot, ovr:p.rating}); });
  });
  G.results.push(results);
  const me = meT();
  const won = (userRes.a === G.userTeam) ? userRes.as > userRes.bs : userRes.bs > userRes.as;
  G.trainPts += won ? 3 : 1;
  G.confidence = clamp(G.confidence + (won ? 4 : -4), 0, 100);
  G.career[won ? 'w' : 'l']++;
  // heal, then risk a new injury to a dressed player
  G.teams.forEach(t => t.roster.forEach(p => { if(p.injWeeks > 0 && !p.ir) p.injWeeks--; }));
  G.lastInjury = null;
  if(Math.random() < .22){
    const dressedHealthy = me.roster.filter(p => p.injWeeks === 0 && p.dressed !== false && p.pos !== 'K');
    if(dressedHealthy.length){
      const p = pick(dressedHealthy);
      p.injWeeks = RI(1,4);
      G.lastInjury = p;
      logEv(p, 'inj', 'Injured — out '+p.injWeeks+' wk'+(p.injWeeks>1?'s':''), 0);
      if(Math.random() < .25 && p.rating > 55){ p.rating--; logEv(p, 'inj', 'Injury setback — never quite the same', -1); }
    }
  }
  G.week++;
  if(G.week > 15) buildPlayoffs();
  save();
}

/* ---------- standings & playoffs ---------- */
function sortStand(list){
  return list.slice().sort((x,y) => (y.w - x.w) || ((y.pf-y.pa)-(x.pf-x.pa)) || (y.pf - x.pf));
}
function confSeeds(conf){
  const teams = G.teams.filter(t => t.conf === conf);
  const divWinners = [0,1].map(d => sortStand(teams.filter(t => t.div === d))[0]);
  const winnersSorted = sortStand(divWinners);
  const rest = sortStand(teams.filter(t => !divWinners.includes(t)));
  return winnersSorted.concat(rest.slice(0,2)).map(t => t.idx);
}
function buildPlayoffs(){
  G.phase = 'playoffs';
  const s0 = confSeeds(0), s1 = confSeeds(1);
  const berth = s0.includes(G.userTeam) || s1.includes(G.userTeam);
  if(berth){ G.career.berths++; G.confidence = clamp(G.confidence + 10, 0, 100); }
  else G.confidence = clamp(G.confidence - 8, 0, 100);
  G.playoffs = {
    round: 1, userIn: berth,
    r1: [ {a:s0[0], b:s0[3], done:false}, {a:s0[1], b:s0[2], done:false},
          {a:s1[0], b:s1[3], done:false}, {a:s1[1], b:s1[2], done:false} ],
    r2: [], r3: [], champion: null,
    seeds: {0:s0, 1:s1}
  };
  save();
}
function playoffGames(){ return G.playoffs['r'+G.playoffs.round]; }
function playoffUserGame(){
  return playoffGames().find(g => !g.done && (g.a === G.userTeam || g.b === G.userTeam));
}
function simPlayoffRound(){
  playoffGames().forEach(g => {
    if(g.done) return;
    const r = quickSim(g.a, g.b);
    if(r.as === r.bs) r.as += 3;
    g.as = r.as; g.bs = r.bs; g.done = true;
    g.winner = r.as > r.bs ? g.a : g.b;
    recordGameStats(g.a, g.b, g.as, g.bs);
  });
  advancePlayoffRound();
}
function recordPlayoffUserResult(res){
  const g = playoffUserGame();
  const P = G.playoffs;
  g.as = (res.a === g.a) ? res.as : res.bs;
  g.bs = (res.a === g.a) ? res.bs : res.as;
  g.done = true; g.winner = g.as > g.bs ? g.a : g.b;
  recordGameStats(g.a, g.b, g.as, g.bs);
  const won = g.winner === G.userTeam;
  const isChamp = P.round === 3; // Apex Bowl
  G.trainPts += won ? (isChamp ? 7 : 5) : (isChamp ? 3 : 2);
  G.confidence = clamp(G.confidence + (won ? 6 : -3), 0, 100);
  G.career[won ? 'w' : 'l']++;
  simPlayoffRound();
}
function advancePlayoffRound(){
  const P = G.playoffs;
  if(P.round === 1){
    P.r2 = [ {a:P.r1[0].winner, b:P.r1[1].winner, done:false},
             {a:P.r1[2].winner, b:P.r1[3].winner, done:false} ];
    P.round = 2;
  } else if(P.round === 2){
    P.r3 = [ {a:P.r2[0].winner, b:P.r2[1].winner, done:false} ];
    P.round = 3;
  } else {
    P.champion = P.r3[0].winner;
    if(P.champion === G.userTeam){
      G.career.titles++;
      G.confidence = clamp(G.confidence + 18, 0, 100);
    }
    G.phase = 'offseason';
  }
  if(G.playoffs.userIn && !playoffUserGame() && P.champion == null){
    G.playoffs.userIn = false;
  }
  save(); render();
}

/* =====================================================
   OFFSEASON MACHINE
   offseason summary → (re-sign) → March expiry → FA →
   draft → preseason ×3 → cutdown → new season

function resignPlayer(pid){
  const me = meT();
  const p = me.roster.find(x => x.id === pid);
  if(!p || p.years > 1 || p.resigned) return;
  const newSalary = userPrice(p, 1);
  if(newSalary > capRoom(me) + p.salary){ alert('Not enough cap room for '+money(newSalary)+'.'); return; }
  p.years = RI(2,3);
  p.salary = newSalary;
  p.resigned = true;
  logEv(p, 'ct', 'Re-signed with '+me.city+' — '+money(newSalary)+'/yr × '+p.years, 0);
  save(); render();
}
/* extend a contract already in force: add years and blend the cap hit across
   the whole new term. Only the DIFFERENCE against the player's current cap
   hit has to fit under the cap — his existing salary is already "spent". */
function extPreview(p, addYears){
  const marketNow = userPrice(p, 1);
  const totalValue = p.salary * p.years + marketNow * addYears;
  const newYears = p.years + addYears;
  const newSalary = Math.max(0.7, Math.round((totalValue / newYears) * 10) / 10);
  return { newYears, newSalary, marketNow };
}
function extendPlayer(pid, addYears){
  const me = meT();
  const p = me.roster.find(x => x.id === pid);
  if(!p || addYears < 1) return;
  const { newYears, newSalary } = extPreview(p, addYears);
  const room = capRoom(me) + p.salary; // room once his OWN current hit is backed out
  if(newSalary > room){ alert('Not enough cap room. Extension needs '+money(newSalary)+'/yr — you have '+money(room)+' once his current deal is backed out.'); return; }
  p.years = newYears;
  p.salary = newSalary;
  p.resigned = true; // don't double-decrement at the next March expiry pass
  logEv(p, 'ct', 'Extended +'+addYears+' yr'+(addYears>1?'s':'')+' — '+money(newSalary)+'/yr × '+newYears, 0);
  save(); openModal('roster');
}
/* ---------- change a player's spot within their position group ---------- */
function repositionPreview(p, newSpot){

}
function repositionPlayer(pid, newSpot){

}

function extendHTML(pid){

function advanceToTag(){
  // league-wide aging, progression, retirement
  const develop = p => {
    p.age++;
    const before = p.rating;
    if(p.age <= 25) p.rating += RI(0,3);
    else if(p.age <= 29) p.rating += RI(-1,2);
    else p.rating += RI(-4,1);
    p.rating = clamp(p.rating, 50, 99);
    const d = p.rating - before;
    if(d > 0) logEv(p, 'dev', 'Offseason development (age '+p.age+')', d);
    else if(d < 0) logEv(p, 'dev', 'Age decline (age '+p.age+')', d);
    p.trained = 0; p.injWeeks = 0; p.dressed = true; p.ir = false;
    if(p.st){ if(!p.cst) p.cst = blankStats(); Object.keys(p.st).forEach(k => p.cst[k] += p.st[k]); }
    p.lastScore = statScore(p); p.st = null; p.devPts = 0; p.statDev = 0;
  };
  G.teams.forEach(t => {
    t.roster.forEach(develop);
    t.roster = t.roster.filter(p => !(p.age >= 33 && Math.random() < (p.age-32)*.25) && !(p.rating <= 54 && Math.random() < .4));
    t.roster.forEach(p => { if(!p.resigned) p.years--; p.resigned = false; });
    t.w=0; t.l=0; t.pf=0; t.pa=0; t.preW=0; t.preL=0;
  });
  // position coaches nudge their group's development, on top of normal aging — user's staff only
  meT().roster.forEach(p => {
    const coach = posCoachOf(p.pos);
    if(coach){
      const bonus = Math.round((coach.rating - 70) / 12); // roughly -2..+2
      if(bonus) p.rating = clamp(p.rating + bonus, 50, 99);
    }
  });
  G.fa.forEach(develop);
  G.fa = G.fa.filter(p => p.age < 34 && p.rating > 52);
  G.coachPool = makeCoachPool(); // fresh coaching market each offseason
  G.career.seasons++;
  G.season++; G.year++;
  if(!G.draftPicks) G.draftPicks = [];
  // roll the tradeable-picks window forward so every club always has a picture 3 draft classes out
  G.teams.forEach(t => { for(let r=1; r<=DRAFT_ROUNDS; r++) G.draftPicks.push({ id: G.nextId++, year: G.year+2, round: r, team: t.idx }); });
  G.results = []; G.playoffs = null; G.preResults = [];
  G.trainPts += 3;
  G.tagUsed = false; G.otaWeek = 0; G.preReport = null;
  if(G.confidence <= 0){ G.phase = 'fired'; save(); render(); return; }
  G.phase = 'tag';
  save(); render();
}
function userPicksInRound(round){
  return G.draftPicks.filter(pk => pk.year === G.year && pk.round === round && pk.team === G.userTeam);
}
/* resolve any round(s) at the front of the draft where the user owns no picks (traded away),
   stopping once we reach a round the user has picks in, or the draft ends */
function enterDraftRound(){
  while(G.draftRound <= DRAFT_ROUNDS && userPicksInRound(G.draftRound).length === 0){
    aiDraftRound(G.draftRound);
    G.draftRound++;
  }
  if(G.draftRound <= DRAFT_ROUNDS) G.prospects = makeProspects(G.draftRound);
}
function advanceToDraft(){
  aiFAWave(20);
  G.draftRound = 1;
  G.draftClass = []; // [{round, tier, id}] — every pick made this draft, manual or simulated
  enterDraftRound();
  G.phase = 'draft';
  save(); render();
}
function makeProspects(round){
  const tier = DRAFT_TIERS[round-1] || DRAFT_TIERS[DRAFT_TIERS.length-1];
  const positions = POS_ORDER.filter(p => p !== 'K');
  const picks = [];
  for(let i=0;i<6;i++) picks.push({ name: pick(FN)+' '+pick(LN), pos: pick(positions), rating: RI(tier.min, tier.max) });
  return picks.sort((a,b) => b.rating - a.rating);
}
function draftBestFit(t, tier){
  const positions = POS_ORDER.filter(p => p !== 'K');
  const pos = teamNeed(t) || pick(positions);
  return { pos, rating: RI(tier.min, tier.max) };
}
/* resolves every pick an AI club owns in this round (0, 1, or several thanks to trades), then removes those picks */
function aiDraftRound(round){
  const tier = DRAFT_TIERS[round-1];
  const slots = G.draftPicks.filter(pk => pk.year === G.year && pk.round === round && pk.team !== G.userTeam);
  slots.forEach(pk => {
    const t = G.teams[pk.team];
    if(t.roster.length < LIMIT_OFF){
      const fit = draftBestFit(t, tier);
      const rook = makePlayer(fit.pos, fit.rating, 22, 3);
      rook.salary = rookieSalaryFor(round);
      rook.history = [{y:G.year, k:'move', t:'Drafted Rd '+round+' by '+t.city, d:0}];
      t.roster.push(rook);
    }
  });
  G.draftPicks = G.draftPicks.filter(pk => !(pk.year === G.year && pk.round === round && pk.team !== G.userTeam));
}
function draftPick(i){
  const me = meT();
  const round = G.draftRound;
  if(me.roster.length >= LIMIT_OFF){ alert('Roster full — cut someone first.'); return; }
  const myPicks = userPicksInRound(round);
  if(!myPicks.length) return;
  const pr = G.prospects[i];
  const rook = makePlayer(pr.pos, pr.rating, 22, 3);
  rook.name = pr.name;
  rook.salary = rookieSalaryFor(round);
  rook.history = [{y:G.year, k:'move', t:'Drafted Rd '+round+' by '+me.city, d:0}];
  me.roster.push(rook);
  G.draftClass.push({ round, tier: DRAFT_TIERS[round-1].label, id: rook.id });
  G.draftPicks.splice(G.draftPicks.indexOf(myPicks[0]), 1); // spend one of this round's picks
  advanceDraftRound();
}
/* pass on the CURRENT pick (not necessarily the whole round — you may have more picks left in it) */
function passDraftRound(){
  const round = G.draftRound;
  const myPicks = userPicksInRound(round);
  if(myPicks.length) G.draftPicks.splice(G.draftPicks.indexOf(myPicks[0]), 1);
  advanceDraftRound();
}
function advanceDraftRound(){
  const round = G.draftRound;
  if(userPicksInRound(round).length > 0){
    // more of your own picks left in this round (traded for extras) — fresh board, same round
    G.prospects = makeProspects(round);
    save(); render();
    return;
  }
  aiDraftRound(round); // resolve every AI club's picks for the round now that yours are done
  G.draftRound++;
  if(G.draftRound > DRAFT_ROUNDS){ save(); render(); return; } // falls through to the review screen
  enterDraftRound();
  save(); render();
}
function simulateRestOfDraft(){
  const me = meT();
  for(let round = G.draftRound; round <= DRAFT_ROUNDS; round++){
    const tier = DRAFT_TIERS[round-1];
    userPicksInRound(round).slice().forEach(pk => {
      if(me.roster.length < LIMIT_OFF){
        const fit = draftBestFit(me, tier);
        const rook = makePlayer(fit.pos, fit.rating, 22, 3);
        rook.salary = rookieSalaryFor(round);
        rook.history = [{y:G.year, k:'move', t:'Drafted Rd '+round+' by '+me.city, d:0}];
        me.roster.push(rook);
        G.draftClass.push({ round, tier: tier.label, id: rook.id });
      }
      G.draftPicks.splice(G.draftPicks.indexOf(pk), 1);
    });
    aiDraftRound(round);
  }
  G.draftRound = DRAFT_ROUNDS + 1;
  save(); render();
}
function finishDraft(){
  aiFillRosters();
  G.otaWeek = 1;
  G.phase = 'ota';
  save(); render();
}
function runOTA(focus){
  // one May week of team drills; young players in the focus groups develop
  const groups = focus==='pass' ? ['QB','WR','TE','CB','S'] : focus==='run' ? ['RB','OL','DL','LB'] : POS_ORDER.filter(p=>p!=='K');
  const me = meT();
  const young = me.roster.filter(p => p.age <= 26 && groups.includes(p.pos) && p.rating < 95);
  const picked = young.sort(() => Math.random()-.5).slice(0, 3);
  G.otaReport = picked.map(p => { const g = RI(1, focus==='team' ? 1 : 2); p.rating = clamp(p.rating+g,50,99); logEv(p,'dev','OTA reps',g); return {name:p.name, pos:p.spot, delta:g}; });
  G.otaWeek++;
  if(G.otaWeek > 4){ G.phase = 'camp'; }
  save(); render();
}
function simOTAs(){ while(G.phase==='ota') runOTA('team'); }
function runCamp(){
  // late-July padded practices: extra training points + a couple of camp risers
  G.trainPts += 4;
  const me = meT();
  const risers = me.roster.filter(p => p.rating < 95).sort(() => Math.random()-.5).slice(0, 2);
  G.campReport = risers.map(p => { p.rating = clamp(p.rating+1,50,99); logEv(p,'dev','Training camp riser',1); return {name:p.name, pos:p.spot, delta:1}; });
  // preseason slate: 3 random opponents
  G.preOpps = [];
  while(G.preOpps.length < 3){
    const o = RI(0,15);
    if(o !== G.userTeam && !G.preOpps.includes(o)) G.preOpps.push(o);
  }
  G.preWeek = 1; G.preResults = []; G.preReport = null;
  G.phase = 'preseason';

}
function afterPreseasonGame(won, myScore, oppScore){
  const me = meT();
  if(won) me.preW++; else me.preL++;
  G.preResults.push({opp: G.preOpps[G.preWeek-1], my: myScore, op: oppScore, won});
  // camp battles: young guys develop with preseason reps — captured in a post-game report
  const report = {devs: [], injuries: []};
  const young = me.roster.filter(p => p.age <= 25 && p.rating < 90);
  for(let i=0;i<2;i++){
    if(young.length && Math.random() < .6){
      const p = pick(young);
      p.rating = clamp(p.rating+1, 50, 99);
      logEv(p, 'dev', 'Preseason live reps', 1);
      const ex = report.devs.find(d => d.id === p.id);
      if(ex) ex.delta++; else report.devs.push({id:p.id, name:p.name, pos:p.spot, ovr:p.rating, delta:1});
    }
  }
  // light injury risk
  if(Math.random() < .12){
    const h = me.roster.filter(p => p.injWeeks === 0 && p.pos !== 'K');
    if(h.length){ const p = pick(h); p.injWeeks = RI(1,2); G.lastInjury = p; logEv(p,'inj','Injured in preseason — out '+p.injWeeks+' wk'+(p.injWeeks>1?'s':''),0); report.injuries.push({name:p.name, pos:p.spot, weeks:p.injWeeks}); }
  }
  G.preReport = report;
  G.teams.forEach(t => t.roster.forEach(p => { if(p.injWeeks>0 && Math.random()<.5) p.injWeeks--; }));
  G.preWeek++;
  if(G.preWeek > 3) G.phase = 'cutdown';
  else G.phase = 'preseason';
  save(); render();
}
function playPre(){
  const opp = G.preOpps[G.preWeek-1];
  const home = G.preWeek !== 2;
  startGame({game: home ? {a:G.userTeam, b:opp} : {a:opp, b:G.userTeam}, preseason:true});
}
function simPre(){
  LINEUP = 'pre';

  const r = quickSim(G.userTeam, opp);

function confirmCutdown(){
  const me = meT();
  if(me.roster.length > LIMIT_REG){ alert('Still over the limit — you must get to '+LIMIT_REG+'.'); return; }
  if(!meetsMinimums(me)){ alert('Roster doesn\'t meet positional minimums (QB2 RB3 WR5 TE3 OL8 DL6 LB5 CB4 S3 K1).'); return; }
  aiCutdowns();

}
function doAutoCut(){
  const me = meT();
  const keep = autoCutList(me);
  const cuts = me.roster.filter(p => !keep.has(p.id));
  me.roster = me.roster.filter(p => keep.has(p.id));
  cuts.forEach(p => { p.years = 0; G.fa.push(p); });
  G.fa.sort((a,b) => b.rating - a.rating);

}
function fillMinimumsFor(t){
  POS_ORDER.forEach(pos => {
    while(posCount(t, pos) < (MIN53[pos] || 0) && t.roster.length < LIMIT_OFF){
      let cand = G.fa
        .filter(p => p.pos === pos && salaryFor(p.rating, p.pos, p.age) <= capRoom(t))
        .sort((a,b) => b.rating - a.rating)[0];
      if(cand) G.fa.splice(G.fa.indexOf(cand), 1);
      else cand = makePlayer(pos, R(54,64), RI(22,27), 1); // camp body off the street
      cand.salary = salaryFor(cand.rating, cand.pos, cand.age);
      cand.years = Math.max(1, cand.years || 1);
      cand.injWeeks = 0; cand.dressed = true;
      t.roster.push(cand);
    }
  });
}
function fillMinimums(){

  save(); render();
}
