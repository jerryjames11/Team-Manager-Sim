function faPoolRowsHTML(pool, me, limit){
  if(!pool.length) return '<tr><td colspan="9" class="sub">Nobody matches this filter.</td></tr>';
  let s = '';
  pool.forEach(x => {
    const p = x.p;
    const sal = x.isFA ? marketFor(p) : p.salary;
    const years = x.isFA ? p.askYears : p.years;
    const teamCell = x.isFA ? '<span class="tag fa">FA</span>' : '<b>'+esc(x.teamLabel)+'</b>';
    const afford = x.isFA && sal <= capRoom(me) && activeCount(me) < limit && !rosterFrozen();
    const premium = x.isFA && isPremiumFA(p);
    let action;
    if(premium){
      const n = interestedTeams(p).length;
      action = '<button class="btn tiny primary" onclick="toggleFAOffer('+p.id+')">'+(faOpenId===p.id?'▲ Negotiating':'Make Offer')+'</button>';
      s += '<tr><td>'+pn(p)+'</td><td><b>'+p.spot+'</b></td><td>'+teamCell+'</td><td>'+p.age+'</td>' +
        '<td style="color:var(--gold);font-weight:700">'+p.rating+'</td><td>'+money(sal)+(n?' <span class="sub" style="color:var(--gold)">🔥'+n+'</span>':'')+'</td><td>'+years+'yr</td><td>'+schemeCell(p)+'</td>' +
        '<td>'+action+'</td></tr>';
      if(faOpenId === p.id) s += faOfferRowHTML(p, me);
    } else {
      action = x.isFA
        ? '<button class="btn tiny primary" '+(afford?'':'disabled')+' onclick="signFA('+p.id+')">Sign</button>'
        : (x.teamIdx === G.userTeam ? '<span class="sub">Your roster</span>' : '<span class="sub">—</span>');
      s += '<tr><td>'+pn(p)+'</td><td><b>'+p.spot+'</b></td><td>'+teamCell+'</td><td>'+p.age+'</td>' +
        '<td style="color:var(--gold);font-weight:700">'+p.rating+'</td><td>'+money(sal)+'</td><td>'+years+'yr</td><td>'+schemeCell(p)+'</td>' +
        '<td>'+action+'</td></tr>';
    }
  });
  return s;
}

function myProspect(){ return (G.draftPool||[]).find(p => p.id === G.myProspectId) || null; }
function doPreDraftWorkout(){
  if(!G.preDraftPhase || (G.preDraftWorkoutsLeft||0) <= 0) return;
  const pr = myProspect();
  if(!pr) return;
  const roll = Math.random();
  let delta, note;
  if(roll < .15){ delta = -RI(0,2); note = 'Had an off day — a little rusty out there.'; }
  else if(roll < .75){ delta = RI(1,3); note = 'Solid session — tightened up the range a bit.'; }
  else { delta = RI(4,6); note = 'Excellent workout — teams took real notice.'; }
  pr.scoutLo = clamp(pr.scoutLo + delta, 50, 99);
  pr.scoutHi = clamp(pr.scoutHi + Math.max(0, Math.round(delta*.6)), pr.scoutLo, 99);
  G.preDraftWorkoutsLeft--;
  G.preDraftLog.unshift(note+' Now projecting '+pr.scoutLo+'–'+pr.scoutHi+' OVR.');
  save(); render();
}
function doProDay(){
  if(!G.preDraftPhase || G.preDraftProDayUsed) return;
  const pr = myProspect();
  if(!pr) return;
  G.preDraftProDayUsed = true;
  const roll = Math.random();
  let note;
  if(roll < .25){
    const hit = RI(6,12);
    pr.scoutLo = clamp(pr.scoutLo-hit,50,99); pr.scoutHi = clamp(pr.scoutHi-Math.round(hit*.6),50,99);
    note = 'Pro Day disaster — teams saw enough to get worried.';
  } else if(roll < .65){
    const bump = RI(2,5);
    pr.scoutLo = clamp(pr.scoutLo+bump,50,99); pr.scoutHi = clamp(pr.scoutHi+bump,50,99);
    note = 'Solid Pro Day — a real, if modest, bump across the board.';
  } else {
    const bump = RI(8,14);
    pr.scoutHi = clamp(pr.scoutHi+bump,50,99); pr.scoutLo = clamp(pr.scoutLo+Math.round(bump*.5),50,99);
    note = 'Electric Pro Day — you\'re the talk of the league today.';
  }
  if(pr.scoutLo > pr.scoutHi) pr.scoutHi = pr.scoutLo;
  G.preDraftLog.unshift(note+' Now projecting '+pr.scoutLo+'–'+pr.scoutHi+' OVR.');
  save(); render();
}
function beginDraftForReal(){
  G.preDraftPhase = false;
  advanceDraftPointerPlayerMode();
  save(); render();
}
function advanceDraftPointerPlayerMode(){
  while(G.draftPickIdx < DRAFT_ROUNDS*16){
    const round = Math.floor(G.draftPickIdx / 16) + 1;
    const slotInRound = G.draftPickIdx % 16;
    const origTeam = G.draftOrderList[slotInRound];
    const pickObj = G.draftPicks.find(pk => pk.year===G.year && pk.round===round && pk.orig===origTeam);
    if(!pickObj){ G.draftPickIdx++; continue; }
    const owner = pickObj.team;
    const t = G.teams[owner];
    if(t.roster.length < LIMIT_OFF && G.draftPool.length){
      const pr = aiSelectProspect(t);
      if(pr){
        const wasMe = pr.id === G.myProspectId;
        const rook = draftProspect(pr.id, owner, pickObj);
        G.draftPickIdx++;
        if(wasMe && rook){
          G.userTeam = owner;
          G.playerId = rook.id;
          G.playerDraftReveal = { team: owner, round, pickNum: G.draftPickIdx, undrafted:false };
          save(); render();
          return;
        }
        continue;
      }
    } else {
      G.draftPicks = G.draftPicks.filter(pk => pk.id !== pickObj.id);
    }
    G.draftPickIdx++;
  }
  // draft's over — if "You" never got picked, this is a real UDFA (undrafted free agent), same as real football
  const stillMine = G.draftPool.find(pr => pr.id === G.myProspectId);
  if(stillMine){
    const idx = G.draftPool.indexOf(stillMine);
    G.draftPool.splice(idx,1);
    const room = G.teams.filter(t => t.roster.length < LIMIT_OFF).sort((a,b) => capRoom(b)-capRoom(a));
    const t = room[0] || G.teams[RI(0,15)];
    const rook = makePlayer(stillMine.pos, stillMine.trueRating, stillMine.age, 1, stillMine.spot);
    rook.name = stillMine.name; rook.home = stillMine.home; rook.college = stillMine.college; rook.hgt = stillMine.hgt;
    rook.salary = ROOKIE_SALARY[3].min; // UDFA money — bottom of the rookie scale
    rook.history = [{y:G.year, k:'move', t:'Signed as an undrafted free agent by '+t.city, d:0}];
    t.roster.push(rook);
    G.userTeam = t.idx;
    G.playerId = rook.id;
    G.playerDraftReveal = { team: t.idx, round: 0, pickNum: 0, undrafted: true };
    save(); render();
  }
}
function acknowledgeDraftReveal(){
  G.playerDraftReveal = null;

  finishDraft(); simOTAs(); runCamp();
  save(); render();
}
function mePlayer(){
  if(G.playerFreeAgent) return G.playerFreeAgent;
  return (G.playerId && G.userTeam != null) ? (meT().roster.find(p => p.id === G.playerId) || null) : null;
}
function playerHandleTag(){
  const me = meT();
  const myP = mePlayer();
  const pending = pendingUFAs(me);
  const worthTagging = pending.filter(p => (!myP || p.id !== myP.id) && (isPremiumFA(p) || interestedTeams(p).length > 0)).sort((a,b)=>b.rating-a.rating);
  if(!G.tagUsed && worthTagging.length){
    const target = worthTagging[0];
    const sal = tagSalaryFor(target);
    if(sal <= capRoom(me) + target.salary) tagPlayer(target.id);
  }
  pending.forEach(p => {
    if(myP && p.id === myP.id) return;
    if(p.tagged || p.years > 0 || p.rating < 60) return;
    const cost = userPrice(p, 1);
    if(cost <= capRoom(me) + p.salary) resignPlayer(p.id);
  });
  if(myP && myP.years <= 0 && !myP.tagged){
    G.playerPendingContract = { offer: userPrice(myP, 1), years: RI(2,3) };
    save(); render();
    return;
  }
  openFreeAgency();
}
function resolvePlayerContract(accept){
  const myP = mePlayer();
  const pc = G.playerPendingContract;
  if(!myP || !pc) return;
  if(accept){
    myP.years = pc.years; myP.salary = pc.offer; myP.resigned = true;
    myP.contract = { base: Array(pc.years).fill(pc.offer), bonusProration:0, bonusYearsLeft:0, totalBonus:0 };
    logEv(myP, 'ct', 'Re-signed with '+meT().city+' — '+money(pc.offer)+'/yr × '+pc.years, 0);
    G.playerPendingContract = null;
    openFreeAgency();
  } else {
    const me = meT();
    me.roster = me.roster.filter(p => p.id !== myP.id);
    G.playerFreeAgent = myP;
    const others = G.teams.filter(t => t.idx !== me.idx).sort(() => Math.random()-.5).slice(0,3);
    G.playerFAOffers = others.map(t => ({ teamIdx: t.idx, offer: Math.round(userPrice(myP,1) * R(0.88,1.18) * 10) / 10 }));
    G.playerPendingContract = null;
  }
  save(); render();
}
function signWithTeam(teamIdx){
  const myP = G.playerFreeAgent;
  const offerObj = (G.playerFAOffers||[]).find(o => o.teamIdx === teamIdx);
  if(!myP || !offerObj) return;
  const t = G.teams[teamIdx];
  myP.years = RI(2,3); myP.salary = offerObj.offer; myP.resigned = true; myP.dressed = true; myP.ir = false; myP.injWeeks = 0;
  myP.contract = { base: Array(myP.years).fill(offerObj.offer), bonusProration:0, bonusYearsLeft:0, totalBonus:0 };
  logEv(myP, 'move', 'Signed with '+t.city+' as a free agent — '+money(offerObj.offer)+'/yr', 0);
  t.roster.push(myP);
  G.userTeam = teamIdx;
  G.playerFreeAgent = null;
  G.playerFAOffers = null;
  openFreeAgency();
  save(); render();
}
function playerHandleOffseason(){
  const myP = mePlayer();
  if(myP && !G.playerRetireDecision && (myP.age >= 33 || myP.rating < 58)){
    G.playerRetireDecision = true;
    save(); render();
    return;
  }
  G.playerRetireDecision = false;
  advanceToTag();
}
function retirePlayer(){
  const myP = mePlayer();
  if(myP) G.playerCareerSnapshot = { name: myP.name, pos: myP.spot, finalRating: myP.rating, finalAge: myP.age };
  G.playerRetired = true;
  G.playerRetireDecision = false;

}
function playContinue(){
  G.playerRetireDecision = false;
  advanceToTag();

}
function playerAdvance(){
  if(G.playerRetired || G.playerDraftReveal || G.playerPendingContract || G.playerFAOffers || G.playerRetireDecision) return;
  switch(G.phase){
    case 'tag': playerHandleTag(); break;
    case 'fa': ownerHandleFA(); break;

    case 'preseason': ownerHandlePreseason(); break;
    case 'hub': ownerHandleWeek(); break;
    case 'playoffs': ownerHandlePlayoffs(); break;
    case 'offseason': playerHandleOffseason(); break;
    default: break;
  }
  save(); render();
}

function makeGMCandidate(){
  return {

    aggression: RI(20,90),   // higher = chases bigger trades/signings, tolerates more risk

  };
}
function makeGMPool(){ const pool=[]; for(let i=0;i<5;i++) pool.push(makeGMCandidate()); return pool.sort((a,b)=>b.rating-a.rating); }
function hireGM(id){

function logOwnerMove(text){

function setApprovalThreshold(v){ G.approvalThreshold = clamp(parseInt(v)||10, 3, 40); save(); render(); }
function requestApproval(obj){

}
function resolveApproval(accept){
  const a = G.pendingApproval;
  if(!a) return;
  const me = meT();
  if(accept){
    if(a.type === 'signing'){
      const p = G.fa.find(x => x.id === a.playerId);
      if(p) { signFA(p.id); logOwnerMove('Approved: signed '+p.name+'.'); }
    } else if(a.type === 'trade'){
      const them = G.teams[a.teamIdx];
      const giveP = me.roster.filter(p => a.giveIds.includes(p.id));
      const getP = them.roster.filter(p => a.getIds.includes(p.id));
      const givePk = G.draftPicks.filter(pk => a.givePickIds.includes(pk.id));
      const getPk = G.draftPicks.filter(pk => a.getPickIds.includes(pk.id));
      executeTrade(me, them, giveP, givePk, getP, getPk);
      logOwnerMove('Approved: trade with '+them.city+'.');
    } else if(a.type === 'budget'){
      G.staffCapBonus = (G.staffCapBonus||0) + a.amount;
      G.budgetAskYear = G.year;
      logOwnerMove('Approved: +'+money(a.amount)+' staff budget.');
    }
    G.gmConfidence = clamp((G.gmConfidence||60) + 2, 0, 100);
  } else {
    if(!G.gmRejected) G.gmRejected = [];
    if(a.type === 'signing') G.gmRejected.push(a.playerId);
    if(a.type === 'trade') G.gmRejected.push('trade:'+a.teamIdx);
    logOwnerMove('Rejected: '+a.summary);
    G.gmConfidence = clamp((G.gmConfidence||60) - 1, 0, 100);
  }
  G.pendingApproval = null;
  save(); render();
}

function ownerHandleTag(){

    if(sal <= capRoom(me) + target.salary){ tagPlayer(target.id); logOwnerMove('Tagged '+target.name+' ('+target.pos+') — '+money(sal)+' gtd.'); }
  }
  pending.forEach(p => {
    if(p.tagged || p.years > 0 || p.rating < 60) return;
    const cost = userPrice(p, 1);
    if(cost <= capRoom(me) + p.salary) { resignPlayer(p.id); logOwnerMove('Re-signed '+p.name+' — '+money(cost)+'/yr.'); }
  });
  openFreeAgency();
}
function ownerHandleFA(){
  const me = meT();
  const rejected = G.gmRejected || [];
  const need = teamNeed(me);
  if(need){
    const cand = G.fa.filter(p => p.pos===need && !rejected.includes(p.id)).sort((a,b)=>b.rating-a.rating)[0];
    if(cand){
      const cost = userPrice(cand, 1);
      if(cost <= capRoom(me) && (isPremiumFA(cand) || cost >= G.approvalThreshold)){
        const interest = interestedTeams(cand).length;
        requestApproval({
          type:'signing', playerId: cand.id,
          summary: 'Sign '+cand.name+' ('+cand.pos+', '+cand.rating+' OVR) — '+money(cost)+'/yr',
          reasoning: 'We need '+cand.pos+' depth. '+(interest ? interest+' other club'+(interest>1?'s are':' is')+' also circling — waiting risks losing him.' : 'No competing urgency, but a fair value at the position.')
        });
        return;
      }
    }
  }
  let guard = 6;
  while(guard-- > 0){
    const n2 = teamNeed(me);
    if(!n2) break;
    const c2 = G.fa.filter(p => p.pos===n2 && !isPremiumFA(p)).sort((a,b)=>b.rating-a.rating)[0];
    if(!c2) break;
    const cost2 = userPrice(c2, 1);
    if(cost2 > capRoom(me) || cost2 >= G.approvalThreshold) break;
    signFA(c2.id);
    logOwnerMove('Signed '+c2.name+' ('+c2.pos+') — '+money(cost2)+'/yr.');
  }
  G.gmRejected = [];
  advanceToDraft();
}
function ownerHandleDraft(){
  simulateRestOfDraft();

function ownerHandlePreseason(){

function ownerHandleWeek(){
  const me = meT();
  const offers = G.incomingOffers || [];
  const rejected = G.gmRejected || [];
  const offer = offers.find(o => !rejected.includes('trade:'+o.fromTeam));
  if(offer){
    const them = G.teams[offer.fromTeam];
    const askP = offer.theirAsk.map(id => { const p = me.roster.find(x=>x.id===id); return p ? p.name+' ('+p.pos+')' : '?'; });
    const giveP = offer.theirGive.map(id => { const p = them.roster.find(x=>x.id===id); return p ? p.name+' ('+p.pos+')' : '?'; });
    const askVal = offer.theirAsk.reduce((s,id)=>{ const p=me.roster.find(x=>x.id===id); return s+(p?tradeValue(p):0); },0);
    if(askVal >= G.approvalThreshold || offer.theirAsk.some(id => { const p = me.roster.find(x=>x.id===id); return p && isPremiumFA(p); })){
      requestApproval({
        type:'trade', teamIdx: offer.fromTeam,
        giveIds: offer.theirAsk, givePickIds: offer.theirAskPicks, getIds: offer.theirGive, getPickIds: offer.theirGivePicks,
        summary: esc(them.city)+' want '+askP.join(', ')+' for '+giveP.join(', '),
        reasoning: 'They came to us. Turning it down costs nothing — but a fair offer for a piece we can replace is real cap room and picks back.'
      });
      return;
    }
    resolveIncomingOffer(offer.id, 'accept');
    logOwnerMove('Accepted trade with '+them.city+'.');
  }
  simWeek();
}

function ownerHandleOffseason(){

function mandateMet(){
  const me = meT();
  const won = me.w >= me.l;
  if(G.mandate === 'compete') return me.w >= 9;
  if(G.mandate === 'rebuild') return true; // judged on development, not record — always "on track" for v1
  return won;
}
function applySeasonReview(){
  const me = meT();
  const met = mandateMet();
  G.gmConfidence = clamp((G.gmConfidence||60) + (met ? 8 : -14), 0, 100);
}
function fireGM(){
  if(!confirm('Fire '+ (G.gm?G.gm.name:'your GM') + '? You\'ll need to hire a replacement before the league year opens.')) return;
  logOwnerMove('Fired '+(G.gm?G.gm.name:'the GM')+'.');
  G.gm = null;
  G.gmPool = makeGMPool();
  save(); render();
}
function ownerAdvance(){
  if(!G.gm){ if(!G.gmPool) G.gmPool = makeGMPool(); render(); return; }
  if(G.pendingApproval) return;
  if(G.phase === 'offseason' && !G.ownerReviewShown){ applySeasonReview(); }
  switch(G.phase){
    case 'tag': ownerHandleTag(); break;
    case 'fa': ownerHandleFA(); break;
    case 'draft': ownerHandleDraft(); break;
    case 'preseason': ownerHandlePreseason(); break;
    case 'hub': ownerHandleWeek(); break;
    case 'playoffs': ownerHandlePlayoffs(); break;
    case 'offseason': ownerHandleOffseason(); break;
    default: break;
  }
  save(); render();
}

function depthTableHTML(t, form, lu, side){

    s += '</div><p class="sub">Run '+(oForm.runMod>=0?'+':'')+oForm.runMod+' · Pass '+(oForm.passMod>=0?'+':'')+oForm.passMod+'. Best fits line up automatically — click a slot (chart or table) to hand-pick who starts there instead. Gold dot = manually set. Red ring = out of natural position.'+(oManual?' <button class=\"btn tiny\" style=\"margin-left:6px\" onclick=\"resetLineup(\'off\')\">Reset to Auto</button>':'')+'</p>';
    s += depthChartSVG(oForm, oLu, false, 'off') + depthTableHTML(me, oForm, oLu, 'off');

  } else {
    s += '<div class="panel" style="margin-bottom:12px"><div class="hd disp">Defense — '+dForm.name+'</div>';
    s += '<div class="filterbar">';
    Object.keys(DEF_FORMS).forEach(k => {
      const f = DEF_FORMS[k];

    });
    s += '</div><p class="sub">Run D '+(dForm.runMod>=0?'+':'')+dForm.runMod+' · Pass D '+(dForm.passMod>=0?'+':'')+dForm.passMod+' · '+SCHEME_TAG[dForm.scheme]+' scheme. Front-seven players tagged for the other scheme take a −'+SCHEME_PENALTY+' hit; versatile (VERS) players fit anywhere.'+(dManual?' <button class=\"btn tiny\" style=\"margin-left:6px\" onclick=\"resetLineup(\'def\')\">Reset to Auto</button>':'')+'</p>';
    s += depthChartSVG(dForm, dLu, true, 'def') + depthTableHTML(me, dForm, dLu, 'def');

  }
  s += '<div class="panel">'+minimumsHTML(me)+'</div>';
  return s;
}
function resetLineup(side){
  const formKey = side === 'off' ? G.offForm : G.defForm;
  if(G.lineupOverride) delete G.lineupOverride[formKey];
  save(); render();
}
function setAssign(side, i, pid){
  const me = meT();
  const form = side === 'off' ? offFormOf(me) : defFormOf(me);
  const formKey = side === 'off' ? offFormKeyOf(me) : defFormKeyOf(me);
  const lu = lineupFor(me, form, formKey); // lineup as it stands right now, before this change
  const displaced = lu[i] && lu[i].p;                          // whoever currently holds the target slot
  const theirSlot = lu.findIndex(x => x.p && x.p.id === pid);  // where the newly-picked player is starting now, if anywhere
  if(!G.lineupOverride) G.lineupOverride = {};
  if(!G.lineupOverride[formKey]) G.lineupOverride[formKey] = {};
  G.lineupOverride[formKey][i] = pid;
  if(theirSlot !== -1 && theirSlot !== i && displaced && displaced.id !== pid){
    // pull the player straight out of their current spot, regardless of where that is,
    // and drop whoever they're replacing into the vacated slot
    G.lineupOverride[formKey][theirSlot] = displaced.id;
  }
  save(); closeModal();
}
function clearAssign(side, i){
  const formKey = side === 'off' ? G.offForm : G.defForm;
  if(G.lineupOverride && G.lineupOverride[formKey]) delete G.lineupOverride[formKey][i];
  save(); closeModal();
}

      '<td>'+c.p.spot+'</td><td style="color:var(--gold);font-weight:700">'+c.eff+'</td>' +
      '<td><button class="btn tiny primary" '+(isCurrent?'disabled':'')+' onclick="setAssign(\''+side+'\','+i+','+c.p.id+')">Start Here</button></td></tr>';
  });
  s += '</table></div>';
  return s;
}
/* ---------- injured reserve ---------- */
function placeOnIR(pid){
  const me = meT();
  const p = me.roster.find(x => x.id === pid);
  if(!p || p.injWeeks <= 0 || p.ir || G.phase !== 'hub') return;
  p.ir = true; p.dressed = false;
  logEv(p, 'inj', 'Placed on season-ending IR', 0);
  save(); render();
}

/* ---------- trades ---------- */
/* Trade window opens with the new league year (Mar 1) and runs through the in-season deadline
   (Tuesday after Week 9) — covering FA, the draft, OTAs, camp, preseason, cutdown, and Weeks 1-9. */
let tradeTeam = null;
let tradeSortState = {mine:{key:'rating',dir:-1}, theirs:{key:'rating',dir:-1}};
let tradeFilterState = {give:'', get:''};
let tradeRosterOpen = {mine:false, theirs:false};

function tradesOpen(){
  if(['fa','draft','ota','camp','preseason','cutdown'].includes(G.phase)) return true;
  if(G.phase === 'hub' && G.week <= 9) return true;
  return false;
}
function tradeValue(p){ return p.rating - Math.max(0, p.age - 27) * 1.5 + (p.years >= 2 ? 1 : 0); }
const PICK_BASE_VALUE = {1:26, 2:14, 3:7, 4:3};
function pickValue(pk){
  const base = PICK_BASE_VALUE[pk.round] || 3;
  const yearsOut = Math.max(0, pk.year - G.year);
  return base * Math.pow(0.85, yearsOut);
}
function pickLabel(pk){ return pk.year+' · Round '+pk.round; }

/* persistent per-team negotiation carts — switching teams (via dropdown or an incoming offer) never loses progress */
function tradeCart(teamIdx){
  if(!G.tradeCarts) G.tradeCarts = {};
  if(!G.tradeCarts[teamIdx]) G.tradeCarts[teamIdx] = {give:[], givePicks:[], get:[], getPicks:[]};
  return G.tradeCarts[teamIdx];
}
function tradeCounterFor(teamIdx){ return (G.tradeCounters||{})[teamIdx] || null; }
function clearTradeCounter(teamIdx){ if(!G.tradeCounters) G.tradeCounters = {}; G.tradeCounters[teamIdx] = null; }
function resetTradeCart(){
  if(tradeTeam == null) return;
  G.tradeCarts[tradeTeam] = {give:[], givePicks:[], get:[], getPicks:[]};
  clearTradeCounter(tradeTeam);
  save();
}
function setTradeTeam(i){ tradeTeam = i; tradeRosterOpen = {mine:false, theirs:false}; render(); }
function toggleArr(arr, id){ const i = arr.indexOf(id); if(i>=0) arr.splice(i,1); else arr.push(id); }
function toggleGive(pid){
  const p = meT().roster.find(x => x.id === pid);
  if(p && p.protectedAsset && !tradeCart(tradeTeam).give.includes(pid)){ alert(esc(p.name)+' is marked Protected — cycle his status off the trade block first if you really want to move him.'); return; }
  toggleArr(tradeCart(tradeTeam).give, pid); clearTradeCounter(tradeTeam); save(); render();
}
function toggleGivePick(id){ toggleArr(tradeCart(tradeTeam).givePicks, id); clearTradeCounter(tradeTeam); save(); render(); }
function toggleGet(pid){
  const them = G.teams[tradeTeam];
  const p = them && them.roster.find(x => x.id === pid);
  if(p && isProtectedForTeam(p, them) && !tradeCart(tradeTeam).get.includes(pid)){ alert(esc(p.name)+' is a protected asset — '+esc(them.city)+' won\'t part with him at any price.'); return; }
  toggleArr(tradeCart(tradeTeam).get, pid); clearTradeCounter(tradeTeam); save(); render();
}
function toggleGetPick(id){ toggleArr(tradeCart(tradeTeam).getPicks, id); clearTradeCounter(tradeTeam); save(); render(); }
function setTradeFilter(which, pos){ tradeFilterState[which] = pos; render(); }
function setTradeSort(which, key){
  const s = tradeSortState[which];
  if(s.key === key) s.dir = -s.dir; else { s.key = key; s.dir = key==='name'?1:-1; }
  render();
}

/* trade block — mark your own players available; AI availability is a light surplus-depth heuristic */
function cycleBlockStatus(pid){
  const p = meT().roster.find(x => x.id === pid);
  if(!p) return;
  if(p.onBlock){ p.onBlock = false; p.protectedAsset = true; }
  else if(p.protectedAsset){ p.protectedAsset = false; }
  else { p.onBlock = true; }
  save(); render();
}
function isProtectedForTeam(p, t){
  if(t.idx === G.userTeam) return !!p.protectedAsset;
  // AI: a genuine star, or their single best player if he's clearly good, is off the table
  const best = t.roster.filter(x=>!x.ir).sort((a,b)=>b.rating-a.rating)[0];
  return p.rating >= 88 || (best && best.id === p.id && p.rating >= 82);
}
function blockStatusHTML(p, t, interactive){
  const prot = isProtectedForTeam(p, t);
  const state = p.onBlock ? 'avail' : (prot ? 'prot' : 'neutral');
  const label = state==='avail' ? '🎯 Available' : state==='prot' ? '🔒 Protected' : 'Tradeable';
  const color = state==='avail' ? 'var(--gold)' : state==='prot' ? 'var(--red)' : 'var(--muted)';
  const bg = state==='avail' ? 'rgba(255,212,71,.12)' : state==='prot' ? 'rgba(226,85,85,.12)' : 'transparent';
  const click = interactive===false ? '' : ' onclick="cycleBlockStatus('+p.id+')"';
  return '<span class="blockstate" style="color:'+color+';background:'+bg+';border:1px solid '+color+(interactive===false?';cursor:default':'')+'"'+click+'>'+label+'</span>';
}
function isOnBlock(p, t){
  if(t.idx === G.userTeam) return !!p.onBlock;
  const starterCount = MIN53[p.pos] || 1;
  return posCount(t, p.pos) > starterCount && p.rating < 80;
}

function tradeSideValue(giveP, givePk, getP, getPk){
  const giveVal = giveP.reduce((s,p)=>s+tradeValue(p),0) + givePk.reduce((s,pk)=>s+pickValue(pk),0);
  const getVal = getP.reduce((s,p)=>s+tradeValue(p),0) + getPk.reduce((s,pk)=>s+pickValue(pk),0);
  return {giveVal, getVal};
}
/* shared value read used both for the live bar (as you build) and for real accept/counter/reject resolution */
function tradeVerdict(giveVal, getVal, needBonus){
  if(!giveVal && !getVal) return {tier:'empty', color:'var(--muted)', text:'No offer built yet — add players or picks below.'};
  const needed = Math.max(0, getVal + 1.5 - needBonus);
  const ratio = needed <= 0 ? 999 : giveVal / needed;
  if(ratio >= 1) return {tier:'accept', color:'var(--green)', text: ratio > 1.3 ? 'Very generous — you could probably offer less.' : 'Favorable to you — they may still ask for a bit more.'};
  if(ratio >= 0.85) return {tier:'soft', color:'var(--gold)', text:'Close — they may counter rather than accept outright.'};
  return {tier:'reject', color:'var(--red)', text:'Too light — they\'re unlikely to even counter this.'};
}
function suggestCounterAsset(teamIdx, gapValue){
  const me = meT();
  const cart = tradeCart(teamIdx);
  const availPicks = G.draftPicks.filter(pk => pk.team===me.idx && !cart.givePicks.includes(pk.id)).sort((a,b)=>pickValue(a)-pickValue(b));
  const fitPick = availPicks.find(pk => pickValue(pk) >= gapValue);
  if(fitPick) return {kind:'pick', id:fitPick.id, label: pickLabel(fitPick)};
  const availPlayers = me.roster.filter(p => !p.ir && !cart.give.includes(p.id)).sort((a,b)=>tradeValue(a)-tradeValue(b));
  const fitPlayer = availPlayers.find(p => tradeValue(p) >= gapValue);
  if(fitPlayer) return {kind:'player', id:fitPlayer.id, label: fitPlayer.name+' ('+fitPlayer.spot+')'};
  return null;
}
function executeTrade(me, them, giveP, givePk, getP, getPk){
  me.roster = me.roster.filter(p => !giveP.includes(p));
  them.roster = them.roster.filter(p => !getP.includes(p));
  giveP.forEach(p => {
    const dead = deadCapCharge(p);
    if(dead > 0){ chargeDeadCap(me, dead); logEv(p,'ct','Traded away — '+money(dead)+' in unamortized bonus hits '+me.city+' as dead money',0); }
    const c = contractOf(p);
    p.salary = Math.round((c.base[0]||p.salary) * 10) / 10;
    p.contract = { base: c.base.slice(), bonusProration: 0, bonusYearsLeft: 0, totalBonus: 0 };
    p.dressed = true; p.ir = false; p.onBlock = false; p.protectedAsset = false;
    logEv(p,'move','Traded to '+them.city,0); them.roster.push(p);
  });
  getP.forEach(p => {
    const dead = deadCapCharge(p);
    if(dead > 0){ chargeDeadCap(them, dead); logEv(p,'ct','Traded away — '+money(dead)+' in unamortized bonus hits '+them.city+' as dead money',0); }
    const c = contractOf(p);
    p.salary = Math.round((c.base[0]||p.salary) * 10) / 10;
    p.contract = { base: c.base.slice(), bonusProration: 0, bonusYearsLeft: 0, totalBonus: 0 };
    p.dressed = true; p.ir = false; p.onBlock = false; p.protectedAsset = false;
    logEv(p,'move','Traded to '+me.city,0); me.roster.push(p);
  });
  givePk.forEach(pk => { pk.team = them.idx; });
  getPk.forEach(pk => { pk.team = me.idx; });
}
function proposeTrade(){
  if(!tradesOpen()){ alert('The trade window is closed right now.'); return; }
  const me = meT(), them = G.teams[tradeTeam];
  if(!them || them.idx === me.idx) return;
  const cart = tradeCart(tradeTeam);
  const giveP = me.roster.filter(p => cart.give.includes(p.id));
  const getP = them.roster.filter(p => cart.get.includes(p.id));
  const givePk = G.draftPicks.filter(pk => cart.givePicks.includes(pk.id) && pk.team === me.idx);
  const getPk = G.draftPicks.filter(pk => cart.getPicks.includes(pk.id) && pk.team === them.idx);
  if(!giveP.length && !givePk.length){ alert('Add at least one player or pick to send.'); return; }
  if(!getP.length && !getPk.length){ alert('Add at least one player or pick to request.'); return; }
  const giveSal = giveP.reduce((s,p) => s + p.salary, 0);
  const getSal = getP.reduce((s,p) => s + p.salary, 0);
  if(payroll(me) - giveSal + getSal > CAP){ alert('That swap puts you over the cap.'); return; }
  if(payroll(them) - getSal + giveSal > CAP){ alert(esc(them.city)+' can\'t fit that under their cap.'); return; }
  const {giveVal, getVal} = tradeSideValue(giveP, givePk, getP, getPk);
  const need = teamNeed(them);
  const needBonus = giveP.filter(p => p.pos === need).length * 3;
  const verdict = tradeVerdict(giveVal, getVal, needBonus);
  if(verdict.tier === 'accept'){
    executeTrade(me, them, giveP, givePk, getP, getPk);
    const summary = (giveP.length||givePk.length ? (giveP.map(p=>p.name).concat(givePk.map(pickLabel)).join(', ')) : 'nothing') +
      ' for ' + (getP.length||getPk.length ? (getP.map(p=>p.name).concat(getPk.map(pickLabel)).join(', ')) : 'nothing');
    G.tradeCarts[tradeTeam] = {give:[], givePicks:[], get:[], getPicks:[]};
    clearTradeCounter(tradeTeam);
    alert('Trade accepted! You send '+esc(summary)+'.');
    save(); render();
    return;
  }
  if(verdict.tier === 'soft'){
    const needed = Math.max(0, getVal + 1.5 - needBonus);
    const gap = needed - giveVal;
    const suggestion = suggestCounterAsset(tradeTeam, gap);
    if(!suggestion){
      alert(esc(them.city)+' declined — they want more value back, and you don\'t have anything small enough left to close the gap.');
      return;
    }
    if(!G.tradeCounters) G.tradeCounters = {};
    G.tradeCounters[tradeTeam] = { who: esc(them.city)+' counters', suggestion, gapValue: gap };
    save(); render();
    return;
  }
  alert(esc(them.city)+' declined — that\'s too far off the value they want back.');
}
function acceptCounter(){
  if(tradeTeam == null) return;
  const counter = tradeCounterFor(tradeTeam);
  if(!counter) return;
  const cart = tradeCart(tradeTeam);
  if(counter.suggestion.kind === 'pick') cart.givePicks.push(counter.suggestion.id);
  else cart.give.push(counter.suggestion.id);
  clearTradeCounter(tradeTeam);
  save();
  proposeTrade();
}
function walkAwayFromCounter(){
  if(tradeTeam == null) return;
  resetTradeCart();
  render();
}

/* ---------- suggest a trade ---------- */
function suggestTrade(){
  if(tradeTeam == null) return;
  const me = meT(), them = G.teams[tradeTeam];
  const myNeed = teamNeed(me), theirNeed = teamNeed(them);
  const cart = tradeCart(tradeTeam);
  cart.give = []; cart.givePicks = []; cart.get = []; cart.getPicks = [];
  let offer = me.roster.filter(p => !p.ir && theirNeed && p.pos===theirNeed).sort((a,b)=>(b.onBlock?1:0)-(a.onBlock?1:0) || b.rating-a.rating)[0];
  if(!offer) offer = me.roster.filter(p => p.onBlock).sort((a,b)=>b.rating-a.rating)[0];
  if(offer) cart.give.push(offer.id);
  let ask = them.roster.filter(p => isOnBlock(p,them) && myNeed && p.pos===myNeed).sort((a,b)=>b.rating-a.rating)[0];
  if(!ask) ask = them.roster.filter(p => isOnBlock(p,them)).sort((a,b)=>b.rating-a.rating)[0];
  if(ask) cart.get.push(ask.id);
  if(offer && ask){
    const {giveVal, getVal} = tradeSideValue([offer],[],[ask],[]);
    const needBonus = offer.pos===theirNeed ? 3 : 0;
    const gap = (getVal + 1.5) - (giveVal + needBonus);
    if(gap > 0.5){
      const myPicks = G.draftPicks.filter(pk=>pk.team===me.idx).sort((a,b)=>pickValue(a)-pickValue(b));
      const fit = myPicks.find(pk=>pickValue(pk) >= gap);
      if(fit) cart.givePicks.push(fit.id);
    } else if(gap < -3){
      const theirPicks = G.draftPicks.filter(pk=>pk.team===them.idx).sort((a,b)=>pickValue(a)-pickValue(b));
      const fit = theirPicks.find(pk=>pickValue(pk) >= -gap);
      if(fit) cart.getPicks.push(fit.id);
    }
  }
  clearTradeCounter(tradeTeam);
  if(!offer && !ask) alert('Couldn\'t find a natural fit this time — try building a package manually.');
  save(); render();
}

/* ---------- incoming (AI-initiated) offers ---------- */
function generateIncomingOffers(){
  if(!tradesOpen()) return;
  const key = G.year+':'+G.week+':'+G.phase;
  if(G.offersGenKey === key) return;
  G.offersGenKey = key;
  if(!G.incomingOffers) G.incomingOffers = [];
  if(G.incomingOffers.length >= 2) return;
  if(Math.random() > 0.35) return;
  const me = meT();
  const aiTeams = G.teams.filter(t => t.idx !== G.userTeam && !G.incomingOffers.some(o=>o.fromTeam===t.idx));
  if(!aiTeams.length) return;
  const aiTeam = pick(aiTeams);
  const need = teamNeed(aiTeam);
  let target = me.roster.filter(p => p.onBlock && !p.ir && (!need || p.pos===need)).sort((a,b)=>b.rating-a.rating)[0];
  if(!target) target = me.roster.filter(p => need && p.pos===need && !p.ir).sort((a,b)=>b.rating-a.rating)[0];
  if(!target) return;
  const targetVal = tradeValue(target);
  const offerBudget = targetVal * R(0.75, 0.95);
  const theirPicks = G.draftPicks.filter(pk => pk.team===aiTeam.idx).sort((a,b)=>pickValue(b)-pickValue(a));
  const theirPlayers = aiTeam.roster.filter(p => isOnBlock(p, aiTeam) && p.id!==target.id).sort((a,b)=>tradeValue(b)-tradeValue(a));
  let offerGive = [], offerGivePicks = [], remaining = offerBudget;
  const fitPlayer = theirPlayers.find(p => tradeValue(p) <= remaining*1.2 && tradeValue(p) >= remaining*0.5);
  if(fitPlayer){ offerGive.push(fitPlayer.id); remaining -= tradeValue(fitPlayer); }
  for(const pk of theirPicks){ if(remaining <= 1) break; offerGivePicks.push(pk.id); remaining -= pickValue(pk); }
  if(!offerGive.length && !offerGivePicks.length) return;
  G.incomingOffers.push({
    id: G.nextId++, fromTeam: aiTeam.idx,
    theirGive: offerGive, theirGivePicks: offerGivePicks,
    theirAsk: [target.id], theirAskPicks: [],
    status: 'pending'
  });
}
function resolveIncomingOffer(offerId, action){
  const off = (G.incomingOffers||[]).find(o => o.id===offerId);
  if(!off) return;
  const me = meT(), them = G.teams[off.fromTeam];
  if(action === 'decline'){
    G.incomingOffers = G.incomingOffers.filter(o => o.id!==offerId);
    save(); render(); return;
  }
  if(action === 'counter'){
    const cart = tradeCart(off.fromTeam);
    cart.get = off.theirGive.slice(); cart.getPicks = off.theirGivePicks.slice();
    cart.give = off.theirAsk.slice(); cart.givePicks = off.theirAskPicks.slice();
    G.incomingOffers = G.incomingOffers.filter(o => o.id!==offerId);
    clearTradeCounter(off.fromTeam);
    tradeTeam = off.fromTeam;
    save(); render(); return;
  }
  if(action === 'accept'){
    const giveP = them.roster.filter(p => off.theirGive.includes(p.id));
    const givePk = G.draftPicks.filter(pk => off.theirGivePicks.includes(pk.id) && pk.team === them.idx);
    const getP = me.roster.filter(p => off.theirAsk.includes(p.id));
    const getPk = G.draftPicks.filter(pk => off.theirAskPicks.includes(pk.id) && pk.team === me.idx);
    if(!giveP.length && !givePk.length){ G.incomingOffers = G.incomingOffers.filter(o=>o.id!==offerId); save(); render(); return; }
    const giveSal = giveP.reduce((s,p)=>s+p.salary,0), getSal = getP.reduce((s,p)=>s+p.salary,0);
    if(payroll(them) - giveSal + getSal > CAP || payroll(me) - getSal + giveSal > CAP){
      alert('That trade no longer fits under the cap — declining it for you.');
      G.incomingOffers = G.incomingOffers.filter(o => o.id!==offerId);
      save(); render(); return;
    }
    executeTrade(me, them, getP, getPk, giveP, givePk);
    G.incomingOffers = G.incomingOffers.filter(o => o.id!==offerId);
    alert('Trade accepted with '+esc(them.city)+'!');
    save(); render();
  }
}

function tradeRosterTableHTML(which, team, selectedIds, toggleFnName, showBlock){
  const filter = tradeFilterState[which];
  const sort = tradeSortState[which];
  let pool = team.roster.filter(p => !p.ir);
  if(filter) pool = pool.filter(p => p.spot === filter);
  pool = pool.slice().sort((a,b) => {
    let va, vb;
    if(sort.key === 'spot'){ va = spotSortVal(a); vb = spotSortVal(b); }
    else { va = a[sort.key]; vb = b[sort.key]; }
    if(typeof va === 'string') return va.localeCompare(vb) * sort.dir;
    return ((va - vb) || (b.rating - a.rating)) * sort.dir;
  });
  let s = '<div class="rosterctl" style="margin-bottom:8px"><select class="fselect" onchange="setTradeFilter(\''+which+'\', this.value)">' + posFilterOptionsHTML() + '</select></div>';
  const cols = [['name','Player'],['rating','OVR'],['salary','$'],['status','Status']];
  s += '<table class="tbl"><tr>';
  cols.forEach(c => {
    if(c[0]==='status'){ s += '<th>Status</th>'; return; }
    const on = sort.key===c[0]; s += '<th class="sorth'+(on?' on':'')+'" onclick="setTradeSort(\''+which+'\',\''+c[0]+'\')">'+c[1]+(on?(sort.dir>0?' ▲':' ▼'):'')+'</th>';
  });
  s += '<th></th></tr>';
  if(!pool.length) s += '<tr><td colspan="5" class="sub">Nobody matches this filter.</td></tr>';
  pool.forEach(p => {
    const added = selectedIds.includes(p.id);
    const prot = isProtectedForTeam(p, team);

      '<td>'+blockStatusHTML(p, team, showBlock)+'</td>' +
      '<td><button class="btn tiny'+(added?' primary':'')+'" '+(prot?'disabled title="Protected — not tradeable"':'')+' onclick="'+toggleFnName+'('+p.id+')">'+(added?'✓ Added':(prot?'🔒':'+ Add'))+'</button></td></tr>';
  });
  s += '</table>';
  const picks = G.draftPicks.filter(pk => pk.team === team.idx).sort((a,b)=>a.year-b.year||a.round-b.round);
  if(picks.length){
    const pickToggle = toggleFnName === 'toggleGive' ? 'toggleGivePick' : 'toggleGetPick';

        '<button class="btn tiny'+(added?' primary':'')+'" onclick="'+pickToggle+'('+pk.id+')">'+(added?'✓ Added':'+ Add')+'</button></div>';
    });

  return s;

function trainPlayer(pid){
  const p = meT().roster.find(x => x.id === pid);
  if(!p || p.trained >= 5 || p.rating >= 99) return;
  let cost, rawGain;
  if(G.mode === 'player'){
    cost = 3; rawGain = 1;
  } else {
    const coach = posCoachOf(p.pos);
    cost = (coach && coach.rating >= 78) ? 1 : 2;
    rawGain = (coach && coach.rating >= 88) ? 2 : 1;
  }
  if(G.trainPts < cost) return;
  const gain = Math.min(rawGain, 5 - p.trained);
  G.trainPts -= cost;
  p.rating = clamp(p.rating + gain, 50, 99);
  p.trained += gain;
  logEv(p, 'dev', 'Trained in practice', gain);
  save(); render();
}

  const sit = el('situation');
  if(GM.over){ sit.innerHTML = '<b>FINAL</b>'; }
  else if(GM.pending==='try'){ sit.innerHTML = '<b>Point after</b> — choose your try'; }
  else sit.innerHTML = '<b>'+ordinal(GM.down)+' & '+(GM.spot+GM.dist>=100?'Goal':GM.dist)+'</b><span>Ball on '+spotText()+'</span><span>'+esc(G.teams[GM.poss].abbr)+' ball</span>'+(GM.preseason?'<span style="color:var(--gold)">PRESEASON</span>':'');
  buildCallsheet();
  drawFormation();
  const csb = el('coachSimBtn');
  if(csb) csb.textContent = '🎯 Coach Sim: ' + (coachSimActive ? 'ON' : 'OFF');
}
function playBtn(code, cls, label, sub, handler){
  return '<button class="play '+cls+'" onclick="'+handler+'(\''+code+'\')">'+label+'<small>'+sub+'</small></button>';
}
function buildCallsheet(){
  const grid = document.getElementById('playgrid');
  const title = document.getElementById('cs-title');
  const side = document.getElementById('cs-side');
  if(!grid) return;
  if(GM.over){ grid.innerHTML=''; title.textContent='Game Over'; side.textContent=''; return; }
  if(coachSimActive && coachSimAwaitingBreak){
    title.textContent = 'Coach Sim — Quarter Break';
    side.textContent = 'your move';
    grid.innerHTML = '<button class="play st" onclick="coachSimResume()">▶ Continue Auto-Play<small>keep coach sim running</small></button>' +
      '<button class="play st" onclick="openPage(\'depth\')">📋 Manage Lineup<small>give someone else reps</small></button>' +
      '<button class="play st" onclick="toggleCoachSim()">✋ Take Manual Control<small>call plays yourself</small></button>';
    return;
  }
  if(coachSimActive && !coachSimPausedFor4th){
    title.textContent = 'Coach Sim Running';
    side.textContent = 'auto-playing…';
    grid.innerHTML = '<button class="play st" onclick="toggleCoachSim()">✋ Take Manual Control<small>stop auto-play, call it yourself</small></button>';
    return;
  }
  if(GM.pending==='try'){
    if(userOnO()){
      title.textContent = 'Point After';
      side.textContent = 'your call';
      grid.innerHTML = playBtn('xp','st','Kick the XP','+1 · ~90%','doTry') + playBtn('2pt','shot','Go for Two','+2 · higher risk','doTry');
    } else grid.innerHTML='';
    return;
  }
  if(userOnO()){
    title.textContent = 'Offense — ' + ordinal(GM.down) + ' & ' + (GM.spot+GM.dist>=100?'Goal':GM.dist);
    side.textContent = coachSimPausedFor4th ? 'Coach Sim paused — your call' : 'you have the ball';
    let s = '';
    Object.keys(OFF_PLAYS).forEach(k => { const p = OFF_PLAYS[k]; s += playBtn(k, p.fam, p.label, p.sub, 'userCall'); });
    if(GM.down === 4){
      const fgDist = (100-GM.spot)+17;
      s += '<button class="play st" onclick="doPunt()">Punt<small>flip the field</small></button>';
      s += '<button class="play st" '+(fgDist>62?'disabled':'')+' onclick="doFG()">Field Goal<small>'+fgDist+' yds</small></button>';
    }
    const lead = myScore() - oppScore();
    if(GM.q>=4 && GM.clock<130 && lead>0 && GM.down<4) s += '<button class="play st" onclick="doKneel()">Kneel<small>burn the clock</small></button>';
    grid.innerHTML = s;
  } else {
    title.textContent = 'Defense — ' + ordinal(GM.down) + ' & ' + (GM.spot+GM.dist>=100?'Goal':GM.dist);
    side.textContent = GM.down===4 ? 'they may kick…' : 'guess their call';
    let s = '';
    Object.keys(DEF_PLAYS).forEach(k => { s += playBtn(k, 'def', DEF_PLAYS[k].label, DEF_PLAYS[k].sub, 'userCall'); });
    grid.innerHTML = s;
  }
}
function showFinal(){
  if(!GM) return;
  const el = document.getElementById('finalOverlay');
  if(!el) return;
  const H = G.teams[GM.home], A = G.teams[GM.away];
  const meHome = GM.home === G.userTeam;
  const won = meHome ? GM.hs > GM.as : GM.as > GM.hs;
  const body = GM.preseason
    ? (won ? 'Good exhibition tape. Some young players earned camp development.' : 'Sloppy, but it\'s preseason — the film matters more than the score.')
    : GM.playoff
      ? (G.playoffs.round === 3
          ? (won ? 'Apex Bowl champions! Owner confidence surges — +7 training points earned.' : 'So close to the Apex Bowl. Tough one — +3 training points earned.')
          : (won ? 'On to the next round. Owner confidence up — +5 training points earned.' : 'Season\'s over. Back to the film room — +2 training points earned.'))
      : (won ? 'The locker room is buzzing. Owner confidence up — +3 training points earned.' : 'Back to the film room. You earn +1 training point and the owner takes notes.');
  const champ = GM.playoff && G.playoffs && G.playoffs.round === 3 && won;
  const title = champ ? '🏆 Champions! 🏆' : (won ? 'Victory!' : 'Tough Loss');
  el.innerHTML = '<div class="overlay"><div class="card'+(won?' win':'')+'">' +
    (won ? '<div class="trophy">'+(champ ? '🏆' : '🏈')+'</div>' : '') +
    '<h2 class="disp'+(won?' winh':'')+'">'+(GM.preseason ? 'Preseason ' : '')+title+'</h2>' +
    '<div class="finalscore mono">'+H.abbr+' '+GM.hs+' — '+GM.as+' '+A.abbr+'</div>' +
    '<p>'+body+'</p><button class="btn primary" onclick="afterGame()">Continue →</button></div></div>';
  if(won && !reducedMotion){
    const ov = el.querySelector('.overlay');
    if(ov) confettiRain(ov, champ ? 80 : 40);
  }
}
function afterGame(){
  const res = gameResult();
  const wasPlayoff = GM.playoff, wasPre = GM.preseason;
  const meHome = GM.home === G.userTeam;
  const my = meHome ? GM.hs : GM.as, op = meHome ? GM.as : GM.hs;
  GM = null; LINEUP = 'full';
  if(wasPre){ afterPreseasonGame(my > op, my, op); return; }
  if(wasPlayoff){
    G.phase = 'playoffs';
    recordPlayoffUserResult(res);
  } else {
    finishWeek(res);
    if(G.phase !== 'playoffs') G.phase = 'hub';
  }
  save();
  openModal('gamereport');
}

/* ---------- playoffs ---------- */
function seedOf(idx){
  const P = G.playoffs;
  for(const c of [0,1]){
    const i = P.seeds[c].indexOf(idx);
    if(i >= 0) return (i+1);
  }
  return '';
}
function matchupHTML(g){
  if(!g) return '';
  function line(idx, score){
    const t = G.teams[idx];
    const w = g.done && g.winner === idx;
    return '<div class="t'+(w?' winner':'')+'"><span><span class="seed">#'+seedOf(idx)+'</span>'+esc(t.abbr+' '+t.name)+(idx===G.userTeam?' ★':'')+'</span><span>'+(g.done? score : '')+'</span></div>';
  }
  return '<div class="matchup">'+line(g.a, g.as)+line(g.b, g.bs)+'</div>';
}
function playoffsHTML(){
  const P = G.playoffs;
  let s = '<div class="panel" style="margin-bottom:12px"><div class="hd disp">UFA Playoffs — Season '+G.season+'</div>';
  const ug = playoffUserGame();
  if(P.champion != null){
    s += '<p class="sub">Champion crowned.</p>';
  } else if(ug){
    const opp = G.teams[ug.a===G.userTeam ? ug.b : ug.a];
    const rname = ['','Conference Semifinal','Conference Championship','APEX BOWL'][P.round];
    s += '<div class="nextgame"><div class="vs disp">'+rname+'<small>'+(ug.a===G.userTeam?'vs':'@')+' '+esc(opp.city+' '+opp.name)+' (#'+seedOf(opp.idx)+' seed) · '+fmtDate(weekDate(G.year,15+P.round))+'</small></div>' +
      '<div style="display:flex;gap:8px"><button class="btn primary" onclick="playPlayoffGame()">▶ Coach the Game</button><button class="btn" onclick="simPlayoffUser()">Sim It</button></div></div>';
  } else {
    s += '<p class="sub" style="margin-bottom:8px">' + (P.userIn ? '' : 'Your season is over — watch the bracket play out.') + '</p>' +
      '<button class="btn primary" onclick="simPlayoffRound()">Sim ' + ['','Semifinals','Conference Finals','Apex Bowl'][P.round] + ' →</button>';
  }
  s += '</div><div class="panel"><div class="bracket">';
  s += '<div class="brk-col"><h3>Semifinals</h3>' + P.r1.map(g=>matchupHTML(g)).join('') + '</div>';
  s += '<div class="brk-col"><h3>Conference Finals</h3>' + (P.r2.length? P.r2.map(g=>matchupHTML(g)).join('') : '<p class="sub" style="text-align:center">TBD</p>') + '</div>';
  s += '<div class="brk-col"><h3>Apex Bowl</h3>' + (P.r3.length? P.r3.map(g=>matchupHTML(g)).join('') : '<p class="sub" style="text-align:center">TBD</p>') + '</div>';
  s += '</div></div>';
  return s;
}
function playPlayoffGame(){ startGame({game: playoffUserGame(), playoff:true}); }
function simPlayoffUser(){
  const g = playoffUserGame();
  recordPlayoffUserResult(quickSim(g.a, g.b));
  save();
  openModal('gamereport');
}

/* ---------- offseason summary (re-sign window) ---------- */
function offseasonHTML(){
  const champ = G.teams[G.playoffs.champion];
  const me = meT();
  const iWon = G.playoffs.champion === G.userTeam;
  const expiring = me.roster.filter(p => p.years <= 1 && !p.resigned).sort((a,b) => b.rating - a.rating);
  let s = '<div class="panel" style="margin-bottom:12px;text-align:center">' +
    '<div class="hd disp" style="font-size:22px">'+(iWon ? '🏆 APEX BOWL CHAMPIONS 🏆' : 'Season '+G.season+' Complete')+'</div>' +
    '<p class="sub">'+esc(champ.city+' '+champ.name)+' win the Apex Bowl. You finished '+me.w+'–'+me.l+'. Owner confidence: '+G.confidence+'/100.</p></div>';
  s += '<div class="panel" style="margin-bottom:12px"><div class="hd disp">Expiring Contracts — re-sign before the market opens</div>' +
    '<p class="sub" style="margin-bottom:8px">These deals run out when the new league year opens on '+fmtDate(leagueYearDate(G.year+1))+'. Re-sign them now at market price, use the franchise tag in February, or they hit the open market — along with every other expiring player in the league.</p>' +
    capBarHTML(me);
  if(expiring.length){
    s += '<table class="tbl" style="margin-top:10px"><tr><th>Player</th><th>Pos</th><th>Age</th><th>OVR</th><th>New Deal</th><th></th></tr>';
    expiring.forEach(p => {
      const sal = marketFor(p, 1);
      s += '<tr><td>'+pn(p)+'</td><td><b>'+p.spot+'</b></td><td>'+p.age+'</td><td style="color:var(--gold);font-weight:700">'+p.rating+'</td><td>'+money(sal)+' · 2-3yr</td>' +
        '<td><button class="btn tiny primary" onclick="resignPlayer('+p.id+')">Re-sign</button></td></tr>';
    });
    s += '</table>';
  } else s += '<p class="sub" style="margin-top:8px">All your key contracts are locked up — nobody left to re-sign.</p>';
  s += '</div>';
  s += posNeedsHTML(me);
  s += '<div style="text-align:center"><button class="btn primary" onclick="advanceToTag()">Advance to Franchise Tag Window — '+fmtDate(tagStart(G.year+1))+' →</button></div>';
  return s;
}
function firedHTML(){
  const c = G.career;
  return '<div class="title-hero"><h1 class="disp" style="color:var(--red)">You\'re <span style="color:var(--red)">Fired</span></h1>' +
    '<p>The owner lost patience. Final line: '+c.w+'–'+c.l+' over '+(c.seasons)+' season'+(c.seasons===1?'':'s')+', '+c.berths+' playoff berth'+(c.berths===1?'':'s')+', '+c.titles+' title'+(c.titles===1?'':'s')+'.</p>' +
    '<div style="margin-top:18px"><button class="btn primary" onclick="store.clear();G=null;render()">Start a New Career</button></div></div>';
}

/* ---------- boot ---------- */
render();
</script>
</body>
