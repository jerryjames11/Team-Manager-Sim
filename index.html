  mp:{st: 1.8, ba: 0.2, ni:-1.6, bl: 0.8, pr:-1.8},
  pa:{st: 3.5, ba: 1.2, ni:-0.6, bl:-1.5, pr:-2.2},
  dp:{st: 2.5, ba: 0.6, ni:-1.0, bl:-2.0, pr:-4.5}
};
const PASS_PARAMS = {
  sp:{comp:.77, mean: 6.5, sd:3.0, sack:.035, int:.020},
  sc:{comp:.78, mean: 5, sd:5.5, sack:.030, int:.015},
  mp:{comp:.63, mean:13, sd:5.0, sack:.060, int:.032},
  pa:{comp:.60, mean:16, sd:7.0, sack:.080, int:.035},
  dp:{comp:.43, mean:27, sd:9.0, sack:.090, int:.050}
};
const Q_LEN = 600;

function startGame(opts){
  const g = opts.game;
  const home = g.a, away = g.b;
  if(opts.preseason){ LINEUP = 'pre'; }
  else {
    autoDress(G.teams[home === G.userTeam ? away : home], false);
    if(home === G.userTeam || away === G.userTeam) autoDress(meT(), true);
    LINEUP = 'dressed';
  }
  const openKick = Math.random() < .5 ? home : away;
  GM = {
    home, away, hs:0, as:0,
    q:1, clock:Q_LEN,
    poss: openKick, openRecv: openKick,
    spot:25, down:1, dist:10,
    over:false, ot:false, pending:null,
    hurry:false, playoff: !!opts.playoff, preseason: !!opts.preseason,
    runTend:0, passTend:0,
    log:[]
  };
  G.phase = 'game';
  render();
  logQ((GM.preseason ? 'PRESEASON — ' : '') + '1st Quarter — ' + tName(openKick) + ' receive the opening kickoff.');
  updateGameUI();
}
function tName(i){ return G.teams[i].city + ' ' + G.teams[i].name; }
function offT(){ return G.teams[GM.poss]; }
function defIdx(){ return GM.poss === GM.home ? GM.away : GM.home; }
function defT(){ return G.teams[defIdx()]; }
function userOnO(){ return GM.poss === G.userTeam; }
function myScore(){ return GM.home === G.userTeam ? GM.hs : GM.as; }
function oppScore(){ return GM.home === G.userTeam ? GM.as : GM.hs; }
function addPts(teamIdx, pts){ if(teamIdx === GM.home) GM.hs += pts; else GM.as += pts; }
function logMsg(t, cls){ GM.log.push({t, cls}); renderLog(); }
function logQ(t){ GM.log.push({t, cls:'q'}); renderLog(); }

function aiOffCall(){
  const t = offT();
  const runBias = clamp((offRush(t) - offPass(t))/40 + .5, .25, .7);
  const trailing = (GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs) < 0;
  const late = GM.q >= 4 && GM.clock < 240;
  if(GM.down >= 3 && GM.dist >= 7) return pick(['mp','mp','dp','sp','sc']);
  if(GM.dist <= 2) return pick(['ir','ir','or','pa']);
  if(late && trailing) return pick(['mp','sp','dp','pa','sc']);
  if(late && !trailing) return pick(['ir','ir','or','sp']);
  return Math.random() < runBias ? pick(['ir','or']) : pick(['sp','mp','pa','dp','sc']);
}
function aiDefCall(){
  const total = GM.runTend + GM.passTend;
  const userRunPct = total > 4 ? GM.runTend/total : .5;
  if(GM.q >= 4 && GM.clock < 150 && (GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs) < -4) return Math.random()<.6 ? 'pr' : 'ni';
  if(GM.dist <= 2) return Math.random() < .6 ? 'st' : 'bl';
  if(GM.down >= 3 && GM.dist >= 8) return pick(['ni','bl','ni','pr']);
  if(userOnO() && Math.random() < .55) return userRunPct > .58 ? pick(['st','st','ba','bl']) : pick(['ni','ba','bl','ni']);
  return pick(['ba','ba','ni','st','bl']);
}
function aiFourthDown(){
  const toGoal = 100 - GM.spot;
  const fgDist = toGoal + 17;
  const k = kRating(offT());
  const diff = GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs;
  const desperate = GM.q>=4 && GM.clock < 300 && diff < 0;
  if(desperate && (diff < -3 || fgDist > 52)){
    if(GM.dist <= 5 || fgDist > 60) return 'go';
    return fgDist <= 55 ? 'fg' : 'go';
  }
  if(fgDist <= (k>=82 ? 55 : 50)) return 'fg';
  if(GM.dist <= 1 && GM.spot > 55 && Math.random()<.5) return 'go';
  return 'punt';
}

function resolvePlay(oc, dc){
  const off = offT(), def = defT();
  const mod = MATCH[oc][dc];
  const isRun = OFF_PLAYS[oc].fam === 'run';
  let res = {oc, dc, oob:false};
  if(isRun){
    const edge = (offRush(off) - defRush(def))/100;
    let y = 4.6 + mod + edge*7 + gauss()*(oc==='or' ? 4.4 : 3.2);
    if(Math.random() < .055 + Math.max(0,edge)*.05) y += R(12, 45);
    if(Math.random() < .012){ res.type='fumble'; res.yards=Math.round(clamp(y,-3,6)); return res; }
    res.type='run'; res.yards=Math.round(y);
    res.oob = oc==='or' && Math.random() < .3;
    return res;
  }
  const p = PASS_PARAMS[oc];
  const edge = (offPass(off) - defPass(def))/100;
  let sack = p.sack + (dc==='bl' ? .05 : 0) - edge*.03;
  if(oc==='sc') sack *= .4;
  if(Math.random() < Math.max(.01, sack)){
    res.type='sack'; res.yards = -RI(4,9);
    if(Math.random() < .07){ res.type='fumble'; }
    return res;
  }
  let intc = p.int + (dc==='bl' ? .008 : 0) + (dc==='ni' && (oc==='mp'||oc==='sp') ? .012 : 0) - edge*.025;
  if(Math.random() < Math.max(.004, intc)){
    res.type='int'; res.yards = Math.round(p.mean*.7); return res;
  }
  let comp = p.comp + edge*.32 + mod*.02 + (dc==='pr' && oc!=='dp' ? .06 : 0) + (dc==='pr' && oc==='dp' ? -.14 : 0);
  if(Math.random() > clamp(comp,.12,.95)){ res.type='inc'; res.yards=0; return res; }
  let y = p.mean + mod + edge*9 + gauss()*p.sd;
  if(oc!=='dp' && Math.random() < .05 + Math.max(0,edge)*.05) y += R(10,35);
  res.type='pass'; res.yards=Math.round(Math.max(oc==='sc'? -4 : 0, y));
  res.oob = Math.random() < .28;
  return res;
}

function runoff(res){
  if(GM.pending) return;
  let t;
  if(res.type==='inc') t = 7;
  else if(res.oob) t = GM.hurry ? 9 : 14;
  else t = GM.hurry ? 17 : 37;
  GM.clock -= t;
  if(GM.clock <= 0) endQuarter();
}
function endQuarter(){
  GM.clock = Q_LEN;
  GM.q++;
  if(GM.q === 3){
    logQ('Halftime. ' + tName(GM.openRecv===GM.home?GM.away:GM.home) + ' receive the second-half kickoff.');
    startPossession(GM.openRecv === GM.home ? GM.away : GM.home, 25);
    return;
  }
  if(GM.q === 5){
    if(GM.hs !== GM.as){ finishGame(); return; }
    if(GM.preseason){ if(Math.random()<.5) GM.hs+=3; else GM.as+=3; finishGame(); return; }
    GM.ot = true; GM.clock = Q_LEN;
    logQ('OVERTIME — next score wins.');
    startPossession(Math.random()<.5 ? GM.home : GM.away, 25);
    return;
  }
  if(GM.q > 5){
    if(GM.hs === GM.as){ if(Math.random()<.5) GM.hs+=3; else GM.as+=3; }
    finishGame(); return;
  }
  logQ(['','','2nd Quarter','3rd Quarter','4th Quarter'][GM.q] || 'Quarter ' + GM.q);
}
function startPossession(teamIdx, spot){
  GM.poss = teamIdx; GM.spot = spot; GM.down = 1; GM.dist = 10;
}
function applyPlay(res){
  const offName = G.teams[GM.poss].abbr;
  if(userOnO()){ if(OFF_PLAYS[res.oc].fam==='run') GM.runTend++; else GM.passTend++; }
  if(res.type==='int' || res.type==='fumble'){
    const spotAfter = clamp(GM.spot + res.yards, 1, 99);
    logMsg(offName + ' — ' + (res.type==='int' ? 'INTERCEPTED! ' : 'FUMBLE! ') + tName(defIdx()) + ' take over.', 'bad');
    startPossession(defIdx(), 100 - spotAfter);
    runoff({type:'to'});
    return;
  }
  if(res.type==='inc'){
    logMsg(offName + ' — ' + OFF_PLAYS[res.oc].label + ': incomplete.');
    GM.down++;
  } else {
    const newSpot = GM.spot + res.yards;
    if(newSpot <= 0){
      addPts(defIdx(), 2);
      logMsg('SAFETY! ' + tName(defIdx()) + ' get 2.', 'bad');
      runoff(res);
      startPossession(defIdx(), 35);
      updateGameUI(); return;
    }
    if(newSpot >= 100){ GM.spot = 99; touchdown(res); return; }
    GM.spot = newSpot;
    GM.dist -= res.yards;
    const verb = res.type==='run' ? OFF_PLAYS[res.oc].label : (res.type==='sack' ? 'SACKED' : OFF_PLAYS[res.oc].label);
    logMsg(offName + ' — ' + verb + ': ' + (res.yards>=0?'+':'') + res.yards + ' yds' + (res.oob?' (out of bounds)':'') + '.', res.yards>=15?'big':null);
    if(GM.dist <= 0){ GM.down=1; GM.dist=Math.min(10,100-GM.spot); logMsg('First down, '+offName+'.'); }
    else GM.down++;
  }
  if(GM.down > 4){
    logMsg('Turnover on downs! ' + tName(defIdx()) + ' ball.', 'bad');
    startPossession(defIdx(), 100 - GM.spot);
  }
  runoff(res);
}
function touchdown(res){
  addPts(GM.poss, 6);
  logMsg('TOUCHDOWN ' + tName(GM.poss).toUpperCase() + '!', 'big');
  GM.pending = 'try';
  if(!userOnO()){
    const diff = GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs;
    const goTwo = (diff === -2 || diff === -8 || diff === 5 || diff === -5) && GM.q >= 4;
    doTry(goTwo ? '2pt' : 'xp');
  } else updateGameUI();
}
function doTry(kind){
  GM.pending = null;
  const t = offT();
  if(kind==='xp'){
    const make = Math.random() < .90 + (kRating(t)-75)*.003;
    if(make){ addPts(GM.poss,1); logMsg('Extra point is good.'); }
    else logMsg('Extra point MISSED!', 'bad');
  } else {
    const edge = (offPass(t)-defPass(defT()))/100;
    if(Math.random() < .46 + edge*.35){ addPts(GM.poss,2); logMsg('Two-point conversion is GOOD!', 'big'); }
    else logMsg('Two-point try fails.', 'bad');
  }
  startPossession(GM.poss===GM.home?GM.away:GM.home, 25);
  GM.clock -= 4; if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
}
function doFG(){
  const dist = (100 - GM.spot) + 17;
  const k = kRating(offT());
  const p = clamp(.99 - Math.max(0, dist-20)*.0135 + (k-75)*.004, .08, .99);
  GM.clock -= 6;
  if(Math.random() < p){
    addPts(GM.poss, 3);
    logMsg(dist + '-yd field goal is GOOD. ' + G.teams[GM.poss].abbr + ' +3.', 'big');
    startPossession(GM.poss===GM.home?GM.away:GM.home, 25);
  } else {
    logMsg(dist + '-yd field goal is NO GOOD.', 'bad');
    startPossession(defIdx(), clamp(100-GM.spot+7, 20, 80));
  }
  if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
}
function doPunt(){
  const net = RI(35,48);
  const land = clamp(GM.spot + net, 0, 99);
  const oppSpot = land >= 99 ? 20 : 100 - land;
  logMsg(G.teams[GM.poss].abbr + ' punt ' + net + ' yds' + (land>=99?' — touchback':'') + '.');
  GM.clock -= 12;
  startPossession(defIdx(), oppSpot);
  if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
}
function doKneel(){
  GM.clock -= 40; GM.down++;
  logMsg(G.teams[GM.poss].abbr + ' kneel it.');
  if(GM.clock<=0) endQuarter();
  else if(GM.down>4){ startPossession(defIdx(), 100-GM.spot); }
  checkAITurn(); updateGameUI();
}
let busy = false;
function userCall(code){
  if(busy || !GM || GM.over) return;
  busy = true;
  let oc, dc;
  if(userOnO()){ oc = code; dc = aiDefCall(); }
  else { dc = code; oc = GM.down===4 ? null : aiOffCall(); }
  if(!userOnO() && GM.down === 4){
    const choice = aiFourthDown();
    if(choice==='punt'){ busy=false; doPunt(); return; }
    if(choice==='fg'){ busy=false; doFG(); return; }
    oc = aiOffCall();
  }
  const res = resolvePlay(oc, dc);
  animatePlay(res, () => {
    applyPlay(res);
    busy = false;
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); return; }
    checkAITurn();
    updateGameUI();
  });
}
function checkAITurn(){
  if(!GM || GM.over || GM.pending) return;
  if(GM.ot && GM.hs !== GM.as){ finishGame(); return; }
}
function finishGame(){
  if(GM.over) return;
  GM.over = true;
  logQ('FINAL — ' + tName(GM.home) + ' ' + GM.hs + ', ' + tName(GM.away) + ' ' + GM.as + '.');
  updateGameUI();
  setTimeout(showFinal, 600);
}
function gameResult(){ return {a:GM.home, b:GM.away, as:GM.hs, bs:GM.as}; }
function simRest(){
  if(!GM || GM.over) return;
  let guard = 500;
  while(!GM.over && guard-- > 0){
    if(GM.pending){ doTry('xp'); continue; }
    if(GM.down === 4){
      const c = aiFourthDown();
      if(c==='punt'){ doPunt(); continue; }
      if(c==='fg'){ doFG(); continue; }
    }
    const res = resolvePlay(aiOffCall(), aiDefCall());
    applyPlay(res);
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); break; }
  }
  if(!GM.over && guard <= 0) finishGame();
  updateGameUI();
}

/* =====================================================
   FIELD RENDERING & ANIMATION
   ===================================================== */
const FW = 1060, FH = 500;
const xAt = y => 105 + y * 8.5;
const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function fieldSVG(){
  const off = offT(), def = defT();
  let s = '<svg id="field" viewBox="0 0 '+FW+' '+FH+'" xmlns="http://www.w3.org/2000/svg" aria-label="football field">';
  s += '<rect x="0" y="0" width="'+FW+'" height="'+FH+'" fill="#0A0F18"/>';
  for(let i=0;i<10;i++) s += '<rect x="'+xAt(i*10)+'" y="20" width="85" height="'+(FH-40)+'" fill="'+(i%2? '#2A7340':'#2E7D46')+'"/>';
  s += '<rect x="20" y="20" width="85" height="'+(FH-40)+'" fill="'+off.c1+'"/>';
  s += '<rect x="'+xAt(100)+'" y="20" width="85" height="'+(FH-40)+'" fill="'+def.c1+'"/>';
  s += '<text x="62" y="'+(FH/2)+'" fill="rgba(255,255,255,.75)" font-size="26" font-family="Oswald,Arial Narrow,sans-serif" font-weight="700" text-anchor="middle" transform="rotate(-90 62 '+(FH/2)+')" letter-spacing="6">'+esc(off.name.toUpperCase())+'</text>';
  s += '<text x="'+(xAt(100)+43)+'" y="'+(FH/2)+'" fill="rgba(255,255,255,.75)" font-size="26" font-family="Oswald,Arial Narrow,sans-serif" font-weight="700" text-anchor="middle" transform="rotate(90 '+(xAt(100)+43)+' '+(FH/2)+')" letter-spacing="6">'+esc(def.name.toUpperCase())+'</text>';
  for(let y=0; y<=100; y+=5){
    const x = xAt(y);
    s += '<line x1="'+x+'" y1="20" x2="'+x+'" y2="'+(FH-20)+'" stroke="rgba(255,255,255,'+(y%10===0?'.55':'.22')+'" stroke-width="'+(y%10===0?2:1)+'"/>';
    if(y%10===0 && y>0 && y<100){
      const num = y<=50 ? y : 100-y;
      s += '<text x="'+x+'" y="60" fill="rgba(255,255,255,.5)" font-size="18" font-family="Oswald,sans-serif" text-anchor="middle">'+num+'</text>';
      s += '<text x="'+x+'" y="'+(FH-45)+'" fill="rgba(255,255,255,.5)" font-size="18" font-family="Oswald,sans-serif" text-anchor="middle">'+num+'</text>';
    }
  }
  for(let y=1;y<100;y++){
    const x = xAt(y);
    s += '<line x1="'+x+'" y1="185" x2="'+x+'" y2="195" stroke="rgba(255,255,255,.18)"/>';
    s += '<line x1="'+x+'" y1="305" x2="'+x+'" y2="315" stroke="rgba(255,255,255,.18)"/>';
  }
  s += '<line id="fdLine" x1="0" y1="20" x2="0" y2="'+(FH-20)+'" stroke="#FFD447" stroke-width="3" opacity=".9"/>';
  s += '<line id="losLine" x1="0" y1="20" x2="0" y2="'+(FH-20)+'" stroke="#4C8DFF" stroke-width="3" opacity=".9"/>';
  s += '<g id="players"></g><g id="anim"></g></svg>';
  return s;
}
function dot(x,y,fill,r){ return '<circle cx="'+x+'" cy="'+y+'" r="'+(r||9)+'" fill="'+fill+'" stroke="rgba(255,255,255,.85)" stroke-width="1.6"/>'; }
function drawFormation(){
  const g = document.getElementById('players');
  if(!g || !GM || GM.over) return;
  const off = offT(), def = defT();
  const x0 = xAt(GM.spot), mid = FH/2;
  let s = '';
  for(let i=-2;i<=2;i++) s += dot(x0-12, mid+i*26, off.c1);
  s += dot(x0-42, mid, off.c1);
  s += dot(x0-62, mid+22, off.c1);
  s += dot(x0-16, 90,  off.c1);
  s += dot(x0-16, FH-90, off.c1);
  s += dot(x0-14, mid+66, off.c1);
  for(let i=-1.5;i<=1.5;i++) s += dot(x0+14, mid+i*30, def.c1);
  for(let i=-1;i<=1;i++) s += dot(x0+48, mid+i*55, def.c1);
  s += dot(x0+22, 95, def.c1);
  s += dot(x0+22, FH-95, def.c1);
  s += dot(x0+105, mid-45, def.c1);
  s += dot(x0+105, mid+45, def.c1);
  g.innerHTML = s;
  const los = document.getElementById('losLine');
  const fd  = document.getElementById('fdLine');
  los.setAttribute('x1', x0); los.setAttribute('x2', x0);
  const fdYard = Math.min(100, GM.spot + GM.dist);
  fd.setAttribute('x1', xAt(fdYard)); fd.setAttribute('x2', xAt(fdYard));
  fd.style.display = fdYard >= 100 ? 'none' : '';
}
function banner(txt, ms){
  const b = document.getElementById('playbanner');
  if(!b) return;
  b.textContent = txt;
  b.classList.add('show');
  clearTimeout(banner._t);
  banner._t = setTimeout(() => b.classList.remove('show'), ms || 1600);
}
function resText(res){
  if(res.type==='int') return 'INTERCEPTED!';
  if(res.type==='fumble') return 'FUMBLE — defense recovers!';
  if(res.type==='inc') return OFF_PLAYS[res.oc].label + ' — incomplete';
  if(res.type==='sack') return 'SACK! ' + res.yards + ' yds';
  const td = GM.spot + res.yards >= 100;
  return OFF_PLAYS[res.oc].label + ' — ' + (res.yards>=0?'+':'') + res.yards + ' yds' + (td?' — TOUCHDOWN!':'');
}
function animatePlay(res, cb){
  const animG = document.getElementById('anim');
  if(!animG || reducedMotion){ if(animG) animG.innerHTML=''; banner(resText(res)); cb(); return; }
  animG.innerHTML = '';
  const x0 = xAt(GM.spot), mid = FH/2;
  const isPass = res.type==='pass' || res.type==='inc' || res.type==='int';
  const endYard = clamp(GM.spot + (res.type==='inc' ? Math.round(PASS_PARAMS[res.oc] ? PASS_PARAMS[res.oc].mean : 8) : res.yards), 2, 100);
  const xEnd = xAt(endYard);
  const yEnd = clamp(mid + gauss()*90, 70, FH-70);
  let pts;
  if(isPass){
    const xAir = xAt(clamp(GM.spot + (PASS_PARAMS[res.oc] ? PASS_PARAMS[res.oc].mean*.8 : 8), 2, 99));
    const yAir = clamp(mid + gauss()*110, 70, FH-70);
    pts = [[x0-42, mid],[xAir, yAir]];
    if(res.type==='pass' && Math.abs(xEnd-xAir) > 8) pts.push([xEnd, yEnd]);
  } else {
    pts = [[x0-62, mid+22],[x0-20, clamp(mid+gauss()*45,90,FH-90)],[xEnd, yEnd]];
    if(res.type==='sack') pts = [[x0-42, mid],[xEnd, clamp(mid+gauss()*30,90,FH-90)]];
  }
  const d = 'M' + pts.map(p => p[0]+' '+p[1]).join(' L');
  const bad = res.type==='int' || res.type==='fumble' || res.type==='sack';
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke', bad ? '#E25555' : '#FFD447');
  path.setAttribute('stroke-width','3.5');
  path.setAttribute('stroke-linecap','round');
  if(isPass) path.setAttribute('stroke-dasharray','10 8');
  animG.appendChild(path);
  const ball = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  ball.setAttribute('rx','9'); ball.setAttribute('ry','6');
  ball.setAttribute('fill','#8B4A2B'); ball.setAttribute('stroke','#F2EFE7'); ball.setAttribute('stroke-width','1.5');
  animG.appendChild(ball);
  const len = path.getTotalLength();
  if(!isPass){ path.setAttribute('stroke-dasharray', len); path.setAttribute('stroke-dashoffset', len); }
  const dur = 850;
  let start = null;
  function step(ts){
    if(!start) start = ts;
    const t = Math.min(1, (ts-start)/dur);
    const p = path.getPointAtLength(len * t);
    ball.setAttribute('cx', p.x); ball.setAttribute('cy', p.y);
    if(!isPass) path.setAttribute('stroke-dashoffset', len*(1-t));
    if(t < 1) requestAnimationFrame(step);
    else {
      banner(resText(res));
      if(res.type==='inc' || res.type==='int'){
        const m = document.createElementNS('http://www.w3.org/2000/svg','text');
        m.setAttribute('x', p.x); m.setAttribute('y', p.y+6);
        m.setAttribute('fill', res.type==='int' ? '#E25555' : '#F2EFE7');
        m.setAttribute('font-size','26'); m.setAttribute('font-weight','700'); m.setAttribute('text-anchor','middle');
        m.textContent = '✕';
        animG.appendChild(m);
      }
      setTimeout(cb, 320);
    }
  }
  requestAnimationFrame(step);
}

/* =====================================================
   UI SCREENS
   ===================================================== */
function meT(){ return G.teams[G.userTeam]; }
function headerHTML(){

function timelineHTML(){
  const steps = [['tag','Tag','TAG'],['fa','Free Agency','FA'],['draft','Draft','DRAFT'],['ota','OTAs','OTA'],['camp','Camp','CAMP'],['preseason','Preseason','PRE'],['cutdown','Cutdown','CUT'],['hub','Season','SZN'],['playoffs','Playoffs','PO']];
  const orderOf = {tag:0, fa:1, draft:2, ota:3, camp:4, preseason:5, cutdown:6, hub:7, game:7, playoffs:8, offseason:9};
  const last = steps.length - 1;
  const curRaw = orderOf[G.phase] != null ? orderOf[G.phase] : 4;
  const cur = clamp(curRaw, 0, last);
  const fillPct = (cur / last) * 100;
  let dots = '', labels = '';
  steps.forEach((st,i) => {
    const pct = (i/last)*100;
    const state = curRaw > last ? 'done' : (i===curRaw ? 'on' : (i<curRaw ? 'done' : ''));
    const xform = i===0 ? 'translate(0,-50%)' : (i===last ? 'translate(-100%,-50%)' : 'translate(-50%,-50%)');
    const xformL = i===0 ? 'translateX(0)' : (i===last ? 'translateX(-100%)' : 'translateX(-50%)');
    dots += '<div class="tl-dot '+state+'" style="left:'+pct+'%;transform:'+xform+'"></div>';
    labels += '<div class="tl-lbl '+state+'" style="left:'+pct+'%;transform:'+xformL+'">'+st[2]+'</div>';
  });
  return '<div class="timeline">' +
    '<div class="tl-head"><span class="tl-now">'+(G.phase==='offseason'?'Offseason':steps[cur][1])+'</span><span class="tl-date">'+fmtDate(currentDate())+'</span></div>' +
    '<div class="tl-track"><div class="tl-fill" style="width:'+fillPct+'%"></div>'+dots+'</div>' +
    '<div class="tl-labels">'+labels+'</div>' +
    '</div>';
}

    let s = '<div class="panel" style="margin-bottom:12px"><div class="hd disp" style="font-size:14px">'+title+'</div><table class="tbl"><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th style="text-align:right">Line</th></tr>';

  s += board('Passing', by(s=>s.py), s=>s.py+' yds · '+s.ptd+' TD');
  s += board('Rushing', by(s=>s.ry), s=>s.ry+' yds · '+s.rtd+' TD');
  s += board('Receiving', by(s=>s.cy), s=>s.cy+' yds · '+s.ctd+' TD');

  s += board('Interceptions', by(s=>s.int), s=>s.int+' INT');
  s += board('Kicking', by(s=>s.fgm), s=>s.fgm+' FGM');
  return s;
}

function sparkHTML(p){
  const evs = (p.history||[]).filter(e => e.d);
  let start = p.rating - evs.reduce((s,e)=>s+e.d,0);
  const pts = [start];
  evs.forEach(e => pts.push(pts[pts.length-1] + e.d));
  if(pts.length < 2) return '<p class="sub">No rating movement recorded yet.</p>';
  const min = Math.min(...pts)-1, max = Math.max(...pts)+1, W=420, H=64;
  const xy = pts.map((v,i) => (i/(pts.length-1)*W).toFixed(1)+','+(H-((v-min)/(max-min))*H).toFixed(1));
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">' +
    '<polyline points="'+xy.join(' ')+'" fill="none" stroke="var(--gold)" stroke-width="2"/>' +
    '<circle cx="'+xy[xy.length-1].split(',')[0]+'" cy="'+xy[xy.length-1].split(',')[1]+'" r="3.5" fill="var(--gold)"/></svg>' +
    '<p class="sub">'+start+' OVR at debut → <b style="color:var(--gold)">'+p.rating+'</b> today</p>';

let rSort = {key:'rating', dir:-1}, rFilter = 'ALL';

function setRSort(k){

function spotSortVal(p){ return POS_ORDER.indexOf(p.pos)*10 + SPOTS[p.pos].indexOf(p.spot); }

function rosterTable(t, actionFn){
  const cols = [['name','Player'],['spot','Pos'],['scheme','Scheme'],['age','Age'],['rating','OVR'],['years','Deal'],['salary','Salary']];
  let s = '<div class="filterbar">';
  ['ALL'].concat(POS_ORDER).forEach(f => {
    s += '<button class="fbtn'+(rFilter===f?' on':'')+'" onclick="setRFilter(\''+f+'\')">'+f+(f!=='ALL'?' <span style="opacity:.7">'+posCount(t,f)+'</span>':'')+'</button>';
  });
  s += '</div><table class="tbl"><tr>';
  cols.forEach(c => {
    const on = rSort.key === c[0];
    s += '<th class="sorth'+(on?' on':'')+'" onclick="setRSort(\''+c[0]+'\')">'+c[1]+(on ? (rSort.dir>0?' ▲':' ▼') : '')+'</th>';
  });
  s += '<th>Status</th><th></th></tr>';
  const list = t.roster
    .filter(p => rFilter==='ALL' || p.pos === rFilter)
    .sort((a,b) => {
      let va, vb;
      if(rSort.key==='spot'){ va = spotSortVal(a); vb = spotSortVal(b); }
      else { va = a[rSort.key]; vb = b[rSort.key]; }
      if(typeof va === 'string') return va.localeCompare(vb) * rSort.dir;
      return ((va - vb) || (b.rating - a.rating)) * rSort.dir;
    });
  list.forEach(p => s += playerRow(p, actionFn(p)));
  if(!list.length) s += '<tr><td colspan="9" class="sub" style="text-align:center;padding:14px">No players at this position.</td></tr>';
  return s + '</table>';
}

  const inFAPhase = G.phase === 'fa';

  if(inFAPhase){
    s += '<div class="panel" style="margin-bottom:12px"><div class="hd disp">Free Agency — Open for Business</div>' +
      '<p class="sub" style="margin-bottom:8px">The new league year opened '+fmtDate(leagueYearDate(G.year))+' — expiring contracts hit the market at once. Build toward your '+LIMIT_OFF+'-man camp roster — the market keeps moving while you shop.</p>' +
      capBarHTML(me) +
      '<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap">' +
      '<span class="countpill">Roster <b>'+me.roster.length+'</b> / '+LIMIT_OFF+'</span>' +
      '<button class="btn primary" style="margin-left:auto" onclick="advanceToDraft()">Head to the Draft →</button></div></div>';
  } else {
    s += '<div class="panel" style="margin-bottom:12px"><div class="hd disp">League Players</div>' +
      '<p class="sub" style="margin-bottom:8px">Every player in the league, on any roster or on the open market. '+(me.roster.length < limit ? 'You have room to sign a free agent.' : 'Your roster is full — cut someone first.')+'</p>' +
      capBarHTML(me) +
      '<div style="margin-top:10px"><span class="countpill'+(me.roster.length>=limit?' over':'')+'">Roster <b>'+me.roster.length+'</b> / '+limit+'</span></div></div>';
  }
  s += posNeedsHTML(me);
  s += '<div class="panel" style="margin-bottom:12px"><div class="hd disp">All Players</div><div class="filterbar" style="align-items:center">';
  ['ALL'].concat(POS_ORDER).forEach(f => {
    s += '<button class="fbtn'+(faFilter===f?' on':'')+'" onclick="setFAFilter(\''+f+'\')">'+f+'</button>';
  });
  s += '<select class="fselect" onchange="setFATeamFilter(this.value)">' +
    '<option value="ALL"'+(faTeamFilter==='ALL'?' selected':'')+'>All Teams</option>' +
    '<option value="FA"'+(faTeamFilter==='FA'?' selected':'')+'>Free Agents</option>' +
    G.teams.map(t => '<option value="'+t.idx+'"'+(faTeamFilter===String(t.idx)?' selected':'')+'>'+esc(t.city+' '+t.name)+'</option>').join('') +
    '</select>';
  const faCols = [['name','Player'],['spot','Pos'],['team','Team'],['age','Age'],['rating','OVR'],['salary','Salary'],['askYears','Years']];
  s += '</div><table class="tbl"><tr>';
  faCols.forEach(c => {
    const on = faSort.key === c[0];
    s += '<th class="sorth'+(on?' on':'')+'" onclick="setFASort(\''+c[0]+'\')">'+c[1]+(on ? (faSort.dir>0?' ▲':' ▼') : '')+'</th>';
  });
  s += '<th>Scheme</th><th></th></tr>';
  G.fa.forEach(p => { p.askYears = p.askYears || RI(1,3); });
  // combine every team's roster with the open market into one browsable pool
  let pool = [];
  G.teams.forEach(t => t.roster.forEach(p => pool.push({ p, teamIdx: t.idx, teamLabel: t.abbr, isFA: false })));
  G.fa.forEach(p => pool.push({ p, teamIdx: null, teamLabel: 'FA', isFA: true }));
  if(faFilter !== 'ALL') pool = pool.filter(x => x.p.pos === faFilter);
  if(faTeamFilter === 'FA') pool = pool.filter(x => x.isFA);
  else if(faTeamFilter !== 'ALL') pool = pool.filter(x => String(x.teamIdx) === faTeamFilter);
  pool.sort((a,b) => {
    let va, vb;
    if(faSort.key === 'team'){ va = a.teamLabel; vb = b.teamLabel; }
    else if(faSort.key === 'spot'){ va = spotSortVal(a.p); vb = spotSortVal(b.p); }
    else if(faSort.key === 'salary'){ va = a.isFA ? marketFor(a.p) : a.p.salary; vb = b.isFA ? marketFor(b.p) : b.p.salary; }
    else { va = a.p[faSort.key]; vb = b.p[faSort.key]; }
    if(typeof va === 'string') return va.localeCompare(vb) * faSort.dir;
    return ((va - vb) || (b.p.rating - a.p.rating)) * faSort.dir;
  });
  pool = pool.slice(0, 60);
  if(!pool.length) s += '<tr><td colspan="9" class="sub">Nobody matches this filter.</td></tr>';
  pool.forEach(x => {
    const p = x.p;
    const sal = x.isFA ? marketFor(p) : p.salary;
    const years = x.isFA ? p.askYears : p.years;
    const teamCell = x.isFA ? '<span class="tag fa">FA</span>' : '<b>'+esc(x.teamLabel)+'</b>';
    const afford = x.isFA && sal <= capRoom(me) && activeCount(me) < limit && !rosterFrozen();
    const action = x.isFA
      ? '<button class="btn tiny primary" '+(afford?'':'disabled')+' onclick="signFA('+p.id+')">Sign</button>'
      : (x.teamIdx === G.userTeam ? '<span class="sub">Your roster</span>' : '<span class="sub">—</span>');
    s += '<tr><td>'+pn(p)+'</td><td><b>'+p.spot+'</b></td><td>'+teamCell+'</td><td>'+p.age+'</td>' +
      '<td style="color:var(--gold);font-weight:700">'+p.rating+'</td><td>'+money(sal)+'</td><td>'+years+'yr</td><td>'+schemeCell(p)+'</td>' +
      '<td>'+action+'</td></tr>';
  });
  s += '</table></div>';
  if(inFAPhase){
    s += '<div class="panel"><div class="hd disp">Your Camp Roster</div>' +
      rosterTable(me, p => '<button class="btn tiny danger" onclick="cutPlayer('+p.id+')">Cut</button>') + '</div>';
  }
  return s;
}
function setFAFilter(f){ faFilter = f; render(); }
function setFASort(k){
  if(faSort.key === k) faSort.dir *= -1;
  else faSort = {key:k, dir:(k==='name'||k==='spot') ? 1 : -1};
  render();
}

  const displaced = lu[i] && lu[i].p;                          // whoever currently holds the target slot
  const theirSlot = lu.findIndex(x => x.p && x.p.id === pid);  // where the newly-picked player is starting now, if anywhere

    // pull the player straight out of their current spot, regardless of where that is,

    G.lineupOverride[formKey][theirSlot] = displaced.id;
  }
  save(); openModal('depth');

/* ---------- trades ---------- */
/* Trade window opens with the new league year (Mar 1) and runs through the in-season deadline
   (Tuesday after Week 9) — covering FA, the draft, OTAs, camp, preseason, cutdown, and Weeks 1-9. */
let tradeTeam = null;
let tradeGive = new Set(), tradeGivePicks = new Set(), tradeGet = new Set(), tradeGetPicks = new Set();
function tradesOpen(){
  if(['fa','draft','ota','camp','preseason','cutdown'].includes(G.phase)) return true;
  if(G.phase === 'hub' && G.week <= 9) return true;
  return false;
}
function tradeValue(p){ return p.rating - Math.max(0, p.age - 27) * 1.5 + (p.years >= 2 ? 1 : 0); }
const PICK_BASE_VALUE = {1:26, 2:14, 3:7, 4:3};
function pickValue(pk){
  const base = PICK_BASE_VALUE[pk.round] || 3;
  const yearsOut = Math.max(0, pk.year - G.year);
  return base * Math.pow(0.85, yearsOut);
}
function pickLabel(pk){ return pk.year+' · Round '+pk.round; }
function resetTradeCart(){ tradeGive = new Set(); tradeGivePicks = new Set(); tradeGet = new Set(); tradeGetPicks = new Set(); }
function setTradeTeam(i){ tradeTeam = i; resetTradeCart(); render(); }
function toggleGive(pid){ tradeGive.has(pid) ? tradeGive.delete(pid) : tradeGive.add(pid); render(); }
function toggleGivePick(id){ tradeGivePicks.has(id) ? tradeGivePicks.delete(id) : tradeGivePicks.add(id); render(); }
function toggleGet(pid){ tradeGet.has(pid) ? tradeGet.delete(pid) : tradeGet.add(pid); render(); }
function toggleGetPick(id){ tradeGetPicks.has(id) ? tradeGetPicks.delete(id) : tradeGetPicks.add(id); render(); }
function proposeTrade(){
  if(!tradesOpen()){ alert('The trade window is closed right now.'); return; }
  const me = meT(), them = G.teams[tradeTeam];
  if(!them || them.idx === me.idx) return;
  const giveP = me.roster.filter(p => tradeGive.has(p.id));
  const getP = them.roster.filter(p => tradeGet.has(p.id));
  const givePk = G.draftPicks.filter(pk => tradeGivePicks.has(pk.id) && pk.team === me.idx);
  const getPk = G.draftPicks.filter(pk => tradeGetPicks.has(pk.id) && pk.team === them.idx);
  if(!giveP.length && !givePk.length){ alert('Add at least one player or pick to send.'); return; }
  if(!getP.length && !getPk.length){ alert('Add at least one player or pick to request.'); return; }
  const giveSal = giveP.reduce((s,p) => s + p.salary, 0);
  const getSal = getP.reduce((s,p) => s + p.salary, 0);
  if(payroll(me) - giveSal + getSal > CAP){ alert('That swap puts you over the cap.'); return; }
  if(payroll(them) - getSal + giveSal > CAP){ alert(esc(them.city)+' can\'t fit that under their cap.'); return; }
  const giveVal = giveP.reduce((s,p) => s + tradeValue(p), 0) + givePk.reduce((s,pk) => s + pickValue(pk), 0);
  const getVal = getP.reduce((s,p) => s + tradeValue(p), 0) + getPk.reduce((s,pk) => s + pickValue(pk), 0);
  const need = teamNeed(them);
  const needBonus = giveP.filter(p => p.pos === need).length * 3;
  const accept = giveVal + needBonus >= getVal + 1.5;
  if(!accept){ alert(esc(them.city)+' declined — they want more value back for this package.'); return; }
  me.roster = me.roster.filter(p => !tradeGive.has(p.id));
  them.roster = them.roster.filter(p => !tradeGet.has(p.id));
  giveP.forEach(p => { p.dressed = true; p.ir = false; logEv(p,'move','Traded to '+them.city,0); them.roster.push(p); });
  getP.forEach(p => { p.dressed = true; p.ir = false; logEv(p,'move','Traded to '+me.city,0); me.roster.push(p); });
  givePk.forEach(pk => { pk.team = them.idx; });
  getPk.forEach(pk => { pk.team = me.idx; });
  const summary = (giveP.length||givePk.length ? (giveP.map(p=>p.name).concat(givePk.map(pickLabel)).join(', ')) : 'nothing') +
    ' for ' + (getP.length||getPk.length ? (getP.map(p=>p.name).concat(getPk.map(pickLabel)).join(', ')) : 'nothing');
  resetTradeCart();
  alert('Trade accepted! You send '+esc(summary)+'.');
  save(); render();
}

  const getVal = them.roster.filter(p=>tradeGet.has(p.id)).reduce((s,p)=>s+tradeValue(p),0) + theirPicks.filter(pk=>tradeGetPicks.has(pk.id)).reduce((s,pk)=>s+pickValue(pk),0);

  s += '</table>';
  if(theirPicks.length){

    theirPicks.forEach(pk => { s += assetRow('get', pk, true, 'toggleGetPick('+pk.id+')', tradeGetPicks.has(pk.id)); });
    s += '</table>';
  }
  s += '</div>';
  // ---- what you'd send ----
  s += '<div class="grow"><div class="hd disp" style="margin:8px 0 4px;font-size:13px">Your Roster</div>';
  s += '<table class="tbl"><tr><th>Player</th><th>Pos</th><th>Age</th><th>OVR</th><th>Salary</th><th></th></tr>';
  me.roster.filter(p=>!p.ir).sort((a,b)=>b.rating-a.rating).forEach(p => {
    s += assetRow('give', p, false, 'toggleGive('+p.id+')', tradeGive.has(p.id));
  });
  s += '</table>';
  if(myPicks.length){
    s += '<table class="tbl" style="margin-top:6px"><tr><th colspan="4">Draft Picks</th><th></th></tr>';
    myPicks.forEach(pk => { s += assetRow('give', pk, true, 'toggleGivePick('+pk.id+')', tradeGivePicks.has(pk.id)); });
    s += '</table>';
  }
  s += '</div></div>';
  const giveCount = tradeGive.size + tradeGivePicks.size, getCount = tradeGet.size + tradeGetPicks.size;
  s += '<div class="panel" style="margin-top:12px;text-align:center">' +
    '<p class="sub">Sending <b style="color:var(--chalk)">'+giveCount+'</b> asset'+(giveCount!==1?'s':'')+' (value '+giveVal.toFixed(1)+') for <b style="color:var(--chalk)">'+getCount+'</b> asset'+(getCount!==1?'s':'')+' (value '+getVal.toFixed(1)+')</p>' +
    '<div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">' +
    '<button class="btn" onclick="resetTradeCart();render()">Clear</button>' +
    '<button class="btn primary" '+((giveCount&&getCount)?'':'disabled')+' onclick="proposeTrade()">Propose Trade</button></div></div>';
  return s;
}

function trainPlayer(pid){
  const p = meT().roster.find(x => x.id === pid);
  if(!p || p.trained >= 5 || p.rating >= 99) return;
  const coach = posCoachOf(p.pos);
  const cost = (coach && coach.rating >= 78) ? 1 : 2;
  if(G.trainPts < cost) return;
  const gain = Math.min((coach && coach.rating >= 88) ? 2 : 1, 5 - p.trained);
  G.trainPts -= cost;
  p.rating = clamp(p.rating + gain, 50, 99);
  p.trained += gain;
  logEv(p, 'dev', 'Trained in practice', gain);
  save(); render();
}

function buildCallsheet(){
  const grid = document.getElementById('playgrid');
  const title = document.getElementById('cs-title');
  const side = document.getElementById('cs-side');
  if(!grid) return;
  if(GM.over){ grid.innerHTML=''; title.textContent='Game Over'; side.textContent=''; return; }
  if(GM.pending==='try'){
    if(userOnO()){
      title.textContent = 'Point After';
      side.textContent = 'your call';
      grid.innerHTML = playBtn('xp','st','Kick the XP','+1 · ~90%','doTry') + playBtn('2pt','shot','Go for Two','+2 · higher risk','doTry');
    } else grid.innerHTML='';
    return;
  }
  if(userOnO()){
    title.textContent = 'Offense — ' + ordinal(GM.down) + ' & ' + (GM.spot+GM.dist>=100?'Goal':GM.dist);
    side.textContent = 'you have the ball';
    let s = '';
    Object.keys(OFF_PLAYS).forEach(k => { const p = OFF_PLAYS[k]; s += playBtn(k, p.fam, p.label, p.sub, 'userCall'); });
    if(GM.down === 4){
      const fgDist = (100-GM.spot)+17;

      s += '<button class="play st" '+(fgDist>62?'disabled':'')+' onclick="doFG()">Field Goal<small>'+fgDist+' yds</small></button>';

    const lead = myScore() - oppScore();
    if(GM.q>=4 && GM.clock<130 && lead>0 && GM.down<4) s += '<button class="play st" onclick="doKneel()">Kneel<small>burn the clock</small></button>';
    grid.innerHTML = s;

  s += '</div>';
  s += posNeedsHTML(me);
  s += '<div style="text-align:center"><button class="btn primary" onclick="advanceToTag()">Advance to Franchise Tag Window — '+fmtDate(tagStart(G.year+1))+' →</button></div>';
  return s;
}
function firedHTML(){
  const c = G.career;
  return '<div class="title-hero"><h1 class="disp" style="color:var(--red)">You\'re <span style="color:var(--red)">Fired</span></h1>' +
    '<p>The owner lost patience. Final line: '+c.w+'–'+c.l+' over '+(c.seasons)+' season'+(c.seasons===1?'':'s')+', '+c.berths+' playoff berth'+(c.berths===1?'':'s')+', '+c.titles+' title'+(c.titles===1?'':'s')+'.</p>' +
    '<div style="margin-top:18px"><button class="btn primary" onclick="store.clear();G=null;render()">Start a New Career</button></div></div>';
}

/* ---------- boot ---------- */
render();
</script>
