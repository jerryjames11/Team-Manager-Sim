<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Team Manager Sim — Head Coach Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0E1420; --panel:#161E2D; --panel2:#1C2536; --line:#2A3548;
  --modalbg:#080B11;
  --chalk:#F2EFE7; --muted:#8B97A8; --gold:#FFD447; --red:#E25555;
  --green:#4CAF6E; --turf:#2E7D46; --turf2:#2A7340; --team:#3E6DB5;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--night);color:var(--chalk);font-family:'Inter',system-ui,sans-serif;min-height:100%}
button{font-family:inherit;cursor:pointer}
.disp{font-family:'Oswald','Arial Narrow',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:'Courier New',monospace;font-weight:700}

#app{max-width:1080px;margin:0 auto;padding:10px 12px 40px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
header.top .brand{font-size:16px;font-weight:700;color:var(--gold)}
header.top .brand small{color:var(--muted);font-size:9.5px;display:block;letter-spacing:.16em;font-weight:600}
header.top .meta{text-align:right;font-size:11px;color:var(--muted);line-height:1.35}
header.top .meta b{color:var(--chalk)}

/* league calendar strip — progress bar */
.timeline{margin-bottom:10px}
.tl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px}
.tl-now{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase}
.tl-date{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.tl-track{position:relative;height:5px;background:var(--line);border-radius:3px;margin:0 2px}
.tl-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#B98F1F,var(--gold));border-radius:3px;transition:width .35s ease}
.tl-dot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;background:var(--panel);border:2px solid var(--line);transform:translate(-50%,-50%)}
.tl-dot.done{background:var(--gold);border-color:var(--gold)}
.tl-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(255,212,71,.25)}
.tl-labels{position:relative;height:12px;margin-top:4px}
.tl-lbl{position:absolute;top:0;font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.tl-lbl.done{color:var(--green)}
.tl-lbl.on{color:var(--gold)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px !important;overflow-x:auto}
.hd{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:7px;letter-spacing:.08em}
.sub{color:var(--muted);font-size:12px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grow{flex:1 1 300px}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--chalk);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;letter-spacing:.05em;transition:.15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--gold);color:#14100A;border-color:var(--gold)}
.btn.big{padding:14px 22px;font-size:14px}
.btn.primary:hover{filter:brightness(1.08);color:#14100A}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.tiny{padding:3px 7px;font-size:10px;border-radius:5px}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.btn:focus-visible,.play:focus-visible,.teamcard:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* title */
.title-hero{text-align:center;padding:38px 10px 26px}
.career-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #202A3C}
.career-row:last-child{border-bottom:none}
.modecards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.modecard{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;transition:.12s}
.modecard:hover{border-color:var(--gold)}
.modecard.disabled{opacity:.55;cursor:default}
.modecard.disabled:hover{border-color:var(--line)}
.modecard-title{font-size:16px;color:var(--gold);margin-bottom:6px}
.title-hero h1{font-size:clamp(38px,7vw,64px);color:var(--chalk);line-height:.95}
.title-hero h1 span{color:var(--gold)}
.title-hero p{color:var(--muted);margin-top:10px;font-size:14px}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:8px}
.divgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:12px;margin-top:12px}
.divcol{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px}
.divcol .dvh{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--gold);margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.trow{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:1px solid transparent;border-radius:8px;padding:6px 8px;color:var(--chalk);text-align:left;transition:.12s;cursor:pointer}
.trow:hover{background:var(--panel);border-color:var(--gold);transform:translateX(2px)}
.trow .chip{width:10px;height:28px;border-radius:3px;flex:0 0 auto}
.trow .tn{flex:1;min-width:0}
.trow .tn b{display:block;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.04em;line-height:1.15}
.trow .tn small{display:block;font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}
.trow .ab{font-size:11px;font-weight:700;color:var(--muted)}
.trow .tmeta{flex:0 0 auto;text-align:right}
.trow .tmeta > b{display:block;font-family:'Oswald',sans-serif;font-size:15px;color:var(--gold);line-height:1.1}
.trow .tmeta > b small{font-size:9px;letter-spacing:.08em;color:var(--muted)}
.trow .tmeta > small{display:block;font-size:9.5px;color:var(--muted)}
.trow .tmeta .grn{color:var(--green)}
.teamcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:left;color:var(--chalk);transition:.15s;position:relative;overflow:hidden}
.teamcard:hover{transform:translateY(-2px);border-color:var(--gold)}
.teamcard .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
.teamcard .city{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.teamcard .nm{font-size:19px;font-weight:700}
.teamcard .units{display:flex;gap:8px;margin-top:8px;font-size:10px;color:var(--muted)}
.teamcard .units b{color:var(--chalk);display:block;font-size:13px}

/* hub */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;letter-spacing:.06em}
.tab.on{background:var(--gold);color:#14100A;border-color:var(--gold)}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
table.tbl th, table.tbl td{white-space:nowrap}
table.tbl th{text-align:left;color:var(--muted);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid var(--line)}
table.tbl td{padding:5px 6px;border-bottom:1px solid #202A3C}
table.tbl tr.me td{background:rgba(255,212,71,.07)}
table.tbl tr.dim td{opacity:.45}
table.tbl tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.08em}
.tag.w{background:rgba(76,175,110,.18);color:var(--green)}
.tag.l{background:rgba(226,85,85,.15);color:var(--red)}
.tag.inj{background:rgba(226,85,85,.15);color:var(--red)}
.tag.up{background:rgba(255,212,71,.15);color:var(--gold)}
.tag.fa{background:rgba(76,141,255,.18);color:#8FB6FF}
.conf-meter,.capbar{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.conf-meter i,.capbar i{display:block;height:100%;border-radius:6px;transition:.4s}
.nextgame{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}

/* trade rework */
.trade-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:900px){ .trade-grid{grid-template-columns:280px 1fr 280px} }
.offerbar{cursor:pointer}
.offerbar-head{display:flex;justify-content:space-between;align-items:center}
.offerbar-body{display:none;margin-top:10px;cursor:default}
.offerbar-body.open{display:block}
.offercard{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:10px;margin-bottom:8px}
.offercard:last-child{margin-bottom:0}
.offercard .who{font-weight:700;font-size:12.5px;margin-bottom:3px}
.offercard .terms{font-size:11px;color:var(--muted);margin-bottom:8px}
.trade-toggle{width:34px;height:19px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);position:relative;cursor:pointer;flex-shrink:0}
.trade-toggle.on{background:var(--gold);border-color:var(--gold)}
.trade-toggle i{position:absolute;top:1px;left:1px;width:15px;height:15px;border-radius:50%;background:var(--chalk);transition:.15s}
.trade-toggle.on i{left:17px;background:#14100A}
.blockrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #202A3C;font-size:12px}
.blockstate{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10.5px;font-weight:700;cursor:pointer;white-space:nowrap;user-select:none}
.blockrow:last-child{border-bottom:none}
.valuetrack{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex;border:1px solid var(--line)}
.valuetrack .give{background:var(--gold);transition:.3s}
.valuetrack .get{background:#3E6DB5;transition:.3s}
.valuelabels{display:flex;justify-content:space-between;font-size:11px;margin-top:4px}
.counterbox{margin-top:10px;background:rgba(255,212,71,.08);border:1px solid var(--gold);border-radius:8px;padding:10px}
.counterbox .t{font-weight:700;font-size:12.5px;color:var(--gold);margin-bottom:4px}
.rosterpanel{display:none;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px}
.rosterpanel.open{display:block}
.picksub{font-weight:700;font-size:11px;color:var(--gold);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--line);padding-top:8px}
.pickrow{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;padding:5px 0}
.assetrow2{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;padding:6px 0;border-bottom:1px solid #202A3C}
.assetrow2:last-child{border-bottom:none}
.assetrow2 .rm{color:var(--red);font-weight:700;cursor:pointer;font-size:14px}

/* dashboard hub */
.dash-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:900px){ .dash-grid{grid-template-columns:280px 1fr 280px} }
.dash-feed, .dash-side{display:flex;flex-direction:column;gap:12px}
.dash-center{display:flex;flex-direction:column;gap:12px}
.feeditem{display:flex;gap:8px;padding:9px 0;border-bottom:1px solid #202A3C}
.feeditem:last-child{border-bottom:none}
.feeditem .ic{font-size:15px;flex-shrink:0}
.feeditem .t{font-size:12.5px;font-weight:700}
.feeditem .s{color:var(--muted);font-size:11px}
.dash-hero{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.dash-hero .kicker{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.dash-hero .title{font-size:18px;font-weight:700;margin-bottom:6px}
.dash-hero .body{color:var(--muted);font-size:12.5px;line-height:1.5;max-width:80%}
.dash-hero .icon{position:absolute;right:14px;top:14px;font-size:44px;opacity:.15}
.dash-calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.dash-calday .lbl{color:var(--muted);font-size:10px;margin-bottom:4px;text-align:center}
.dash-calday .box{background:var(--panel2);border-radius:6px;height:34px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted)}
.dash-calday .box.game{background:var(--gold);color:#14100A}
.dash-fixrow{display:flex;justify-content:space-between;font-size:11.5px;padding:6px 0;border-bottom:1px solid #202A3C}
.dash-fixrow:last-child{border-bottom:none}
.dash-standrow{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:6px 0;border-bottom:1px solid #202A3C}
.dash-standrow:last-child{border-bottom:none}
.dash-standrow.me{background:rgba(255,212,71,.07)}
.dash-standrow .pos{color:var(--muted);width:14px}
.dash-standrow .nm{flex:1}
.dash-standrow.me .nm{color:var(--gold);font-weight:700}
.nextgame .vs{font-size:22px;font-weight:700}
.nextgame .vs small{display:block;font-size:11px;color:var(--muted);letter-spacing:.14em;font-weight:600}
.posgroup{background:var(--panel2);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.16em;padding:5px 8px}
.filterbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.fbtn .mb-pos{color:var(--chalk)}
.fbtn .mb-n{color:var(--chalk)}
.fbtn .mb-ovr{color:var(--gold)}
.fbtn.short{border-color:var(--red)}
.fbtn.short .mb-n{color:var(--red)}
.fselect{background:var(--panel2);border:1px solid var(--line);color:var(--chalk);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit}
.fbtn.on{background:var(--gold);color:#14100A;border-color:var(--gold)}
.countpill{font-size:13px;font-weight:700;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 14px}
.countpill b{color:var(--gold)}
.countpill.over b{color:var(--red)}
.pname{cursor:pointer;text-decoration:underline dotted rgba(242,239,231,.4);text-underline-offset:3px}
.pname:hover{color:var(--gold)}
.pf-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.pf-ovr{font-size:34px;font-weight:700;color:var(--gold);line-height:1}
.spark{width:100%;max-width:420px;height:64px;display:block;margin:8px 0}
th.sorth{cursor:pointer;user-select:none;white-space:nowrap}
th.sorth:hover{color:var(--chalk)}
th.sorth.on{color:var(--gold)}
.dchart{width:100%;height:auto;display:block;border-radius:10px;border:1px solid var(--line);background:#0A0F18;margin:10px 0}
.minsgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.depthrow td{font-size:12px}
.oop{color:var(--red);font-weight:700}

/* game day */
.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:#0A0F18;border:1px solid var(--line);border-radius:10px;padding:10px 16px;margin-bottom:10px}
.scorebar .tm{display:flex;align-items:center;gap:10px;min-width:0}
.scorebar .tm.right{justify-content:flex-end;text-align:right}
.scorebar .dotc{width:14px;height:14px;border-radius:50%;flex:0 0 auto}
.scorebar .nm2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scorebar .sc{font-size:30px;color:var(--gold)}
.scorebar .mid{text-align:center;line-height:1.2}
.scorebar .clock{font-size:20px;color:var(--chalk)}
.scorebar .qtr{font-size:11px;color:var(--muted);letter-spacing:.2em}
.situation{display:flex;justify-content:center;gap:18px;font-size:13px;color:var(--muted);margin:8px 0;flex-wrap:wrap}
.situation b{color:var(--gold)}
.possdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:5px;vertical-align:1px}
#fieldwrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;position:relative}
#field{width:100%;height:auto;display:block;border-radius:6px}
#playbanner{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(10,15,24,.92);border:1px solid var(--gold);color:var(--chalk);padding:8px 18px;border-radius:8px;font-size:14px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;max-width:92%;text-align:center}
#playbanner.show{opacity:1}
.fflash{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;pointer-events:none;z-index:5;animation:fflash 1.15s ease-out forwards}
.fflash.fd{font-size:30px;color:#FFD447;text-shadow:0 2px 10px rgba(0,0,0,.75)}
.fflash.td{font-size:46px;color:#FFD447;text-shadow:0 0 20px rgba(255,212,71,.85),0 2px 10px rgba(0,0,0,.85)}
.fflash.opp{font-size:32px;color:#E25555;text-shadow:0 0 14px rgba(226,85,85,.6),0 2px 10px rgba(0,0,0,.85)}
@keyframes fflash{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}14%{opacity:1;transform:translate(-50%,-50%) scale(1.18)}26%{transform:translate(-50%,-50%) scale(1)}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.06)}}
.confetti{position:absolute;width:8px;height:13px;border-radius:2px;pointer-events:none;z-index:4;opacity:0;animation:confettipop 1.4s ease-out forwards}
@keyframes confettipop{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--dx),calc(var(--dy) + 170px)) rotate(var(--rot))}}
.confetti.rain{top:-4%;animation-name:confettirain;animation-timing-function:linear;animation-fill-mode:forwards}
@keyframes confettirain{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--dx),108vh) rotate(var(--rot))}}
.overlay{overflow:hidden}
.overlay .card.win{border-color:var(--gold);box-shadow:0 0 44px rgba(255,212,71,.35),0 0 0 1px rgba(255,212,71,.45);animation:cardpop .55s cubic-bezier(.2,1.5,.4,1)}
@keyframes cardpop{0%{transform:scale(.65);opacity:0}100%{transform:scale(1);opacity:1}}
.overlay .card .trophy{font-size:48px;line-height:1;margin-bottom:6px;display:inline-block;animation:trophybob 1.7s ease-in-out infinite}
@keyframes trophybob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-7px) rotate(5deg)}}
.overlay .card h2.winh{color:var(--gold);text-shadow:0 0 16px rgba(255,212,71,.45)}
.callsheet{margin-top:10px;background:linear-gradient(160deg,#F6F3E8,#E9E4D2);border-radius:10px;padding:12px;color:#1A1A14;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15), inset 0 14px 30px rgba(255,255,255,.5)}
.callsheet:before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;border-radius:10px;background:linear-gradient(115deg,rgba(255,255,255,.35) 0%,rgba(255,255,255,0) 30%);pointer-events:none}
.callsheet .cs-hd{display:flex;justify-content:space-between;align-items:center;font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:.16em;color:#4A4636;margin-bottom:8px}
.playgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}
.play{border:none;border-radius:6px;padding:10px 8px 8px;font-weight:700;font-size:13px;color:#17150E;text-align:left;position:relative;border-left:6px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.12s}
.play small{display:block;font-weight:600;font-size:10px;opacity:.65;margin-top:2px;letter-spacing:.03em}
.play:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.3)}
.play.run{background:#CDE8C8;border-left-color:#2F7D3B}
.play.quick{background:#F7E9A8;border-left-color:#C9A227}
.play.shot{background:#F3C6BC;border-left-color:#C0392B}
.play.st{background:#D8DEE9;border-left-color:#41506B}
.play.def{background:#C9D8EE;border-left-color:#2C4E86}
.play:disabled{opacity:.35;transform:none;box-shadow:none;cursor:default}
#gamelog{margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;max-height:170px;overflow-y:auto;font-size:12.5px;line-height:1.75}
#gamelog .q{color:var(--gold);font-weight:700;letter-spacing:.1em}
#gamelog .big{color:var(--gold);font-weight:700}
#gamelog .bad{color:var(--red);font-weight:700}
#gamelog div{border-bottom:1px dashed #232D3F;padding:2px 0}

function staffFingerprint(){

function generateWeeklyRecs(){
  if(G.phase !== 'hub' || !G.staff) return;
  const key = G.year+':'+G.week+'|'+staffFingerprint();
  if(G.weeklyRecsKey === key) return;
  G.weeklyRecsKey = key;
  G.weeklyRecs = [];
  const me = meT();
  let rid = 1;
  const opp = userGame ? (() => { const g = userGame(); if(!g) return null; return G.teams[g.a===G.userTeam?g.b:g.a]; })() : null;

  if(G.staff.OC && Math.random() < .7){
    const leanRun = offRush(me) >= offPass(me);
    G.weeklyRecs.push({ id: rid++, coachRole:'OC', coachPos:null, coachName:G.staff.OC.name, kind:'tendency',
      statKey: leanRun ? 'offRush' : 'offPass',
      label: leanRun ? 'Lean on the run game this week — it\'s our strength.' : 'Air it out this week — our passing attack gives us the edge.',
      status:'pending' });
  }
  if(G.staff.DC && Math.random() < .7){
    const oppPass = opp ? offPass(opp) : 75;
    const blitzMore = (defPass(me) + 6) < oppPass ? false : true; // blitz unless their pass offense clearly outmatches our coverage
    G.weeklyRecs.push({ id: rid++, coachRole:'DC', coachPos:null, coachName:G.staff.DC.name, kind:'tendency',
      statKey: blitzMore ? 'defPass' : 'defRush',
      label: blitzMore ? 'Turn the pass rush loose this week — get after their quarterback.' : 'Stay disciplined and control the run this week.',
      status:'pending' });
  }
  const posOpps = [];
  Object.keys(G.staff.pos || {}).forEach(pos => {
    const coach = G.staff.pos[pos];
    if(!coach) return;
    const side = ['QB','RB','WR','TE','OL'].includes(pos) ? 'off' : 'def';
    const form = side === 'off' ? offFormOf(me) : defFormOf(me);
    const formKey = side === 'off' ? offFormKeyOf(me) : defFormKeyOf(me);
    const lu = lineupFor(me, form, formKey);
    lu.forEach((slot, i) => {
      if(!slot.p || SPOT_GROUP[slot.spot] !== pos) return;
      const starter = slot.p;
      let bestBench = null, bestEff = -1;
      me.roster.forEach(p => {
        if(p.pos !== pos || p.id === starter.id || p.ir) return;
        if(lu.some(x => x.p && x.p.id === p.id)) return; // already starting elsewhere
        const e = effRating(p, slot.spot, form.scheme);
        if(e > bestEff){ bestEff = e; bestBench = p; }
      });
      if(bestBench && bestEff >= slot.eff - 4){
        posOpps.push({ coach, pos, side, formKey, slotIndex:i, spot:slot.spot, starter, bench:bestBench, margin: bestEff - slot.eff });
      }
    });
  });
  posOpps.sort((a,b) => b.margin - a.margin);
  const seen = new Set();
  posOpps.forEach(o => {
    if(seen.has(o.pos) || G.weeklyRecs.length >= 4) return;
    seen.add(o.pos);
    G.weeklyRecs.push({ id: rid++, coachRole:'POS', coachPos:o.pos, coachName:o.coach.name, kind:'personnel',
      formSide:o.side, formKey:o.formKey, slotIndex:o.slotIndex, benchId:o.bench.id, starterId:o.starter.id, pos:o.pos, spot:o.spot,
      label: 'Start '+esc(o.bench.name)+' over '+esc(o.starter.name)+' at '+o.spot+' this week.',
      status:'pending' });
  });
  G.weeklyRecs = G.weeklyRecs.slice(0,4);
}

function resolveRec(id, choice){
  const rec = (G.weeklyRecs||[]).find(r => r.id === id);
  if(!rec || rec.status !== 'pending') return;
  rec.status = choice === 'accept' ? 'accepted' : choice === 'compromise' ? 'compromised' : 'rejected';
  const coach = coachForRec(rec);
  bumpCoachRel(coach, choice==='accept' ? 4 : choice==='compromise' ? 1 : -3);
  if(rec.kind === 'personnel' && choice !== 'reject'){
    const prevOverride = (G.lineupOverride && G.lineupOverride[rec.formKey] && G.lineupOverride[rec.formKey][rec.slotIndex]) || null;
    if(!G.lineupOverride) G.lineupOverride = {};
    if(!G.lineupOverride[rec.formKey]) G.lineupOverride[rec.formKey] = {};
    G.lineupOverride[rec.formKey][rec.slotIndex] = rec.benchId;
    if(choice === 'compromise'){
      if(!G.tempLineupReverts) G.tempLineupReverts = [];
      G.tempLineupReverts.push({ formKey: rec.formKey, slotIndex: rec.slotIndex, prevId: prevOverride });

      const r = tier + R(3,10) - d * R(4.5,6.5);
      const sp = SPOTS[pos][d % SPOTS[pos].length]; // cycle spots so every position is covered
      roster.push(makePlayer(pos, r, RI(22,33), RI(0,3), sp));
    }
  });
  // every club starts legal: scale salaries to leave 8–20% cap room
  const pr = roster.reduce((s,p) => s + p.salary, 0);
  const target = CAP * R(.80, .92);
  if(pr > target){

    roster.forEach(p => p.salary = Math.max(0.7, Math.round(p.salary*f*10)/10));

}

/* ---------- contract structure: base salary + prorated signing bonus, NFL-style ---------- */
function contractOf(p){
  if(!p.contract) p.contract = { base: Array(Math.max(p.years,1)).fill(p.salary), bonusProration: 0, bonusYearsLeft: 0, totalBonus: 0 };
  return p.contract;
}
function deadCapCharge(p){

  return c.bonusYearsLeft > 0 ? Math.round(c.bonusProration * c.bonusYearsLeft * 10) / 10 : 0;
}
function deadCapFor(t){ return (G.deadCap && G.deadCap[t.idx]) || 0; }
function chargeDeadCap(t, amount){
  if(amount <= 0) return;

}
function buildContractSchedule(totalValue, years, bonusPct, escalating){
  years = Math.max(1, Math.round(years));
  bonusPct = clamp(bonusPct, 0, 0.6);
  const bonusTotal = Math.round(totalValue * bonusPct * 10) / 10;
  const bonusYears = bonusTotal > 0 ? Math.min(years, 5) : 0;
  const bonusProration = bonusYears > 0 ? Math.round((bonusTotal / bonusYears) * 10) / 10 : 0;
  const baseTotal = Math.round((totalValue - bonusTotal) * 10) / 10;
  let base;
  if(escalating){
    const weights = []; for(let i=1;i<=years;i++) weights.push(i);
    const wSum = weights.reduce((a,b)=>a+b,0);
    base = weights.map(w => Math.round((baseTotal * w / wSum) * 10) / 10);
  } else {
    const flat = Math.round((baseTotal / years) * 10) / 10;
    base = Array(years).fill(flat);
  }
  // fold any rounding drift into the final year so the schedule sums exactly to baseTotal
  const drift = Math.round((baseTotal - base.reduce((a,b)=>a+b,0)) * 10) / 10;
  base[base.length-1] = Math.round((base[base.length-1] + drift) * 10) / 10;
  return { base, bonusProration, bonusYearsLeft: bonusYears, totalBonus: bonusTotal };
}

  if(marketTotal <= 0) return {tier:'accept', ratio:1, effectiveMarket:0};
  const guaranteedDiscount = bonusPct * 0.15; // more guaranteed money (bonus) is worth a small premium to a player
  const effectiveMarket = marketTotal * (1 - guaranteedDiscount);
  const ratio = offeredTotal / effectiveMarket;
  if(ratio >= 1) return {tier:'accept', ratio, effectiveMarket};
  if(ratio >= 0.88) return {tier:'counter', ratio, effectiveMarket, gap: Math.round((effectiveMarket-offeredTotal)*10)/10};

}

function submitFAOffer(pid, salary, years){

  if(rosterFrozen()) return { kind:'blocked', msg:'Roster moves are frozen during the playoffs.' };
  if(activeCount(me) >= rosterLimit()) return { kind:'blocked', msg:'Roster is full ('+rosterLimit()+' max right now) — cut someone first.' };

/* ---------- depth chart & unit ratings ---------- */
function poolOf(t){

  }

/* ---------- gameday actives (46 dress) ---------- */
function autoDress(t, respectScratches){

  let count = 0;
  const eligible = healthy.filter(p => !scratched.includes(p));
  eligible.forEach(p => { if(need[p.pos] > 0 && count < LIMIT_DRESS){ p.dressed = true; need[p.pos]--; count++; } });
  eligible.forEach(p => { if(!p.dressed && count < LIMIT_DRESS){ p.dressed = true; count++; } });

  sorted.forEach(p => { if(need[p.pos] > 0){ keep.add(p.id); need[p.pos]--; } });

    const keep = autoCutList(t);
    const cuts = t.roster.filter(p => !keep.has(p.id));

/* =====================================================
   SEASON LOGIC (schedule, sim, playoffs, offseason)
   ===================================================== */
function makePreSchedule(){
  const rounds = [];
  for(let r=0; r<3; r++){
    const oppIdx = G.preOpps[r];
    const games = [Math.random() < .5 ? {a:G.userTeam, b:oppIdx} : {a:oppIdx, b:G.userTeam}];
    const rest = [];
    for(let i=0;i<16;i++) if(i!==G.userTeam && i!==oppIdx) rest.push(i);
    for(let i=rest.length-1;i>0;i--){ const j=RI(0,i); [rest[i],rest[j]]=[rest[j],rest[i]]; }
    for(let i=0;i<rest.length;i+=2) games.push({a:rest[i], b:rest[i+1]});
    rounds.push(games);
  }
  return rounds;
}
function simAIPreseasonRound(round){
  if(!G.preSchedule || !G.preSchedule[round-1]) return;
  G.preSchedule[round-1].forEach(g => {
    if(g.done || g.a === G.userTeam || g.b === G.userTeam) return;
    const r = quickSim(g.a, g.b);
    g.as = r.as; g.bs = r.bs; g.done = true;
    g.report = { a:g.a, b:g.b, as:g.as, bs:g.bs, devs:[], injuries:[], phase:'pre', week:round };
    g.week = round; g.year = G.year; g.phase = 'pre';
  });
}
function makeSchedule(){
  const n = 16, rounds = [];
  const arr = []; for(let i=1;i<n;i++) arr.push(i);
  for(let r=0; r<n-1; r++){
    const games = [];
    const ring = [0].concat(arr);
    for(let i=0; i<n/2; i++){
      const a = ring[i], b = ring[n-1-i];
      games.push(Math.random() < .5 ? {a,b} : {a:b, b:a});
    }
    rounds.push(games);
    arr.unshift(arr.pop());
  }
  for(let i=rounds.length-1; i>0; i--){ const j=RI(0,i); [rounds[i],rounds[j]]=[rounds[j],rounds[i]]; }
  return rounds;
}
function quickSim(ai, bi){
  const A = G.teams[ai], B = G.teams[bi];
  function drives(off, def, home){
    let pts = 0;
    for(let d=0; d<11; d++){
      const edge = ( (offPass(off)+offRush(off))/2 - (defPass(def)+defRush(def))/2 )/100 + (home? .02 : 0);
      const roll = Math.random() + edge*0.9;
      if(roll > .74) pts += 7;
      else if(roll > .58) pts += 3;
      else if(roll > .555) pts += 7;
    }
    return pts;
  }
  let as = drives(A,B,true), bs = drives(B,A,false);
  if(as === bs){ if(Math.random()<.5) as += 3; else bs += 3; }
  return {a:ai, b:bi, as, bs};
}
function applyResult(res){
  const A = G.teams[res.a], B = G.teams[res.b];
  A.pf += res.as; A.pa += res.bs; B.pf += res.bs; B.pa += res.as;
  if(res.as > res.bs){ A.w++; B.l++; } else { B.w++; A.l++; }
}
function userGame(){
  const wk = G.schedule[G.week-1];
  return wk.find(g => g.a === G.userTeam || g.b === G.userTeam);
}
/* ---------- player stats, stat-driven development, market value ---------- */
function blankStats(){ return {gp:0,py:0,ptd:0,ry:0,rtd:0,cy:0,ctd:0,tk:0,sk:0,int:0,fgm:0}; }
function stOf(p){ if(!p.st) p.st = blankStats(); return p.st; }
function statScore(p){
  const s = p.st; if(!s) return 0;
  return s.py*.025 + s.ptd*4 + s.ry*.09 + s.rtd*5 + s.cy*.09 + s.ctd*5 + s.tk*.45 + s.sk*3.5 + s.int*5 + s.fgm*2;
}
const STAT_BENCH = {QB:115, RB:58, WR:50, TE:36, OL:0, DL:42, LB:52, CB:32, S:36, K:50}; // solid-starter season score
function statMult(p){
  const bench = STAT_BENCH[p.pos];
  if(!bench) return 1;
  const score = (p.lastScore || 0) + statScore(p);
  if(score <= 0) return 1;
  return clamp(.9 + .3 * (score/bench - 1), .85, 1.3);
}
function marketFor(p, ageBump){ return Math.round(salaryFor(p.rating, p.pos, p.age + (ageBump||0)) * statMult(p) * 10) / 10; }
function bumpDev(p, hot){
  if(!hot || Math.random() > .55) return false;
  p.devPts = (p.devPts||0) + 1;
  if(p.devPts >= 3 && (p.statDev||0) < 3 && p.rating < 99){
    p.devPts = 0; p.statDev = (p.statDev||0) + 1; p.rating++;
    logEv(p, 'dev', 'Hot streak — string of big games', 1);
    if(G.staff && G.userTeam != null && meT().roster.includes(p)){
      const posCoach = G.staff.pos && G.staff.pos[p.pos];
      const groupRole = coachGroupOf(p.pos);
      const coordCoach = groupRole && G.staff[groupRole];
      if(posCoach) coachPointsFor(posCoach, 1);
      if(coordCoach) coachPointsFor(coordCoach, 1);
    }
    return true;
  }
  return false;
}
function shareOut(total, players, jitter){
  // split a total among players weighted by rating, with noise
  if(!players.length) return [];
  const w = players.map(p => Math.pow(p.rating, 2) * R(1-jitter, 1+jitter));
  const sum = w.reduce((a,b)=>a+b,0);
  return w.map(x => total * x / sum);
}
/* ---------- post-game box score report ---------- */
function snapshotStats(teamIdxList){
  const snap = {};
  teamIdxList.forEach(ti => G.teams[ti].roster.forEach(p => { snap[p.id] = p.st ? Object.assign({}, p.st) : blankStats(); }));
  return snap;
}
function lineScore(l){ return (l.py||0)*.025+(l.ptd||0)*4+(l.ry||0)*.09+(l.rtd||0)*5+(l.cy||0)*.09+(l.ctd||0)*5+(l.tk||0)*.45+(l.sk||0)*3.5+(l.int||0)*5+(l.fgm||0)*2; }
function buildGameReport(ga, gb, asScore, bsScore, snap, myRisers, injury){
  const report = { a:ga, b:gb, as:asScore, bs:bsScore, teams:{}, progressions: (myRisers||[]).slice(), injury: injury||null };
  [ga, gb].forEach(ti => {
    const t = G.teams[ti];
    const lines = [];
    let passYd=0, rushYd=0;
    t.roster.forEach(p => {
      if(!p.st) return;
      const before = snap[p.id] || blankStats();
      const d = {}; let any = false;
      Object.keys(p.st).forEach(k => { const diff = p.st[k]-(before[k]||0); if(diff){ d[k]=diff; any=true; } });
      if(!any || !d.gp) return;
      passYd += d.py||0; rushYd += d.ry||0;
      lines.push(Object.assign({ id:p.id, name:p.name, pos:p.spot }, d));
    });
    lines.sort((x,y) => lineScore(y)-lineScore(x));
    report.teams[ti] = { idx:ti, pts: ti===ga?asScore:bsScore, passYd, rushYd, lines };
  });
  return report;
}
function recordGameStats(ai, bi, as, bs){
  const risers = [];
  function checkPlayerHot(p, hot){
    if(hot && G.mode === 'player' && G.playerId && p.id === G.playerId){
      G.trainPts = (G.trainPts||0) + 3;
      logEv(p, 'dev', 'Excellent game — earned 3 training points', 0);
    }
  }
  [[ai,as,bi],[bi,bs,ai]].forEach(([ti,pts,oi]) => {
    const t = G.teams[ti], o = G.teams[oi];
    const olu = lineupFor(t, offFormOf(t), offFormKeyOf(t));
    const dlu = lineupFor(t, defFormOf(t), defFormKeyOf(t));
    const at = spot => olu.filter(x=>x.spot===spot && x.p).map(x=>x.p);
    const datPos = pos => dlu.filter(x=>x.p && x.p.pos===pos).map(x=>x.p);
    const pf = (pts+10)/34;
    const passYd = Math.max(60, Math.round((165 + R(0,110)) * pf * (1 + (offPass(t)-defPass(o))/70)));
    const rushYd = Math.max(30, Math.round((92 + R(0,75)) * pf * (1 + (offRush(t)-defRush(o))/70)));
    let tds = Math.floor(pts/7), fgs = clamp(Math.round((pts - tds*7)/3), 0, 6);
    let ptd = 0, rtd = 0;
    for(let i=0;i<tds;i++){ if(Math.random() < passYd/(passYd+rushYd*1.4)) ptd++; else rtd++; }
    const qb = at('QB')[0], rbs = at('RB'), recvs = at('WR').concat(at('TE'));
    if(qb){ const s=stOf(qb); s.gp++; s.py+=passYd; s.ptd+=ptd; const hot = passYd>=290||ptd>=4; checkPlayerHot(qb, hot); if(bumpDev(qb, hot)) risers.push(qb); }
    // rushing: RB1 heavy, sprinkle to RB2/QB
    const rushers = rbs.length ? rbs.slice(0,2) : (qb ? [qb] : []);
    if(rushers.length){
      const cuts = rushers.length===2 ? [.72,.28] : [1];
      rushers.forEach((p,i) => {
        const yd = Math.round(rushYd*cuts[i]); const s=stOf(p); if(p!==qb) s.gp++;
        s.ry+=yd; const myTd = (i===0)? rtd : 0; s.rtd+=myTd;
        const hot = yd>=115||myTd>=2; checkPlayerHot(p, hot);
        if(bumpDev(p, hot)) risers.push(p);
      });
    }
    // receiving splits pass yards
    const recYds = shareOut(passYd, recvs, .5);
    const tdOwner = recvs.length ? pick(recvs) : null;
    recvs.forEach((p,i) => {
      const yd = Math.round(recYds[i]); const s=stOf(p); s.gp++;
      s.cy+=yd; const myTd = (p===tdOwner)? ptd : 0; s.ctd+=myTd;
      const hot = yd>=100||myTd>=2; checkPlayerHot(p, hot);
      if(bumpDev(p, hot)) risers.push(p);
    });
    // defense
    const lbs = datPos('LB'), dls = datPos('DL'), cbs = datPos('CB'), ss = datPos('S');
    const tackles = RI(34,52);
    [[lbs,.42],[ss,.22],[cbs,.18],[dls,.18]].forEach(([grp,cut]) => {
      shareOut(tackles*cut, grp, .4).forEach((v,i) => {
        const p = grp[i], s = stOf(p); s.gp++;
        const tk = Math.round(v); s.tk += tk;
        const hot = tk>=11; checkPlayerHot(p, hot);
        if(bumpDev(p, hot)) risers.push(p);
      });
    });
    const rushersD = dls.concat(lbs.filter(p=>p.spot==='OLB'));
    let sacks = clamp(Math.round(R(0,4.4) * (1 + (defPass(t)-offPass(o))/80)), 0, 7);
    while(sacks-- > 0 && rushersD.length){ const p = pick(rushersD), s = stOf(p); s.sk++; const hot = Math.random()<.35; checkPlayerHot(p, hot); if(bumpDev(p, hot)) risers.push(p); }
    let ints = Math.random() < .38 ? RI(1, 2) : 0;
    const balls = cbs.concat(ss);
    while(ints-- > 0 && balls.length){ const p = pick(balls), s = stOf(p); s.int++; const hot = Math.random()<.6; checkPlayerHot(p, hot); if(bumpDev(p, hot)) risers.push(p); }
    // kicker
    const k = depthAt(t,'K')[0];
    if(k){ const s = stOf(k); s.gp++; s.fgm += fgs; const hot = fgs>=4; checkPlayerHot(k, hot); if(bumpDev(k, hot)) risers.push(k); }
  });
  return risers;
}
function finishWeek(userRes){
  revertTempLineups();
  const wk = G.schedule[G.week-1];
  const results = [];
  G.weekDevs = [];
  wk.forEach(g => {
    let r;
    if(g.a === G.userTeam || g.b === G.userTeam){ r = userRes; results.push(r); applyResult(r); }
    else { r = quickSim(g.a, g.b); results.push(r); applyResult(r); }
    const isUserGame = r.a === G.userTeam || r.b === G.userTeam;
    const snap = snapshotStats([r.a, r.b]);
    const ris = recordGameStats(r.a, r.b, r.as, r.bs);
    const myRisers = isUserGame ? ris.filter(p => meT().roster.includes(p)).map(p => ({id:p.id, name:p.name, pos:p.spot, ovr:p.rating})) : [];
    if(isUserGame) myRisers.forEach(p => G.weekDevs.push(p));
    r.report = buildGameReport(r.a, r.b, r.as, r.bs, snap, myRisers, null);
    r.week = G.week; r.year = G.year; r.phase = 'reg';
    r.report.phase = 'reg'; r.report.week = G.week;
    if(isUserGame) G.lastGameReport = r.report;
  });
  G.results.push(results);
  const me = meT();
  const won = (userRes.a === G.userTeam) ? userRes.as > userRes.bs : userRes.bs > userRes.as;
  if(G.mode !== 'player') G.trainPts += won ? 3 : 1;
  G.confidence = clamp(G.confidence + (won ? 4 : -4), 0, 100);
  G.career[won ? 'w' : 'l']++;
  me.roster.forEach(p => {
    ensureBio(p);
    if(p.ir) return;
    bumpRel(p, 'coach', p.dressed !== false ? .3 : -.3); // usage
    bumpRel(p, 'coach', won ? .2 : -.1); // winning vs losing
    const pc = G.staff && G.staff.pos && G.staff.pos[p.pos];
    if(pc) bumpRel(p, 'pos:'+p.pos, (pc.rating-70)/40);
    ['OC','DC','STC'].forEach(role => {
      const isOff = ['QB','RB','WR','TE','OL'].includes(p.pos), isDef = ['DL','LB','CB','S'].includes(p.pos);
      if((role==='OC'&&isOff)||(role==='DC'&&isDef)||(role==='STC'&&p.pos==='K')){
        const c = G.staff && G.staff[role];
        if(c) bumpRel(p, role, (c.rating-70)/50);
      }
    });
  });
  // heal, then risk a new injury to a dressed player
  G.teams.forEach(t => t.roster.forEach(p => { if(p.injWeeks > 0 && !p.ir) p.injWeeks--; }));
  G.lastInjury = null;
  if(Math.random() < .22){
    const dressedHealthy = me.roster.filter(p => p.injWeeks === 0 && p.dressed !== false && p.pos !== 'K');
    if(dressedHealthy.length){
      const p = pick(dressedHealthy);
      p.injWeeks = RI(1,4);
      G.lastInjury = p;
      logEv(p, 'inj', 'Injured — out '+p.injWeeks+' wk'+(p.injWeeks>1?'s':''), 0);
      if(Math.random() < .25 && p.rating > 55){ p.rating--; logEv(p, 'inj', 'Injury setback — never quite the same', -1); }
    }
  }
  if(G.lastGameReport) G.lastGameReport.injury = G.lastInjury;
  G.week++;
  if(G.week > 15) buildPlayoffs();
  save();
}

/* ---------- standings & playoffs ---------- */
function sortStand(list){
  return list.slice().sort((x,y) => (y.w - x.w) || ((y.pf-y.pa)-(x.pf-x.pa)) || (y.pf - x.pf));
}
function confSeeds(conf){
  const teams = G.teams.filter(t => t.conf === conf);
  const divWinners = [0,1].map(d => sortStand(teams.filter(t => t.div === d))[0]);
  const winnersSorted = sortStand(divWinners);
  const rest = sortStand(teams.filter(t => !divWinners.includes(t)));
  return winnersSorted.concat(rest.slice(0,2)).map(t => t.idx);
}
function buildPlayoffs(){

    r1: [ {a:s0[0], b:s0[3], done:false}, {a:s0[1], b:s0[2], done:false},

function playoffGames(){ return G.playoffs['r'+G.playoffs.round]; }
function playoffUserGame(){

}
function simPlayoffRound(){

function recordPlayoffUserResult(res){

function advancePlayoffRound(){
  const P = G.playoffs;
  if(P.round === 1){
    P.r2 = [ {a:P.r1[0].winner, b:P.r1[1].winner, done:false},
             {a:P.r1[2].winner, b:P.r1[3].winner, done:false} ];

/* =====================================================
   OFFSEASON MACHINE
   offseason summary → (re-sign) → March expiry → FA →
   draft → preseason ×3 → cutdown → new season

function resignPlayer(pid){
  const me = meT();
  const p = me.roster.find(x => x.id === pid);
  if(!p || p.years > 1 || p.resigned) return;
  const newSalary = userPrice(p, 1);
  if(newSalary > capRoom(me) + p.salary){ alert('Not enough cap room for '+money(newSalary)+'.'); return; }
  p.years = RI(2,3);
  p.salary = newSalary;
  p.resigned = true;
  p.contract = { base: Array(p.years).fill(newSalary), bonusProration: 0, bonusYearsLeft: 0, totalBonus: 0 };

/* extend a contract already in force: negotiate total value (as a % of fair market),

   creates dead-cap risk if he leaves early), and whether the base salary is flat
   or escalating (rises each year — the real lever that pushes weight to later years). */
let extendDraft = null;
function extendDraftFor(pid){
  const me = meT();

  return extendDraft;
}
function setExtendYears(pid, v){ const d = extendDraftFor(pid); if(d) d.addYears = clamp(parseInt(v)||1, 1, 5); render(); }
function setExtendValue(pid, v){ const d = extendDraftFor(pid); if(d) d.valuePct = clamp(parseInt(v)||100, 75, 130); render(); }
function setExtendBonus(pid, v){ const d = extendDraftFor(pid); if(d) d.bonusPct = clamp(parseInt(v)||0, 0, 60); render(); }
function toggleExtendEscalating(pid){ const d = extendDraftFor(pid); if(d) d.escalating = !d.escalating; render(); }
function applyExtendPreset(pid, preset){
  const d = extendDraftFor(pid); if(!d) return;
  if(preset === 'safe'){ d.bonusPct = 10; d.escalating = false; }
  else if(preset === 'balanced'){ d.bonusPct = 30; d.escalating = false; }
  else if(preset === 'relief'){ d.bonusPct = 55; d.escalating = true; }
  render();
}
function extendBaseline(p){
  const c = contractOf(p);
  let remainingCurrentValue = 0;
  for(let i=0;i<p.years;i++) remainingCurrentValue += scheduleSalary(c, i);
  const marketNow = userPrice(p, 1);
  return { remainingCurrentValue, marketNow, marketTotal: remainingCurrentValue + marketNow*1 };
}
function extendPreviewFor(pid){
  const me = meT();
  const p = me.roster.find(x => x.id === pid);
  const d = extendDraftFor(pid);
  if(!p || !d) return null;
  const c = contractOf(p);
  let remainingCurrentValue = 0;
  for(let i=0;i<p.years;i++) remainingCurrentValue += scheduleSalary(c, i);
  const marketNow = userPrice(p, 1);

function computeDraftOrder(){

      const pctA = a.lastRecord.w / Math.max(1, a.lastRecord.w + a.lastRecord.l);
      const pctB = b.lastRecord.w / Math.max(1, b.lastRecord.w + b.lastRecord.l);

    if(o !== G.userTeam && !G.preOpps.includes(o)) G.preOpps.push(o);
  }
  G.preSchedule = makePreSchedule();
  G.preWeek = 1; G.preResults = []; G.preReport = null;
  G.phase = 'preseason';
  save(); render();
}
function afterPreseasonGame(won, myScore, oppScore){
  const me = meT();
  const round = G.preWeek;
  if(won) me.preW++; else me.preL++;
  G.preResults.push({opp: G.preOpps[round-1], my: myScore, op: oppScore, won});
  // camp battles: young guys develop with preseason reps — captured in a post-game report
  const report = {devs: [], injuries: []};
  const young = me.roster.filter(p => p.age <= 25 && p.rating < 90);
  for(let i=0;i<2;i++){
    if(young.length && Math.random() < .6){
      const p = pick(young);
      p.rating = clamp(p.rating+1, 50, 99);
      logEv(p, 'dev', 'Preseason live reps', 1);
      const ex = report.devs.find(d => d.id === p.id);
      if(ex) ex.delta++; else report.devs.push({id:p.id, name:p.name, pos:p.spot, ovr:p.rating, delta:1});
    }
  }
  // light injury risk
  if(Math.random() < .12){
    const h = me.roster.filter(p => p.injWeeks === 0 && p.pos !== 'K');
    if(h.length){ const p = pick(h); p.injWeeks = RI(1,2); G.lastInjury = p; logEv(p,'inj','Injured in preseason — out '+p.injWeeks+' wk'+(p.injWeeks>1?'s':''),0); report.injuries.push({name:p.name, pos:p.spot, weeks:p.injWeeks}); }
  }
  G.preReport = report;
  if(G.preSchedule && G.preSchedule[round-1]){
    const entry = G.preSchedule[round-1].find(g => g.a===G.userTeam || g.b===G.userTeam);
    if(entry){
      entry.as = (entry.a===G.userTeam) ? myScore : oppScore;
      entry.bs = (entry.a===G.userTeam) ? oppScore : myScore;
      entry.done = true;
      entry.week = round; entry.year = G.year; entry.phase = 'pre';
      entry.report = { a:entry.a, b:entry.b, as:entry.as, bs:entry.bs, devs: report.devs, injuries: report.injuries, phase:'pre', week:round };
    }
    simAIPreseasonRound(round);
  }
  G.teams.forEach(t => t.roster.forEach(p => { if(p.injWeeks>0 && Math.random()<.5) p.injWeeks--; }));
  G.preWeek++;
  if(G.preWeek > 3) G.phase = 'cutdown';
  else G.phase = 'preseason';
  save(); render();
}
function playPre(){
  const opp = G.preOpps[G.preWeek-1];
  const home = G.preWeek !== 2;
  startGame({game: home ? {a:G.userTeam, b:opp} : {a:opp, b:G.userTeam}, preseason:true});
}
function simPre(){
  LINEUP = 'pre';
  const opp = G.preOpps[G.preWeek-1];
  const r = quickSim(G.userTeam, opp);
  LINEUP = 'full';
  afterPreseasonGame(r.as > r.bs, r.as, r.bs);
}
function confirmCutdown(){

  if(me.roster.length > LIMIT_REG){ alert('Still over the limit — you must get to '+LIMIT_REG+'.'); return; }
  if(!meetsMinimums(me)){ alert('Roster doesn\'t meet positional minimums (QB2 RB3 WR5 TE3 OL8 DL6 LB5 CB4 S3 K1).'); return; }
  aiCutdowns();
  G.schedule = makeSchedule();
  G.week = 1;
  meT().roster.forEach(p => p.dressed = true);
  autoDress(meT(), false);
  G.phase = 'hub'; hubTab = 'schedule';
  save(); render();
}
function doAutoCut(){
  const me = meT();
  const keep = autoCutList(me);
  const cuts = me.roster.filter(p => !keep.has(p.id));
  me.roster = me.roster.filter(p => keep.has(p.id));
  cuts.forEach(p => { p.years = 0; G.fa.push(p); });
  G.fa.sort((a,b) => b.rating - a.rating);
  save(); render();
}
function fillMinimumsFor(t){
  POS_ORDER.forEach(pos => {
    while(posCount(t, pos) < (MIN53[pos] || 0) && t.roster.length < LIMIT_OFF){
      let cand = G.fa
        .filter(p => p.pos === pos && salaryFor(p.rating, p.pos, p.age) <= capRoom(t))
        .sort((a,b) => b.rating - a.rating)[0];
      if(cand) G.fa.splice(G.fa.indexOf(cand), 1);
      else cand = makePlayer(pos, R(54,64), RI(22,27), 1); // camp body off the street
      cand.salary = salaryFor(cand.rating, cand.pos, cand.age);
      cand.years = Math.max(1, cand.years || 1);
      cand.injWeeks = 0; cand.dressed = true;

}
function fillMinimums(){

  save(); render();
}

/* =====================================================
   LIVE GAME ENGINE
   ===================================================== */
const OFF_PLAYS = {
  ir:{label:'Inside Zone',  sub:'run between tackles', fam:'run'},
  or:{label:'Outside Toss', sub:'stretch the edge',    fam:'run'},
  sp:{label:'Quick Slant',  sub:'short, high %',       fam:'quick'},
  sc:{label:'RB Screen',    sub:'beats the blitz',     fam:'quick'},
  mp:{label:'Dig / Curl',   sub:'10-15 yd window',     fam:'quick'},
  pa:{label:'Play Action',  sub:'sell run, hit seam',  fam:'shot'},
  dp:{label:'Deep Shot',    sub:'take the top off',    fam:'shot'}
};
const DEF_PLAYS = {
  st:{label:'Run Stuff',   sub:'8 in the box'},
  ba:{label:'Base 4-3',    sub:'sound vs everything'},
  ni:{label:'Nickel Zone', sub:'defend the middle'},
  bl:{label:'Man Blitz',   sub:'send the house'},
  pr:{label:'Prevent',     sub:'nothing deep'}
};
const MATCH = {
  ir:{st:-2.6, ba:-0.4, ni: 1.2, bl: 0.6, pr: 2.6},
  or:{st:-1.6, ba: 0.0, ni: 0.9, bl:-0.8, pr: 3.0},
  sp:{st: 1.4, ba: 0.3, ni:-1.2, bl: 1.0, pr:-1.4},
  sc:{st: 0.6, ba:-0.4, ni:-1.0, bl: 4.5, pr:-0.8},
  mp:{st: 1.8, ba: 0.2, ni:-1.6, bl: 0.8, pr:-1.8},
  pa:{st: 3.5, ba: 1.2, ni:-0.6, bl:-1.5, pr:-2.2},
  dp:{st: 2.5, ba: 0.6, ni:-1.0, bl:-2.0, pr:-4.5}
};
const PASS_PARAMS = {
  sp:{comp:.77, mean: 6.5, sd:3.0, sack:.035, int:.020},
  sc:{comp:.78, mean: 5, sd:5.5, sack:.030, int:.015},
  mp:{comp:.63, mean:13, sd:5.0, sack:.060, int:.032},
  pa:{comp:.60, mean:16, sd:7.0, sack:.080, int:.035},
  dp:{comp:.43, mean:27, sd:9.0, sack:.090, int:.050}
};
const Q_LEN = 600;

function startGame(opts){
  const g = opts.game;
  const home = g.a, away = g.b;
  if(opts.preseason){ LINEUP = 'pre'; }
  else {
    autoDress(G.teams[home === G.userTeam ? away : home], false);
    if(home === G.userTeam || away === G.userTeam) autoDress(meT(), true);
    LINEUP = 'dressed';
  }
  const openKick = Math.random() < .5 ? home : away;
  GM = {
    home, away, hs:0, as:0,
    q:1, clock:Q_LEN,
    poss: openKick, openRecv: openKick,
    spot:25, down:1, dist:10,
    over:false, ot:false, pending:null,
    hurry:false, playoff: !!opts.playoff, preseason: !!opts.preseason,
    runTend:0, passTend:0,
    log:[]
  };
  coachSimActive = false; coachSimAwaitingBreak = false; coachSimPausedFor4th = false; coachSimLastQ = 1;
  if(!opts.preseason && (home===G.userTeam || away===G.userTeam)){
    generateWeeklyRecs();
    GM.gameplan = computeGameplan();
    GM.recSummary = recFollowedCount();
  } else {
    GM.gameplan = {offRush:0,offPass:0,defRush:0,defPass:0};
    GM.recSummary = null;
  }
  G.phase = 'game';
  render();
  logQ((GM.preseason ? 'PRESEASON — ' : '') + '1st Quarter — ' + tName(openKick) + ' receive the opening kickoff.');
  updateGameUI();
}
function tName(i){ return G.teams[i].city + ' ' + G.teams[i].name; }
function offT(){ return G.teams[GM.poss]; }
function defIdx(){ return GM.poss === GM.home ? GM.away : GM.home; }
function defT(){ return G.teams[defIdx()]; }
function userOnO(){ return GM.poss === G.userTeam; }
function myScore(){ return GM.home === G.userTeam ? GM.hs : GM.as; }
function oppScore(){ return GM.home === G.userTeam ? GM.as : GM.hs; }
function addPts(teamIdx, pts){ if(teamIdx === GM.home) GM.hs += pts; else GM.as += pts; }
function logMsg(t, cls){ GM.log.push({t, cls}); renderLog(); }
function logQ(t){ GM.log.push({t, cls:'q'}); renderLog(); }

function aiOffCall(){
  const t = offT();
  const runBias = clamp((offRush(t) - offPass(t))/40 + .5, .25, .7);
  const trailing = (GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs) < 0;
  const late = GM.q >= 4 && GM.clock < 240;
  if(GM.down >= 3 && GM.dist >= 7) return pick(['mp','mp','dp','sp','sc']);
  if(GM.dist <= 2) return pick(['ir','ir','or','pa']);
  if(late && trailing) return pick(['mp','sp','dp','pa','sc']);
  if(late && !trailing) return pick(['ir','ir','or','sp']);
  return Math.random() < runBias ? pick(['ir','or']) : pick(['sp','mp','pa','dp','sc']);
}
function aiDefCall(){
  const total = GM.runTend + GM.passTend;
  const userRunPct = total > 4 ? GM.runTend/total : .5;
  if(GM.q >= 4 && GM.clock < 150 && (GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs) < -4) return Math.random()<.6 ? 'pr' : 'ni';
  if(GM.dist <= 2) return Math.random() < .6 ? 'st' : 'bl';
  if(GM.down >= 3 && GM.dist >= 8) return pick(['ni','bl','ni','pr']);
  if(userOnO() && Math.random() < .55) return userRunPct > .58 ? pick(['st','st','ba','bl']) : pick(['ni','ba','bl','ni']);
  return pick(['ba','ba','ni','st','bl']);
}
function aiFourthDown(){
  const toGoal = 100 - GM.spot;
  const fgDist = toGoal + 17;
  const k = kRating(offT());
  const diff = GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs;
  const desperate = GM.q>=4 && GM.clock < 300 && diff < 0;
  if(desperate && (diff < -3 || fgDist > 52)){
    if(GM.dist <= 5 || fgDist > 60) return 'go';
    return fgDist <= 55 ? 'fg' : 'go';
  }
  if(fgDist <= (k>=82 ? 55 : 50)) return 'fg';
  if(GM.dist <= 1 && GM.spot > 55 && Math.random()<.5) return 'go';
  return 'punt';
}

function resolvePlay(oc, dc){
  const off = offT(), def = defT();
  const mod = MATCH[oc][dc];
  const isRun = OFF_PLAYS[oc].fam === 'run';
  let res = {oc, dc, oob:false};
  if(isRun){
    const edge = (offRush(off) - defRush(def))/100;
    let y = 4.6 + mod + edge*7 + gauss()*(oc==='or' ? 4.4 : 3.2);
    if(Math.random() < .055 + Math.max(0,edge)*.05) y += R(12, 45);
    if(Math.random() < .012){ res.type='fumble'; res.yards=Math.round(clamp(y,-3,6)); return res; }
    res.type='run'; res.yards=Math.round(y);
    res.oob = oc==='or' && Math.random() < .3;
    return res;
  }
  const p = PASS_PARAMS[oc];
  const edge = (offPass(off) - defPass(def))/100;
  let sack = p.sack + (dc==='bl' ? .05 : 0) - edge*.03;
  if(oc==='sc') sack *= .4;
  if(Math.random() < Math.max(.01, sack)){
    res.type='sack'; res.yards = -RI(4,9);
    if(Math.random() < .07){ res.type='fumble'; }
    return res;
  }
  let intc = p.int + (dc==='bl' ? .008 : 0) + (dc==='ni' && (oc==='mp'||oc==='sp') ? .012 : 0) - edge*.025;
  if(Math.random() < Math.max(.004, intc)){
    res.type='int'; res.yards = Math.round(p.mean*.7); return res;
  }
  let comp = p.comp + edge*.32 + mod*.02 + (dc==='pr' && oc!=='dp' ? .06 : 0) + (dc==='pr' && oc==='dp' ? -.14 : 0);
  if(Math.random() > clamp(comp,.12,.95)){ res.type='inc'; res.yards=0; return res; }
  let y = p.mean + mod + edge*9 + gauss()*p.sd;
  if(oc!=='dp' && Math.random() < .05 + Math.max(0,edge)*.05) y += R(10,35);
  res.type='pass'; res.yards=Math.round(Math.max(oc==='sc'? -4 : 0, y));
  res.oob = Math.random() < .28;
  return res;
}

function runoff(res){
  if(GM.pending) return;
  let t;
  if(res.type==='inc') t = 7;
  else if(res.oob) t = GM.hurry ? 9 : 14;
  else t = GM.hurry ? 17 : 37;
  GM.clock -= t;
  if(GM.clock <= 0) endQuarter();
}
function endQuarter(){
  GM.clock = Q_LEN;
  GM.q++;
  if(GM.q === 3){
    logQ('Halftime. ' + tName(GM.openRecv===GM.home?GM.away:GM.home) + ' receive the second-half kickoff.');
    startPossession(GM.openRecv === GM.home ? GM.away : GM.home, 25);
    return;
  }
  if(GM.q === 5){
    if(GM.hs !== GM.as){ finishGame(); return; }
    if(GM.preseason){ if(Math.random()<.5) GM.hs+=3; else GM.as+=3; finishGame(); return; }
    GM.ot = true; GM.clock = Q_LEN;
    logQ('OVERTIME — next score wins.');
    startPossession(Math.random()<.5 ? GM.home : GM.away, 25);
    return;
  }
  if(GM.q > 5){
    if(GM.hs === GM.as){ if(Math.random()<.5) GM.hs+=3; else GM.as+=3; }
    finishGame(); return;
  }
  logQ(['','','2nd Quarter','3rd Quarter','4th Quarter'][GM.q] || 'Quarter ' + GM.q);
}
function startPossession(teamIdx, spot){
  GM.poss = teamIdx; GM.spot = spot; GM.down = 1; GM.dist = 10;
}
function applyPlay(res){
  const offName = G.teams[GM.poss].abbr;
  if(userOnO()){ if(OFF_PLAYS[res.oc].fam==='run') GM.runTend++; else GM.passTend++; }
  if(res.type==='int' || res.type==='fumble'){
    const spotAfter = clamp(GM.spot + res.yards, 1, 99);
    logMsg(offName + ' — ' + (res.type==='int' ? 'INTERCEPTED! ' : 'FUMBLE! ') + tName(defIdx()) + ' take over.', 'bad');
    if(userOnO()) fieldFlash(res.type==='int' ? 'Intercepted!' : 'Fumble!', 'opp');
    else fieldFlash(res.type==='int' ? 'Interception!' : 'Fumble!', 'td');
    startPossession(defIdx(), 100 - spotAfter);
    runoff({type:'to'});
    return;
  }
  if(res.type==='inc'){
    logMsg(offName + ' — ' + OFF_PLAYS[res.oc].label + ': incomplete.');
    GM.down++;
  } else {
    const newSpot = GM.spot + res.yards;
    if(newSpot <= 0){
      addPts(defIdx(), 2);
      logMsg('SAFETY! ' + tName(defIdx()) + ' get 2.', 'bad');
      runoff(res);
      startPossession(defIdx(), 35);
      updateGameUI(); return;
    }
    if(newSpot >= 100){ GM.spot = 99; touchdown(res); return; }
    GM.spot = newSpot;
    GM.dist -= res.yards;
    if(res.type==='sack'){ if(userOnO()) fieldFlash('Sacked!','opp'); else fieldFlash('Sack!','fd'); }
    const verb = res.type==='run' ? OFF_PLAYS[res.oc].label : (res.type==='sack' ? 'SACKED' : OFF_PLAYS[res.oc].label);
    logMsg(offName + ' — ' + verb + ': ' + (res.yards>=0?'+':'') + res.yards + ' yds' + (res.oob?' (out of bounds)':'') + '.', res.yards>=15?'big':null);
    if(GM.dist <= 0){ GM.down=1; GM.dist=Math.min(10,100-GM.spot); logMsg('First down, '+offName+'.'); if(userOnO()) fieldFlash('First Down','fd'); }
    else GM.down++;
  }
  if(GM.down > 4){
    logMsg('Turnover on downs! ' + tName(defIdx()) + ' ball.', 'bad');
    startPossession(defIdx(), 100 - GM.spot);
  }
  runoff(res);
}
function touchdown(res){
  addPts(GM.poss, 6);
  logMsg('TOUCHDOWN ' + tName(GM.poss).toUpperCase() + '!', 'big');
  if(GM.poss === G.userTeam) fieldFlash('Touchdown!','td');
  else fieldFlash('Touchdown ' + G.teams[GM.poss].abbr, 'opp');
  GM.pending = 'try';
  if(!userOnO()){
    const diff = GM.poss===GM.home ? GM.hs-GM.as : GM.as-GM.hs;
    const goTwo = (diff === -2 || diff === -8 || diff === 5 || diff === -5) && GM.q >= 4;
    doTry(goTwo ? '2pt' : 'xp');
  } else updateGameUI();
}
function doTry(kind){
  GM.pending = null;
  const t = offT();
  if(kind==='xp'){
    const make = Math.random() < .90 + (kRating(t)-75)*.003;
    if(make){ addPts(GM.poss,1); logMsg('Extra point is good.'); fieldFlash('Kick is Good','fd'); }
    else { logMsg('Extra point MISSED!', 'bad'); fieldFlash('No Good','opp'); }
  } else {
    const edge = (offPass(t)-defPass(defT()))/100;
    if(Math.random() < .46 + edge*.35){ addPts(GM.poss,2); logMsg('Two-point conversion is GOOD!', 'big'); fieldFlash('Two-Point Good!','fd'); }
    else { logMsg('Two-point try fails.', 'bad'); fieldFlash('No Good','opp'); }
  }
  startPossession(GM.poss===GM.home?GM.away:GM.home, 25);
  GM.clock -= 4; if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
}
function doFG(){
  const dist = (100 - GM.spot) + 17;
  const k = kRating(offT());
  const p = clamp(.99 - Math.max(0, dist-20)*.0135 + (k-75)*.004, .08, .99);
  GM.clock -= 6;
  if(Math.random() < p){
    addPts(GM.poss, 3);
    logMsg(dist + '-yd field goal is GOOD. ' + G.teams[GM.poss].abbr + ' +3.', 'big');
    fieldFlash('Kick is Good','fd');
    startPossession(GM.poss===GM.home?GM.away:GM.home, 25);
  } else {
    logMsg(dist + '-yd field goal is NO GOOD.', 'bad');
    fieldFlash('No Good','opp');
    startPossession(defIdx(), clamp(100-GM.spot+7, 20, 80));
  }
  if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
  if(coachSimPausedFor4th){ coachSimPausedFor4th = false; coachSimStep(); }
}
function doPunt(){
  const net = RI(35,48);
  const land = clamp(GM.spot + net, 0, 99);
  const oppSpot = land >= 99 ? 20 : 100 - land;
  logMsg(G.teams[GM.poss].abbr + ' punt ' + net + ' yds' + (land>=99?' — touchback':'') + '.');
  GM.clock -= 12;
  startPossession(defIdx(), oppSpot);
  if(GM.clock<=0) endQuarter();
  checkAITurn(); updateGameUI();
  if(coachSimPausedFor4th){ coachSimPausedFor4th = false; coachSimStep(); }
}
function doKneel(){
  GM.clock -= 40; GM.down++;
  logMsg(G.teams[GM.poss].abbr + ' kneel it.');
  if(GM.clock<=0) endQuarter();
  else if(GM.down>4){ startPossession(defIdx(), 100-GM.spot); }
  checkAITurn(); updateGameUI();
}
let busy = false;
let simFast = false; // true only inside Sim Quarter / Sim to Final loops — suppresses field flashes
function userCall(code){
  if(busy || !GM || GM.over) return;
  busy = true;
  let oc, dc;
  if(userOnO()){ oc = code; dc = aiDefCall(); }
  else { dc = code; oc = GM.down===4 ? null : aiOffCall(); }
  if(!userOnO() && GM.down === 4){
    const choice = aiFourthDown();
    if(choice==='punt'){ busy=false; doPunt(); return; }
    if(choice==='fg'){ busy=false; doFG(); return; }
    oc = aiOffCall();
  }
  const res = resolvePlay(oc, dc);
  animatePlay(res, () => {
    applyPlay(res);
    busy = false;
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); return; }
    checkAITurn();
    updateGameUI();
    if(coachSimPausedFor4th){ coachSimPausedFor4th = false; coachSimStep(); }
  });
}
function checkAITurn(){
  if(!GM || GM.over || GM.pending) return;
  if(GM.ot && GM.hs !== GM.as){ finishGame(); return; }
}
function finishGame(){
  if(GM.over) return;
  GM.over = true;
  logQ('FINAL — ' + tName(GM.home) + ' ' + GM.hs + ', ' + tName(GM.away) + ' ' + GM.as + '.');
  updateGameUI();
  setTimeout(showFinal, 600);
}
function gameResult(){ return {a:GM.home, b:GM.away, as:GM.hs, bs:GM.as}; }
/* ---------- coach sim mode: auto-play with pauses at real decision points ---------- */
let coachSimActive = false, coachSimLastQ = 0, coachSimAwaitingBreak = false, coachSimPausedFor4th = false;
function toggleCoachSim(){
  coachSimActive = !coachSimActive;
  coachSimAwaitingBreak = false; coachSimPausedFor4th = false;
  if(coachSimActive){ coachSimLastQ = GM.q; coachSimStep(); }
  else updateGameUI();
}
function coachSimResume(){ coachSimAwaitingBreak = false; coachSimStep(); }
function coachSimStep(){
  if(!coachSimActive || !GM || GM.over || busy) return;
  if(GM.q !== coachSimLastQ){
    coachSimLastQ = GM.q;
    coachSimAwaitingBreak = true;
    logQ('⏸ Coach Sim — quarter break. Review your lineup, then continue.');
    updateGameUI();
    return;
  }
  if(userOnO() && GM.down === 4 && !GM.pending){
    coachSimPausedFor4th = true;
    logMsg('⏸ Coach Sim paused — your call on 4th down.', 'q');
    updateGameUI(); // buildCallsheet shows the normal Go/Punt/FG choice; resolving it resumes coach sim
    return;
  }
  if(GM.pending){ busy = true; doTry(Math.random() < .88 ? 'xp' : '2pt'); busy = false; coachSimStep(); return; }
  if(GM.down === 4 && !userOnO()){
    const choice = aiFourthDown();
    if(choice==='punt'){ doPunt(); coachSimStep(); return; }
    if(choice==='fg'){ doFG(); coachSimStep(); return; }
  }
  busy = true;
  const res = resolvePlay(aiOffCall(), aiDefCall());
  animatePlay(res, () => {
    applyPlay(res);
    busy = false;
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); return; }
    updateGameUI();
    coachSimStep();
  });
}
function simQuarter(){
  if(!GM || GM.over) return;
  simFast = true;
  const startQ = GM.q;
  let guard = 200;
  while(!GM.over && GM.q === startQ && guard-- > 0){
    if(GM.pending){ doTry('xp'); continue; }
    if(GM.down === 4){
      const c = aiFourthDown();
      if(c==='punt'){ doPunt(); continue; }
      if(c==='fg'){ doFG(); continue; }
    }
    const res = resolvePlay(aiOffCall(), aiDefCall());
    applyPlay(res);
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); break; }
  }
  if(!GM.over && guard <= 0) finishGame();
  simFast = false;
  updateGameUI();
}
function simRest(){
  if(!GM || GM.over) return;
  simFast = true;
  let guard = 500;
  while(!GM.over && guard-- > 0){
    if(GM.pending){ doTry('xp'); continue; }
    if(GM.down === 4){
      const c = aiFourthDown();
      if(c==='punt'){ doPunt(); continue; }
      if(c==='fg'){ doFG(); continue; }
    }
    const res = resolvePlay(aiOffCall(), aiDefCall());
    applyPlay(res);
    if(GM.q >= 5 && GM.ot && GM.hs !== GM.as){ finishGame(); break; }
  }
  if(!GM.over && guard <= 0) finishGame();
  simFast = false;
  updateGameUI();
}

const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if(y%10===0 && y>0 && y<100){

function dot(x,y,fill,r){ return '<circle cx="'+x+'" cy="'+y+'" r="'+(r||9)+'" fill="'+fill+'" stroke="rgba(255,255,255,.85)" stroke-width="1.6"/>'; }

  banner._t = setTimeout(() => b.classList.remove('show'), ms || 1600);
}
function resText(res){
  if(res.type==='int') return 'INTERCEPTED!';
  if(res.type==='fumble') return 'FUMBLE — defense recovers!';
  if(res.type==='inc') return OFF_PLAYS[res.oc].label + ' — incomplete';
  if(res.type==='sack') return 'SACK! ' + res.yards + ' yds';
  const td = GM.spot + res.yards >= 100;
  return OFF_PLAYS[res.oc].label + ' — ' + (res.yards>=0?'+':'') + res.yards + ' yds' + (td?' — TOUCHDOWN!':'');
}
function animatePlay(res, cb){
  const animG = document.getElementById('anim');
  const plG = document.getElementById('players');
  if(!animG || reducedMotion){ if(animG) animG.innerHTML=''; banner(resText(res)); cb(); return; }
  animG.innerHTML = '';
  if(plG) plG.style.display = 'none';
  const off = offT(), def = defT();
  const x0 = xAt(GM.spot), mid = FH/2, PXY = 8.5;
  const CXf = x => clamp(x, 26, FW-26), CYf = y => clamp(y, 34, FH-34);
  const fam = OFF_PLAYS[res.oc] ? OFF_PLAYS[res.oc].fam : 'quick';
  const playIsRun = fam === 'run';
  const sackLike = res.type==='sack' || (res.type==='fumble' && !playIsRun);
  const isPassBall = !playIsRun && !sackLike; // the ball actually leaves the QB's hand
  const depth = {sp:6, sc:4, mp:13, pa:18, dp:27}[res.oc] || 8;
  const dpx = depth * PXY;
  const meanAir = PASS_PARAMS[res.oc] ? PASS_PARAMS[res.oc].mean : 8;
  const endYard = clamp(GM.spot + (res.type==='inc' ? Math.round(meanAir) : res.yards), 2, 100);
  const xEnd = CXf(xAt(endYard));
  const td = (res.type==='run'||res.type==='pass') && GM.spot + res.yards >= 100;
  const tHand=.14, tThrow=.34, tCatch=.6;

  /* ---- actors: every player is a dot with keyframed waypoints on one timeline ---- */
  const actors = [];
  function A(x,y,fill){ const a={x0i:CXf(x), y0i:CYf(y), fill, wp:[]}; a.wp.push({t:0,x:a.x0i,y:a.y0i}); actors.push(a); return a; }
  function to(a,t,x,y){ a.wp.push({t, x:CXf(x), y:CYf(y)}); return a; }
  function posAt(a,t){
    const w=a.wp;
    if(t<=w[0].t) return w[0];
    for(let i=1;i<w.length;i++){
      if(t<=w[i].t){
        const p0=w[i-1], p1=w[i], u=(t-p0.t)/((p1.t-p0.t)||1), e=u*u*(3-2*u);
        return {x:p0.x+(p1.x-p0.x)*e, y:p0.y+(p1.y-p0.y)*e};
      }
    }
    return w[w.length-1];
  }

  const OL=[]; for(let i=-2;i<=2;i++) OL.push(A(x0-12, mid+i*26, off.c1));
  const QB=A(x0-42, mid, off.c1);
  const RB=A(x0-62, mid+22, off.c1);
  const WRT=A(x0-16, 90, off.c1), WRB=A(x0-16, FH-90, off.c1);
  const SLOT=A(x0-16, mid-66, off.c1), TEr=A(x0-14, mid+66, off.c1);
  const DLs=[]; for(let i=-1.5;i<=1.5;i++) DLs.push(A(x0+14, mid+i*30, def.c1));
  const LBs=[]; for(let i=-1;i<=1;i++) LBs.push(A(x0+48, mid+i*55, def.c1));
  const CBT=A(x0+22, 95, def.c1), CBB=A(x0+22, FH-95, def.c1);
  const S1=A(x0+105, mid-45, def.c1), S2=A(x0+105, mid+45, def.c1);

  /* ---- pick the catch point + target receiver ---- */
  let xAir = CXf(xAt(clamp(GM.spot + depth, 2, 99)));
  let yAir = CYf(mid + gauss()*110);
  let target = null;
  if(isPassBall){
    if(res.oc==='sc'){ target = RB; xAir = CXf(x0 - 10); yAir = CYf(mid + (Math.random()<.5?-1:1)*R(70,130)); }
    else {
      const recs=[WRT,WRB,SLOT,TEr];
      target = recs.reduce((b,r)=>Math.abs(r.y0i-yAir)<Math.abs(b.y0i-yAir)?r:b, recs[0]);
      yAir = CYf(target.y0i + (mid-target.y0i)*(res.oc==='sp'?.45:.2) + gauss()*18);
    }
  }
  const yEnd = CYf(isPassBall && res.type!=='int'
    ? yAir + gauss()*40
    : (playIsRun ? (res.oc==='or' ? (Math.random()<.5?115:FH-115) : mid + gauss()*50) : mid + gauss()*30));

  /* ---- offensive line: fire out on runs, set the pocket on passes ---- */
  OL.forEach(o=>{
    if(playIsRun){ to(o,.5, o.x0i+14+R(-3,3), o.y0i+R(-6,6)); to(o,1, o.x0i+22+R(-4,8), o.y0i+R(-10,10)); }
    else { to(o,.35, o.x0i-6, o.y0i+R(-4,4)); to(o,1, o.x0i-9+R(-3,3), o.y0i+R(-7,7)); }
  });
  /* ---- defensive line: shed vs run, rush vs pass ---- */
  DLs.forEach(d=>{
    if(playIsRun) to(d,.55, d.x0i-8+R(-5,5), d.y0i+R(-9,9));
    else to(d,.5, d.x0i-16+R(-7,4), d.y0i+R(-9,9));
  });

  /* ---- QB: mesh on runs, drop by pass depth, driven back on sacks ---- */
  const drop = fam==='shot' ? 48 : (res.oc==='mp' ? 36 : 24);
  if(playIsRun){ to(QB,tHand, x0-56, mid+14); to(QB,1, x0-62, mid+8+R(-4,4)); }
  else if(sackLike){ to(QB,.35, x0-42-drop, mid+R(-6,6)); to(QB,.72, xEnd, CYf(mid+gauss()*22)); to(QB,1, xEnd+R(-4,4), CYf(mid+gauss()*22)); }
  else { to(QB,tThrow, x0-42-drop, mid+R(-8,8)); to(QB,1, x0-40-drop, mid+R(-10,10)); }

  /* ---- RB: carry, leak for the screen, or stay in and block ---- */
  if(playIsRun){
    if(res.oc==='or'){ to(RB,tHand, x0-52, mid+30); to(RB,.5, x0-8, yEnd<mid?135:FH-135); to(RB,1, xEnd, yEnd); }
    else { to(RB,tHand, x0-48, mid+16); to(RB,.45, x0+6, CYf(mid+gauss()*28)); to(RB,1, xEnd, yEnd); }
  } else if(target===RB){
    to(RB,.42, xAir-16, yAir); to(RB,tCatch, xAir, yAir);
    if(res.type==='pass') to(RB,1, xEnd, yEnd); else to(RB,.85, xAir+10, yAir);
  } else { to(RB,.4, x0-52, mid+32); to(RB,1, x0-54, mid+34+R(-5,5)); }

  /* ---- receivers: routes by play call; target's route bends through the catch point ---- */
  [WRT,WRB,SLOT,TEr].forEach(r=>{
    const dir = r.y0i < mid ? 1 : -1;
    if(playIsRun || res.oc==='sc'){ to(r,.5, r.x0i+18, r.y0i+dir*10); to(r,1, r.x0i+24+R(-4,4), r.y0i+dir*12+R(-5,5)); return; }
    if(r===target) return;
    if(res.oc==='sp'){ to(r,.25, r.x0i+3*PXY, r.y0i); to(r,.95, r.x0i+11*PXY, r.y0i+dir*80); }
    else if(res.oc==='mp'){ to(r,.45, r.x0i+dpx, r.y0i+dir*6); to(r,.65, r.x0i+dpx-10, r.y0i+dir*26); to(r,1, r.x0i+dpx-8, r.y0i+dir*28); }
    else { to(r,1, r.x0i+dpx+34, r.y0i+dir*14); }
  });
  if(target && target!==RB){
    const dir = target.y0i < mid ? 1 : -1;
    target.wp = [{t:0, x:target.x0i, y:target.y0i}];
    to(target, tCatch*.55, target.x0i + dpx*.6, target.y0i + dir*Math.min(30, Math.abs(yAir-target.y0i)*.4));
    to(target, tCatch, xAir, yAir);
    if(res.type==='pass') to(target,1, xEnd, yEnd);
    else if(res.type==='int') to(target,.85, xAir-12, yAir+dir*6);
    else to(target,.9, xAir+18, yAir+dir*12);
  }

  /* ---- linebackers: blitz, plug the run, or drop into zones by the D call ---- */
  LBs.forEach((l,i)=>{
    if(!playIsRun && res.dc==='bl' && i!==1){ to(l,.55, x0-34+R(-6,6), CYf(mid+(i-1)*42)); }
    else if(playIsRun || res.dc==='st'){ to(l,.5, l.x0i-18, CYf(l.y0i+(yEnd-l.y0i)*.35)); }
    else { to(l,.55, l.x0i+(res.dc==='pr'?55:34), l.y0i+R(-12,12)); }
  });

  /* ---- corners trail their receiver; safeties deepen or come downhill ---- */
  [[CBT,WRT],[CBB,WRB]].forEach(pr=>{
    const c=pr[0], w=pr[1];
    if(playIsRun){ to(c,.65, x0+10, c.y0i+(mid-c.y0i)*.25); }
    else { const we=w.wp[w.wp.length-1]; to(c,.9, we.x+15, we.y+(c.y0i<mid?-11:11)); }
  });
  [S1,S2].forEach(sf=>{
    if(playIsRun) to(sf,.6, x0+30, CYf(sf.y0i+(yEnd-sf.y0i)*.5));
    else to(sf,.45, sf.x0i+42, sf.y0i+R(-8,8));
  });

  /* ---- sack: one rusher breaks through and rides the QB down ---- */
  if(sackLike){
    const rusher = res.dc==='bl' ? LBs[0]
      : DLs.reduce((b,d)=>Math.abs(d.y0i-mid)<Math.abs(b.y0i-mid)?d:b, DLs[0]);
    rusher.wp = [{t:0,x:rusher.x0i,y:rusher.y0i}];
    to(rusher,.5, x0-30-drop*.5, mid+R(-10,10));
    to(rusher,.72, xEnd+8, CYf(mid+gauss()*22));
    to(rusher,1, xEnd+6, CYf(mid+gauss()*22));
  }

  /* ---- interception: nearest DB jumps the route and heads the other way ---- */
  let picker = null;
  if(res.type==='int'){
    const dbs=[CBT,CBB,S1,S2,LBs[1]];
    picker = dbs.reduce((b,d)=>Math.hypot(d.x0i-xAir,d.y0i-yAir)<Math.hypot(b.x0i-xAir,b.y0i-yAir)?d:b, dbs[0]);
    picker.wp = [{t:0,x:picker.x0i,y:picker.y0i}];
    to(picker,tCatch, xAir, yAir);
    to(picker,1, xAir-46, CYf(yAir+gauss()*24));
  }

  /* ---- pursuit: the three nearest defenders converge on the tackle point (trail on a TD) ---- */
  if(res.type==='run' || res.type==='pass' || (res.type==='fumble' && playIsRun)){
    const ring=[[15,0],[-7,17],[-7,-17]];
    [...DLs,...LBs,CBT,CBB,S1,S2].filter(d=>d!==picker)
      .map(d=>({d, dist:Math.hypot(d.x0i-xEnd, d.y0i-yEnd)}))
      .sort((a,b)=>a.dist-b.dist).slice(0,3)
      .forEach((x,i)=>{
        const o=ring[i];
        to(x.d, 1, xEnd+o[0]+(td?-26:0), yEnd+o[1]);
      });
  }

  /* ---- render: 22 dots + ball + trail ---- */
  const NS='http://www.w3.org/2000/svg';
  actors.forEach(a=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('r','9'); c.setAttribute('fill',a.fill);
    c.setAttribute('stroke','rgba(255,255,255,.85)'); c.setAttribute('stroke-width','1.6');
    c.setAttribute('cx',a.x0i); c.setAttribute('cy',a.y0i);
    animG.appendChild(c); a.el=c;
  });
  const bad = res.type==='int'||res.type==='fumble'||res.type==='sack';
  const trail=document.createElementNS(NS,'path');
  trail.setAttribute('fill','none');
  trail.setAttribute('stroke', bad?'#E25555':'#FFD447');
  trail.setAttribute('stroke-width','3'); trail.setAttribute('opacity','.7');
  trail.setAttribute('stroke-linecap','round');
  animG.appendChild(trail);
  let throwLine=null;
  const ball=document.createElementNS(NS,'ellipse');
  ball.setAttribute('rx','8'); ball.setAttribute('ry','5.5');
  ball.setAttribute('fill','#8B4A2B'); ball.setAttribute('stroke','#F2EFE7'); ball.setAttribute('stroke-width','1.5');
  animG.appendChild(ball);

  let carrier=null, tCarry=2;
  if(playIsRun){ carrier=RB; tCarry=tHand; }
  else if(res.type==='pass'){ carrier=target; tCarry=tCatch; }
  else if(res.type==='int'){ carrier=picker; tCarry=tCatch; }

  function ballPos(t){
    if(!isPassBall) return carrier && t>=tCarry ? posAt(carrier,t) : posAt(QB,t);
    if(t<tThrow) return posAt(QB,t);
    const rel=posAt(QB,tThrow);
    if(t<tCatch){ const u=(t-tThrow)/(tCatch-tThrow); return {x:rel.x+(xAir-rel.x)*u, y:rel.y+(yAir-rel.y)*u}; }
    return carrier ? posAt(carrier,t) : {x:xAir,y:yAir};
  }

  const dur = clamp(1250 + Math.abs(res.yards||0)*14, 1250, 2100);
  let start=null, trailD='';
  function step(ts){
    if(!start) start=ts;
    const t=Math.min(1,(ts-start)/dur);
    actors.forEach(a=>{ const p=posAt(a,t); a.el.setAttribute('cx',p.x); a.el.setAttribute('cy',p.y); });
    const bp=ballPos(t);
    ball.setAttribute('cx',bp.x); ball.setAttribute('cy',bp.y);
    trailD += (trailD?' L':'M')+Math.round(bp.x)+' '+Math.round(bp.y);
    trail.setAttribute('d',trailD);
    if(isPassBall && t>=tThrow && !throwLine){
      throwLine=document.createElementNS(NS,'line');
      const rel=posAt(QB,tThrow);
      throwLine.setAttribute('x1',rel.x); throwLine.setAttribute('y1',rel.y);
      throwLine.setAttribute('x2',xAir); throwLine.setAttribute('y2',yAir);
      throwLine.setAttribute('stroke','#FFD447'); throwLine.setAttribute('stroke-width','2.5');
      throwLine.setAttribute('stroke-dasharray','10 8'); throwLine.setAttribute('opacity','.7');
      animG.insertBefore(throwLine, ball);
    }
    if(t<1) requestAnimationFrame(step);
    else{
      banner(resText(res));
      if(res.type==='inc'||res.type==='int'||res.type==='fumble'){
        const m=document.createElementNS(NS,'text');
        m.setAttribute('x',bp.x); m.setAttribute('y',bp.y+6);
        m.setAttribute('fill', res.type==='inc' ? '#F2EFE7' : '#E25555');
        m.setAttribute('font-size','26'); m.setAttribute('font-weight','700'); m.setAttribute('text-anchor','middle');
        m.textContent='✕';
        animG.appendChild(m);
      }
      setTimeout(()=>{ animG.innerHTML=''; if(plG) plG.style.display=''; cb(); }, 420);
    }
  }
  requestAnimationFrame(step);
}

/* =====================================================
   UI SCREENS
   ===================================================== */
function meT(){ return G.teams[G.userTeam]; }
function headerHTML(){

function timelineHTML(){
  const steps = [['tag','Tag','TAG'],['fa','Free Agency','FA'],['draft','Draft','DRAFT'],['ota','OTAs','OTA'],['camp','Camp','CAMP'],['preseason','Preseason','PRE'],['cutdown','Cutdown','CUT'],['hub','Season','SZN'],['playoffs','Playoffs','PO']];
  const orderOf = {tag:0, fa:1, draft:2, ota:3, camp:4, preseason:5, cutdown:6, hub:7, game:7, playoffs:8, offseason:9};
  const last = steps.length - 1;
  const curRaw = orderOf[G.phase] != null ? orderOf[G.phase] : 4;
  const cur = clamp(curRaw, 0, last);
  const fillPct = (cur / last) * 100;
  let dots = '', labels = '';
  steps.forEach((st,i) => {
    const pct = (i/last)*100;
    const state = curRaw > last ? 'done' : (i===curRaw ? 'on' : (i<curRaw ? 'done' : ''));
    const xform = i===0 ? 'translate(0,-50%)' : (i===last ? 'translate(-100%,-50%)' : 'translate(-50%,-50%)');
    const xformL = i===0 ? 'translateX(0)' : (i===last ? 'translateX(-100%)' : 'translateX(-50%)');
    dots += '<div class="tl-dot '+state+'" style="left:'+pct+'%;transform:'+xform+'"></div>';
    labels += '<div class="tl-lbl '+state+'" style="left:'+pct+'%;transform:'+xformL+'">'+st[2]+'</div>';
  });
  return '<div class="timeline">' +
    '<div class="tl-head"><span class="tl-now">'+(G.phase==='offseason'?'Offseason':steps[cur][1])+'</span><span class="tl-date">'+fmtDate(currentDate())+'</span></div>' +
    '<div class="tl-track"><div class="tl-fill" style="width:'+fillPct+'%"></div>'+dots+'</div>' +
    '<div class="tl-labels">'+labels+'</div>' +
    '</div>';
}

    });

function sparkHTML(p){

  evs.forEach(e => pts.push(pts[pts.length-1] + e.d));
  if(pts.length < 2) return '<p class="sub">No rating movement recorded yet.</p>';
  const min = Math.min(...pts)-1, max = Math.max(...pts)+1, W=420, H=64;
  const xy = pts.map((v,i) => (i/(pts.length-1)*W).toFixed(1)+','+(H-((v-min)/(max-min))*H).toFixed(1));
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">' +
    '<polyline points="'+xy.join(' ')+'" fill="none" stroke="var(--gold)" stroke-width="2"/>' +
    '<circle cx="'+xy[xy.length-1].split(',')[0]+'" cy="'+xy[xy.length-1].split(',')[1]+'" r="3.5" fill="var(--gold)"/></svg>' +
    '<p class="sub">'+start+' OVR at debut → <b style="color:var(--gold)">'+p.rating+'</b> today</p>';

function rosterTable(t, actionFn){
  const cols = [['name','Player'],['spot','Pos'],['scheme','Scheme'],['age','Age'],['rating','OVR'],['salary','Salary'],['years','Years']];
  let s = '<div class="filterbar">';
  ['ALL'].concat(POS_ORDER).forEach(f => {
    s += '<button class="fbtn'+(rFilter===f?' on':'')+'" onclick="setRFilter(\''+f+'\')">'+f+(f!=='ALL'?' <span style="opacity:.7">'+posCount(t,f)+'</span>':'')+'</button>';
  });
  s += '</div><table class="tbl"><tr>';
  cols.forEach(c => {
    const on = rSort.key === c[0];
    s += '<th class="sorth'+(on?' on':'')+'" onclick="setRSort(\''+c[0]+'\')">'+c[1]+(on ? (rSort.dir>0?' ▲':' ▼') : '')+'</th>';
  });
  s += '<th>Status</th><th></th></tr>';
  const list = t.roster
    .filter(p => rFilter==='ALL' || p.pos === rFilter)
    .sort((a,b) => {
      let va, vb;
      if(rSort.key==='spot'){ va = spotSortVal(a); vb = spotSortVal(b); }
      else { va = a[rSort.key]; vb = b[rSort.key]; }
      if(typeof va === 'string') return va.localeCompare(vb) * rSort.dir;
      return ((va - vb) || (b.rating - a.rating)) * rSort.dir;
    });
  list.forEach(p => s += playerRow(p, actionFn(p)));
  if(!list.length) s += '<tr><td colspan="9" class="sub" style="text-align:center;padding:14px">No players at this position.</td></tr>';
  return s + '</table>';
}
